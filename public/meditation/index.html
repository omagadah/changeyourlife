<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Méditation guidée - Change Your Life</title>
  <link rel="stylesheet" href="/css/main.min.css" />
  <style>
    body { color:#e5eef8; }
    .page-shell { position: fixed; inset: 20px; background: var(--glass-bg); backdrop-filter: blur(15px); border-radius: 20px; border: 1px solid var(--glass-border); padding: 20px; display: grid; grid-template-rows: auto 1fr; gap: 16px; overflow: hidden; }
    .header-bar { display: flex; justify-content: space-between; align-items: center; }
    .header-bar h1 { margin: 0; font-size: 1.4rem; }
    .content-area { overflow-y: auto; display: grid; gap: 20px; }
    .sessions-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 18px; }
    /* ── Session cards ── */
    .session-card {
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.09);
      border-radius: 16px; padding: 18px; cursor: pointer;
      transition: all 0.25s var(--ease); position: relative; overflow: hidden;
    }
    .session-card::after {
      content:''; position:absolute; bottom:0; left:0; right:0; height:2px;
      background: var(--card-color, transparent); opacity: 0.6;
      transition: opacity 0.2s;
    }
    .session-card:hover { background: rgba(255,255,255,0.07); transform: translateY(-3px); box-shadow: 0 10px 28px rgba(0,0,0,0.25); }
    .session-card:hover::after { opacity: 1; }
    .session-card.active { border-color: rgba(59,130,246,0.4); background: rgba(59,130,246,0.08); }
    .session-card.playing { border-color: rgba(16,185,129,0.4); background: rgba(16,185,129,0.07); }
    .session-icon { font-size: 2.2rem; margin-bottom: 10px; }
    .session-title { font-weight: 700; font-size: 1rem; margin-bottom: 5px; letter-spacing: -0.2px; }
    .session-desc { font-size: 0.83rem; color: var(--text-2); line-height: 1.45; }
    .session-duration {
      position: absolute; top: 12px; right: 12px;
      background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.1);
      padding: 3px 8px; border-radius: 20px; font-size: 0.72rem; font-weight: 600; color: var(--text-2);
    }

    /* ── Player panel ── */
    .player-panel {
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px; padding: 28px 24px; display: none;
    }
    .player-panel.active { display: block; }
    .player-header { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:4px; }
    .player-title { font-size: 1.15rem; font-weight: 700; letter-spacing: -0.3px; }
    .player-subtitle { color: var(--text-2); font-size: 0.85rem; margin-bottom: 20px; }

    /* ── Timer with circular progress ── */
    .timer-wrap { display:flex; justify-content:center; margin: 20px 0; }
    .timer-ring { position:relative; width:160px; height:160px; }
    .timer-ring svg { position:absolute; top:0; left:0; transform:rotate(-90deg); }
    .timer-ring-bg { stroke:rgba(255,255,255,0.06); fill:none; stroke-width:4; }
    .timer-ring-fill { stroke:var(--blue); fill:none; stroke-width:4; stroke-linecap:round;
      stroke-dasharray:440; stroke-dashoffset:440; transition:stroke-dashoffset 0.9s linear; }
    .timer-inner { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; }
    .timer-display {
      font-size: 2.8rem; font-weight: 200; color: var(--text-1);
      font-variant-numeric: tabular-nums; letter-spacing: -1px;
    }
    .timer-label { font-size:0.7rem; color:var(--text-3); text-transform:uppercase; letter-spacing:.6px; margin-top:2px; }

    .controls { display: flex; gap: 10px; justify-content: center; margin-top: 16px; }
    .btn { padding: 10px 20px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.06); color: #e5eef8; cursor: pointer; font-weight: 600; font-size:0.88rem; transition: all 0.2s; }
    .btn:hover { background: rgba(255,255,255,0.12); transform: scale(1.02); }
    .btn.primary { background: var(--blue); border-color: transparent; box-shadow:0 4px 14px rgba(0,112,243,0.3); }
    .btn.primary:hover { background: #0080ff; }
    .btn.pause-active { background:rgba(245,158,11,0.15); border-color:rgba(245,158,11,0.4); color:#fbbf24; }

    /* ── Breathing guide ── */
    .breathing-guide { text-align: center; margin: 16px 0 8px; display: none; }
    .breathing-guide.active { display: block; }
    .breathing-rings { position:relative; width:160px; height:160px; margin:0 auto 16px; display:flex; align-items:center; justify-content:center; }
    .b-ring {
      position:absolute; border-radius:50%; border:2px solid;
      transition: transform 0.6s ease, opacity 0.6s ease;
    }
    .b-ring-1 { width:80px;  height:80px;  border-color:rgba(96,165,250,0.7);  background:rgba(96,165,250,0.08); }
    .b-ring-2 { width:110px; height:110px; border-color:rgba(96,165,250,0.35); background:rgba(96,165,250,0.04); }
    .b-ring-3 { width:140px; height:140px; border-color:rgba(96,165,250,0.15); background:transparent; }
    .b-core  { width:30px;  height:30px;   border-radius:50%; background:radial-gradient(circle,rgba(96,165,250,0.8),rgba(96,165,250,0.2)); box-shadow:0 0 20px rgba(96,165,250,0.4); z-index:1; transition:transform 0.6s ease; }

    /* Phase animations */
    .breathing-rings.inhale .b-ring-1 { transform:scale(1.3); }
    .breathing-rings.inhale .b-ring-2 { transform:scale(1.2); }
    .breathing-rings.inhale .b-ring-3 { transform:scale(1.1); opacity:0.8; }
    .breathing-rings.inhale .b-core  { transform:scale(1.4); }
    .breathing-rings.hold   .b-ring-1 { transform:scale(1.3); opacity:0.8; }
    .breathing-rings.hold   .b-ring-2 { transform:scale(1.2); opacity:0.6; }
    .breathing-rings.hold   .b-core  { transform:scale(1.4); }
    .breathing-rings.exhale .b-ring-1 { transform:scale(0.85); }
    .breathing-rings.exhale .b-ring-2 { transform:scale(0.9); }
    .breathing-rings.exhale .b-ring-3 { transform:scale(0.95); opacity:0.5; }
    .breathing-rings.exhale .b-core  { transform:scale(0.85); }

    .breathing-phase-label {
      font-size:0.72rem; text-transform:uppercase; letter-spacing:.8px; font-weight:700;
      color:var(--text-3); margin-bottom:4px;
    }
    .breathing-text { font-size: 1.1rem; color: #9fb5ff; font-weight: 500; }
    .breathing-progress { display:flex; gap:6px; justify-content:center; margin-top:10px; }
    .bp-dot { width:6px; height:6px; border-radius:50%; background:rgba(255,255,255,0.15); transition:background .3s, transform .3s; }
    .bp-dot.active { background:var(--blue-light); transform:scale(1.3); }

    .stats-bar { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 12px; margin-top: 20px; }
    .stat-card { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 14px; text-align: center; }
    .stat-value { font-size: 1.5rem; font-weight: 700; color: var(--blue-light); }
    .stat-label { font-size: 0.78rem; color: var(--text-2); margin-top: 4px; }
    .toast { position:fixed; top:22px; left:50%; transform:translate(-50%,-130px); background:rgba(16,185,129,.92); color:#fff; padding:10px 20px; border-radius:10px; font-weight:600; z-index:99999; transition:transform .3s ease; font-size:.88rem; white-space:nowrap; }
    .toast.show { transform:translate(-50%,0); }
    .toast.error { background:rgba(239,68,68,.92); }
    /* ── Ambient sounds ── */
    .ambient-section { margin:20px 0 4px; }
    .ambient-label { font-size:0.7rem; text-transform:uppercase; letter-spacing:.6px; color:#7ba3c8; font-weight:600; margin-bottom:8px; }
    .ambient-grid { display:flex; gap:8px; flex-wrap:wrap; }
    .amb-btn {
      padding:7px 14px; border-radius:999px; font-size:0.82rem; cursor:pointer; transition:all .2s;
      border:1px solid rgba(255,255,255,0.12); background:rgba(255,255,255,0.05); color:#aab7cf;
      display:flex; align-items:center; gap:5px;
    }
    .amb-btn:hover { background:rgba(255,255,255,0.1); }
    .amb-btn.active { background:rgba(59,130,246,0.2); border-color:#3b82f6; color:#93c5fd; }
    .amb-volume { display:flex; align-items:center; gap:8px; margin-top:10px; }
    .amb-volume label { font-size:0.75rem; color:#7ba3c8; white-space:nowrap; }
    .amb-volume input[type=range] { flex:1; accent-color:#3b82f6; cursor:pointer; }
  </style>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.birds.min.js"></script>
  <script type="module">
    import { updateGlobalAvatar } from '/js/common.js';
    import { showXpFloat } from '/js/xp.js';
    import { initUserMenu } from '/js/userMenu.js';
    import { onAuthStateChanged, getAuth } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';
    import { getFirestore, doc, getDoc, setDoc, updateDoc, increment } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

    let auth, db;
    if (window._cyfFirebase) {
      ({ auth, db } = window._cyfFirebase);
    } else {
      const { initializeApp } = await import('https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js');
      const config = { apiKey: "AIzaSyCvEtaivyC5QD0dGyPKh97IgYU8U8QrrWg", authDomain: "changeyourlife-cc210.firebaseapp.com", projectId: "changeyourlife-cc210", storageBucket: "changeyourlife-cc210.appspot.com", messagingSenderId: "801720080785", appId: "1:801720080785:web:1a74aadba5755ea26c2230" };
      const app = initializeApp(config);
      auth = getAuth(app);
      db = getFirestore(app);
      window._cyfFirebase = { app, auth, db };
    }

    try { initUserMenu(); } catch(e) {}

    window.addEventListener('DOMContentLoaded', () => {
      VANTA.BIRDS({ el:'#vanta-birds-bg', mouseControls: true, touchControls: true, backgroundColor:0x07192f, quantity:4.0 });
      try { updateGlobalAvatar(); } catch(e){}
    });

    const sessions = [
      { id:'calm', title:'Calme & Sérénité', desc:'Apaise ton esprit, relâche les tensions', duration:5, icon:'🌊', type:'guided', color:'#2dd4bf' },
      { id:'focus', title:'Focus & Concentration', desc:'Clarifie ton mental, améliore ta productivité', duration:10, icon:'🎯', type:'guided', color:'#0070f3' },
      { id:'sleep', title:'Sommeil profond', desc:'Prépare-toi à une nuit réparatrice', duration:15, icon:'🌙', type:'guided', color:'#a78bfa' },
      { id:'gratitude', title:'Gratitude & Positivité', desc:'Cultive la reconnaissance et la joie', duration:7, icon:'✨', type:'guided', color:'#fbbf24' },
      { id:'breathing', title:'Respiration 4-7-8', desc:'Technique rapide pour réduire le stress', duration:5, icon:'💨', type:'breathing', color:'#60a5fa' },
      { id:'body-scan', title:'Body Scan', desc:'Relaxe chaque partie de ton corps', duration:12, icon:'🧘', type:'guided', color:'#f87171' }
    ];

    let currentSession = null;
    let timer = null;
    let elapsed = 0;
    let paused = false;
    let uid = null;
    let breathingActive = false;

    // ── Ambient sound engine (Web Audio API) ─────────────────────────────────
    let ambCtx = null, ambGain = null, ambNodes = [];
    let currentAmbient = 'none';

    function getAmbCtx() {
      if (!ambCtx) { ambCtx = new (window.AudioContext || window.webkitAudioContext)(); }
      return ambCtx;
    }

    function stopAmbient() {
      ambNodes.forEach(n => { try { n.stop(); } catch(e){} try { n.disconnect(); } catch(e){} });
      ambNodes = [];
      if (ambGain) { try { ambGain.disconnect(); } catch(e){} ambGain = null; }
    }

    function startAmbient(type) {
      stopAmbient();
      if (type === 'none') return;
      const ctx = getAmbCtx();
      if (ctx.state === 'suspended') ctx.resume();
      ambGain = ctx.createGain();
      const vol = (document.getElementById('amb-volume')?.value || 40) / 100 * 0.6;
      ambGain.gain.setValueAtTime(vol, ctx.currentTime);
      ambGain.connect(ctx.destination);

      if (type === 'white') {
        const buf = createNoiseBuf(ctx, 3);
        const src = ctx.createBufferSource(); src.buffer = buf; src.loop = true;
        const filter = ctx.createBiquadFilter(); filter.type = 'lowpass'; filter.frequency.value = 1800;
        src.connect(filter); filter.connect(ambGain); src.start();
        ambNodes = [src];
      } else if (type === 'rain') {
        // Rain = white noise + lowpass + LFO for intensity variation
        const buf = createNoiseBuf(ctx, 3);
        const src = ctx.createBufferSource(); src.buffer = buf; src.loop = true;
        const filter = ctx.createBiquadFilter(); filter.type = 'bandpass'; filter.frequency.value = 600; filter.Q.value = 0.8;
        const lfo = ctx.createOscillator(); lfo.frequency.value = 0.3;
        const lfoGain = ctx.createGain(); lfoGain.gain.value = 0.15;
        lfo.connect(lfoGain); lfoGain.connect(ambGain.gain);
        src.connect(filter); filter.connect(ambGain); src.start(); lfo.start();
        ambNodes = [src, lfo];
      } else if (type === 'ocean') {
        // Ocean = noise + very slow LFO (wave rhythm)
        const buf = createNoiseBuf(ctx, 5);
        const src = ctx.createBufferSource(); src.buffer = buf; src.loop = true;
        const filter = ctx.createBiquadFilter(); filter.type = 'lowpass'; filter.frequency.value = 400;
        const lfo = ctx.createOscillator(); lfo.type = 'sine'; lfo.frequency.value = 0.1;
        const lfoGain = ctx.createGain(); lfoGain.gain.value = 0.3;
        lfo.connect(lfoGain); lfoGain.connect(ambGain.gain);
        src.connect(filter); filter.connect(ambGain); src.start(); lfo.start();
        // Add a second layer
        const buf2 = createNoiseBuf(ctx, 3);
        const src2 = ctx.createBufferSource(); src2.buffer = buf2; src2.loop = true;
        const f2 = ctx.createBiquadFilter(); f2.type = 'highpass'; f2.frequency.value = 800;
        const g2 = ctx.createGain(); g2.gain.value = 0.15;
        src2.connect(f2); f2.connect(g2); g2.connect(ambGain); src2.start();
        ambNodes = [src, src2, lfo];
      } else if (type === 'forest') {
        // Forest = filtered noise + occasional chirp tones
        const buf = createNoiseBuf(ctx, 4);
        const src = ctx.createBufferSource(); src.buffer = buf; src.loop = true;
        const filter = ctx.createBiquadFilter(); filter.type = 'bandpass'; filter.frequency.value = 1200; filter.Q.value = 0.5;
        const g = ctx.createGain(); g.gain.value = 0.3;
        src.connect(filter); filter.connect(g); g.connect(ambGain); src.start();
        // Periodic bird chirp
        function chirp() {
          const o = ctx.createOscillator(); const og = ctx.createGain();
          o.frequency.value = 1800 + Math.random() * 1200;
          o.type = 'sine'; og.gain.setValueAtTime(0.12, ctx.currentTime);
          og.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.3);
          o.connect(og); og.connect(ambGain); o.start(); o.stop(ctx.currentTime + 0.3);
        }
        const iv = setInterval(() => { if (ambNodes.length && ambCtx) chirp(); else clearInterval(iv); }, 1500 + Math.random()*2000);
        ambNodes = [src];
      }
    }

    function createNoiseBuf(ctx, seconds) {
      const sr = ctx.sampleRate, len = sr * seconds;
      const buf = ctx.createBuffer(1, len, sr);
      const data = buf.getChannelData(0);
      for (let i = 0; i < len; i++) data[i] = Math.random() * 2 - 1;
      return buf;
    }

    // Wire sound buttons
    document.querySelectorAll('.amb-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.amb-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentAmbient = btn.dataset.sound;
        if (timer) startAmbient(currentAmbient); // only start if session active
      });
    });
    document.getElementById('amb-volume')?.addEventListener('input', e => {
      if (ambGain) ambGain.gain.setValueAtTime((e.target.value / 100) * 0.6, getAmbCtx().currentTime);
    });

    function showToast(msg, err = false) {
      const t = document.getElementById('toast');
      t.textContent = msg; t.className = `toast${err?' error':''} show`;
      setTimeout(() => t.classList.remove('show'), 2800);
    }

    onAuthStateChanged(auth, async (user) => {
      if (!user) { window.location.href = '/login'; return; }
      uid = user.uid;
      renderSessions();
      await loadStats();
    });

    function renderSessions() {
      const grid = document.getElementById('sessions-grid');
      grid.innerHTML = sessions.map(s => `
        <div class="session-card" data-id="${s.id}" style="--card-color:${s.color}">
          <div class="session-duration">${s.duration} min</div>
          <div class="session-icon">${s.icon}</div>
          <div class="session-title">${s.title}</div>
          <div class="session-desc">${s.desc}</div>
        </div>
      `).join('');
      grid.querySelectorAll('.session-card').forEach(card => {
        card.addEventListener('click', () => selectSession(sessions.find(s => s.id === card.dataset.id)));
      });
    }

    function selectSession(session) {
      // Stop any running session first
      if (timer) { clearInterval(timer); timer = null; }
      breathingActive = false;
      currentSession = session;
      document.querySelectorAll('.session-card').forEach(c => c.classList.remove('active', 'playing'));
      document.querySelector(`[data-id="${session.id}"]`)?.classList.add('active');
      document.getElementById('player-title').textContent = session.title;
      document.getElementById('player-subtitle').textContent = session.desc;
      const min = String(session.duration).padStart(2,'0');
      document.getElementById('timer').textContent = `${min}:00`;
      document.getElementById('player').classList.add('active');
      elapsed = 0; paused = false;
      const btnStart = document.getElementById('btn-start');
      const btnPause = document.getElementById('btn-pause');
      btnStart.style.display = 'inline-block'; btnStart.textContent = 'Démarrer';
      btnPause.style.display = 'none'; btnPause.textContent = 'Pause';
      btnPause.classList.remove('pause-active');
      document.getElementById('breathing-guide').classList.remove('active');
      resetTimerUI();
    }

    document.getElementById('btn-start').addEventListener('click', startSession);
    document.getElementById('btn-pause').addEventListener('click', togglePause);
    document.getElementById('btn-stop').addEventListener('click', stopSession);

    function startSession() {
      if (!currentSession) return;
      paused = false;
      startAmbient(currentAmbient);
      const btnStart = document.getElementById('btn-start');
      const btnPause = document.getElementById('btn-pause');
      btnStart.style.display = 'none';
      btnPause.style.display = 'inline-block';
      btnPause.classList.remove('pause-active');
      document.querySelector(`[data-id="${currentSession.id}"]`)?.classList.add('playing');
      if (currentSession.type === 'breathing') {
        document.getElementById('breathing-guide').classList.add('active');
        breathingActive = true;
        startBreathingCycle();
      }
      const totalSec = currentSession.duration * 60;
      timer = setInterval(() => {
        if (paused) return;
        elapsed++;
        const remaining = totalSec - elapsed;
        if (remaining <= 0) { completeSession(); return; }
        const min = Math.floor(remaining / 60);
        const sec = remaining % 60;
        document.getElementById('timer').textContent = `${String(min).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
        // Update ring progress (circumference ≈ 440 for r=70)
        const pct = elapsed / totalSec;
        document.getElementById('timer-ring-fill').style.strokeDashoffset = 440 * (1 - pct);
      }, 1000);
    }

    function togglePause() {
      paused = !paused;
      const btn = document.getElementById('btn-pause');
      btn.textContent = paused ? 'Reprendre' : 'Pause';
      btn.classList.toggle('pause-active', paused);
    }

    function resetTimerUI() {
      document.getElementById('timer-ring-fill').style.strokeDashoffset = 440;
      document.getElementById('timer-label').textContent = 'restant';
      document.getElementById('breathing-rings')?.classList.remove('inhale','hold','exhale');
    }

    function stopSession() {
      clearInterval(timer); timer = null;
      stopAmbient();
      breathingActive = false;
      elapsed = 0; paused = false;
      document.getElementById('btn-start').style.display = 'inline-block';
      document.getElementById('btn-pause').style.display = 'none';
      document.getElementById('btn-pause').classList.remove('pause-active');
      document.getElementById('breathing-guide').classList.remove('active');
      document.querySelectorAll('.session-card').forEach(c => c.classList.remove('playing'));
      resetTimerUI();
      if (currentSession) {
        const min = String(currentSession.duration).padStart(2,'0');
        document.getElementById('timer').textContent = `${min}:00`;
      }
    }

    async function completeSession() {
      clearInterval(timer); timer = null;
      stopAmbient();
      breathingActive = false;
      document.getElementById('timer').textContent = '✓';
      document.getElementById('timer-label').textContent = 'Terminé !';
      document.getElementById('timer-ring-fill').style.strokeDashoffset = 0;
      document.getElementById('btn-start').style.display = 'inline-block';
      document.getElementById('btn-pause').style.display = 'none';
      document.getElementById('btn-pause').classList.remove('pause-active');
      document.getElementById('breathing-guide').classList.remove('active');
      document.getElementById('breathing-rings')?.classList.remove('inhale','hold','exhale');
      document.querySelectorAll('.session-card').forEach(c => c.classList.remove('playing'));
      showToast(`🧘 Session terminée — ${currentSession.duration} min ✓`);
      try { showXpFloat(15, document.getElementById('timer')); } catch(e) {}

      try {
        const userRef = doc(db, 'users', uid);
        // Calculate streak
        const snap = await getDoc(doc(db, 'users', uid));
        const med = snap.exists() ? (snap.data().meditation || {}) : {};
        const today = new Date().toDateString();
        const yesterday = new Date(Date.now() - 86400000).toDateString();
        const lastDay = med.lastSessionAt ? new Date(med.lastSessionAt).toDateString() : null;
        let streak = med.streak || 0;
        if (lastDay === today) { /* already practiced today — keep streak */ }
        else if (lastDay === yesterday) { streak += 1; }
        else { streak = 1; }

        await updateDoc(userRef, {
          'meditation.totalSessions': increment(1),
          'meditation.totalMinutes': increment(currentSession.duration),
          'meditation.lastSessionAt': Date.now(),
          'meditation.streak': streak,
          'levels.body.xp': increment(15)
        });
        await loadStats();
      } catch(e) {
        try {
          const userRef = doc(db, 'users', uid);
          await setDoc(userRef, { meditation: { totalSessions:1, totalMinutes:currentSession.duration, lastSessionAt:Date.now(), streak:1 }, levels: { body: { xp: 15 } }}, {merge:true});
          await loadStats();
        } catch(e2) {}
      }
    }

    async function loadStats() {
      try {
        const snap = await getDoc(doc(db, 'users', uid));
        if (snap.exists()) {
          const med = snap.data().meditation || {};
          document.getElementById('stat-total').textContent = med.totalSessions || 0;
          document.getElementById('stat-time').textContent = `${med.totalMinutes || 0} min`;
          document.getElementById('stat-streak').textContent = calculateStreak(med);
        }
      } catch(e) {}
    }

    function calculateStreak(med) {
      if (!med || !med.lastSessionAt) return 0;
      const today = new Date().toDateString();
      const yesterday = new Date(Date.now() - 86400000).toDateString();
      const lastDay = new Date(med.lastSessionAt).toDateString();
      if (lastDay === today || lastDay === yesterday) return med.streak || 1;
      return 0;
    }

    function startBreathingCycle() {
      const phases = [
        { text: 'Inspire profondément…', label: 'Inspiration', cls: 'inhale', duration: 4000, dot: 0 },
        { text: 'Retiens ta respiration…', label: 'Rétention', cls: 'hold', duration: 7000, dot: 1 },
        { text: 'Expire lentement…', label: 'Expiration', cls: 'exhale', duration: 8000, dot: 2 }
      ];
      let idx = 0;
      const rings = document.getElementById('breathing-rings');
      const cycle = () => {
        if (!breathingActive) return;
        if (paused) { setTimeout(cycle, 500); return; }
        const p = phases[idx];
        document.getElementById('breathing-text').textContent = p.text;
        document.getElementById('breathing-phase-label').textContent = p.label;
        // Update rings class
        if (rings) { rings.classList.remove('inhale','hold','exhale'); rings.classList.add(p.cls); }
        // Update progress dots
        document.querySelectorAll('.bp-dot').forEach((d,i) => d.classList.toggle('active', i === p.dot));
        const dur = p.duration;
        idx = (idx + 1) % phases.length;
        setTimeout(cycle, dur);
      };
      cycle();
    }
  </script>
</body>
</html>
