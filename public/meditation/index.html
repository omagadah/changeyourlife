<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Méditation guidée - Change Your Life</title>
  <link rel="stylesheet" href="/css/main.min.css" />
  <style>
    body { color:#e5eef8; }
    .page-shell { position: fixed; inset: 20px; background: var(--glass-bg); backdrop-filter: blur(15px); border-radius: 20px; border: 1px solid var(--glass-border); padding: 20px; display: grid; grid-template-rows: auto 1fr; gap: 16px; overflow: hidden; }
    .header-bar { display: flex; justify-content: space-between; align-items: center; }
    .header-bar h1 { margin: 0; font-size: 1.4rem; }
    .content-area { overflow-y: auto; display: grid; gap: 20px; }
    /* ── Accueil Syl (humeur → reco) ── */
    .lya-accueil { display:flex; gap:14px; align-items:flex-start; padding:16px 18px; border-radius:16px;
      background:linear-gradient(135deg,rgba(99,102,241,0.14),rgba(45,212,191,0.06)); border:1px solid rgba(99,102,241,0.22); }
    .la-orb { width:42px; height:42px; flex-shrink:0; border-radius:50%;
      background:radial-gradient(circle at 36% 32%,#fbe6b0,#e7b15c 40%,#4a7a3a 100%);
      box-shadow:0 0 18px rgba(231,177,92,.5), inset 0 0 10px rgba(255,255,255,.25); }
    .la-name { font-size:0.64rem; font-weight:800; letter-spacing:1px; text-transform:uppercase; color:#9db8ff; }
    .la-line { font-size:0.95rem; color:#e5eef8; line-height:1.4; margin:2px 0 10px; }
    .la-moods { display:flex; flex-wrap:wrap; gap:8px; }
    .la-moods button { padding:7px 13px; border-radius:99px; border:1px solid rgba(255,255,255,0.12);
      background:rgba(255,255,255,0.05); color:#c8d9f0; font-size:0.82rem; font-weight:600; cursor:pointer; font-family:inherit; transition:all .15s; }
    .la-moods button:hover { background:rgba(99,102,241,0.18); border-color:rgba(99,102,241,0.5); transform:translateY(-1px); }
    .sessions-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 18px; }
    /* ── Session cards ── */
    .session-card {
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.09);
      border-radius: 16px; padding: 18px; cursor: pointer;
      transition: all 0.25s var(--ease); position: relative; overflow: hidden;
    }
    .session-card::after {
      content:''; position:absolute; bottom:0; left:0; right:0; height:2px;
      background: var(--card-color, transparent); opacity: 0.6;
      transition: opacity 0.2s;
    }
    .session-card:hover { background: rgba(255,255,255,0.07); transform: translateY(-3px); box-shadow: 0 10px 28px rgba(0,0,0,0.25); }
    .session-card:hover::after { opacity: 1; }
    .session-card.active { border-color: rgba(59,130,246,0.4); background: rgba(59,130,246,0.08); }
    .session-card.playing { border-color: rgba(16,185,129,0.4); background: rgba(16,185,129,0.07); }
    .session-icon { font-size: 2.2rem; margin-bottom: 10px; }
    .session-title { font-weight: 700; font-size: 1rem; margin-bottom: 5px; letter-spacing: -0.2px; }
    .session-desc { font-size: 0.83rem; color: var(--text-2); line-height: 1.45; }
    .session-duration {
      position: absolute; top: 12px; right: 12px;
      background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.1);
      padding: 3px 8px; border-radius: 20px; font-size: 0.72rem; font-weight: 600; color: var(--text-2);
    }

    /* ── Player panel ── */
    .player-panel {
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px; padding: 28px 24px; display: none;
    }
    .player-panel.active { display: block; }
    .player-header { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:4px; }
    .player-title { font-size: 1.15rem; font-weight: 700; letter-spacing: -0.3px; }
    .player-subtitle { color: var(--text-2); font-size: 0.85rem; margin-bottom: 20px; }

    /* ── Timer with circular progress ── */
    .timer-wrap { display:flex; justify-content:center; margin: 20px 0; }
    .timer-ring { position:relative; width:160px; height:160px; }
    .timer-ring svg { position:absolute; top:0; left:0; transform:rotate(-90deg); }
    .timer-ring-bg { stroke:rgba(255,255,255,0.06); fill:none; stroke-width:4; }
    .timer-ring-fill { stroke:var(--blue); fill:none; stroke-width:4; stroke-linecap:round;
      stroke-dasharray:440; stroke-dashoffset:440; transition:stroke-dashoffset 0.9s linear; }
    .timer-inner { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; }
    .timer-display {
      font-size: 2.8rem; font-weight: 200; color: var(--text-1);
      font-variant-numeric: tabular-nums; letter-spacing: -1px;
    }
    .timer-label { font-size:0.7rem; color:var(--text-3); text-transform:uppercase; letter-spacing:.6px; margin-top:2px; }

    .controls { display: flex; gap: 10px; justify-content: center; margin-top: 16px; }
    .btn { padding: 10px 20px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.06); color: #e5eef8; cursor: pointer; font-weight: 600; font-size:0.88rem; transition: all 0.2s; }
    .btn:hover { background: rgba(255,255,255,0.12); transform: scale(1.02); }
    .btn.primary { background: var(--blue); border-color: transparent; box-shadow:0 4px 14px rgba(0,112,243,0.3); }
    .btn.primary:hover { background: #0080ff; }
    .btn.pause-active { background:rgba(245,158,11,0.15); border-color:rgba(245,158,11,0.4); color:#fbbf24; }

    /* ── Breathing guide ── */
    .breathing-guide { text-align: center; margin: 16px 0 8px; display: none; }
    .breathing-guide.active { display: block; }
    .breathing-rings { position:relative; width:160px; height:160px; margin:0 auto 16px; display:flex; align-items:center; justify-content:center; }
    .b-ring {
      position:absolute; border-radius:50%; border:2px solid;
      transition: transform 0.6s ease, opacity 0.6s ease;
    }
    .b-ring-1 { width:80px;  height:80px;  border-color:rgba(96,165,250,0.7);  background:rgba(96,165,250,0.08); }
    .b-ring-2 { width:110px; height:110px; border-color:rgba(96,165,250,0.35); background:rgba(96,165,250,0.04); }
    .b-ring-3 { width:140px; height:140px; border-color:rgba(96,165,250,0.15); background:transparent; }
    .b-core  { width:30px;  height:30px;   border-radius:50%; background:radial-gradient(circle,rgba(96,165,250,0.8),rgba(96,165,250,0.2)); box-shadow:0 0 20px rgba(96,165,250,0.4); z-index:1; transition:transform 0.6s ease; }

    /* Phase animations */
    .breathing-rings.inhale .b-ring-1 { transform:scale(1.3); }
    .breathing-rings.inhale .b-ring-2 { transform:scale(1.2); }
    .breathing-rings.inhale .b-ring-3 { transform:scale(1.1); opacity:0.8; }
    .breathing-rings.inhale .b-core  { transform:scale(1.4); }
    .breathing-rings.hold   .b-ring-1 { transform:scale(1.3); opacity:0.8; }
    .breathing-rings.hold   .b-ring-2 { transform:scale(1.2); opacity:0.6; }
    .breathing-rings.hold   .b-core  { transform:scale(1.4); }
    .breathing-rings.exhale .b-ring-1 { transform:scale(0.85); }
    .breathing-rings.exhale .b-ring-2 { transform:scale(0.9); }
    .breathing-rings.exhale .b-ring-3 { transform:scale(0.95); opacity:0.5; }
    .breathing-rings.exhale .b-core  { transform:scale(0.85); }

    .breathing-phase-label {
      font-size:0.72rem; text-transform:uppercase; letter-spacing:.8px; font-weight:700;
      color:var(--text-3); margin-bottom:4px;
    }
    .breathing-text { font-size: 1.1rem; color: #9fb5ff; font-weight: 500; }
    .breathing-progress { display:flex; gap:6px; justify-content:center; margin-top:10px; }
    .bp-dot { width:6px; height:6px; border-radius:50%; background:rgba(255,255,255,0.15); transition:background .3s, transform .3s; }
    .bp-dot.active { background:var(--blue-light); transform:scale(1.3); }

    .stats-bar { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 12px; margin-top: 20px; }
    .stat-card { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 14px; text-align: center; }
    .stat-value { font-size: 1.5rem; font-weight: 700; color: var(--blue-light); }
    .stat-label { font-size: 0.78rem; color: var(--text-2); margin-top: 4px; }
    .toast { position:fixed; top:22px; left:50%; transform:translate(-50%,-130px); background:rgba(16,185,129,.92); color:#fff; padding:10px 20px; border-radius:10px; font-weight:600; z-index:99999; transition:transform .3s ease; font-size:.88rem; white-space:nowrap; }
    .toast.show { transform:translate(-50%,0); }
    .toast.error { background:rgba(239,68,68,.92); }
    /* ── Ambient sounds ── */
    .ambient-section { margin:20px 0 4px; }
    .ambient-label { font-size:0.7rem; text-transform:uppercase; letter-spacing:.6px; color:#7ba3c8; font-weight:600; margin-bottom:8px; }
    .ambient-grid { display:flex; gap:8px; flex-wrap:wrap; }
    .amb-btn {
      padding:7px 14px; border-radius:999px; font-size:0.82rem; cursor:pointer; transition:all .2s;
      border:1px solid rgba(255,255,255,0.12); background:rgba(255,255,255,0.05); color:#aab7cf;
      display:flex; align-items:center; gap:5px;
    }
    .amb-btn:hover { background:rgba(255,255,255,0.1); }
    .amb-btn.active { background:rgba(59,130,246,0.2); border-color:#3b82f6; color:#93c5fd; }
    .amb-volume { display:flex; align-items:center; gap:8px; margin-top:10px; }
    .amb-volume label { font-size:0.75rem; color:#7ba3c8; white-space:nowrap; }
    .amb-volume input[type=range] { flex:1; accent-color:#3b82f6; cursor:pointer; }

    /* ── Custom duration card ── */
    .custom-duration-wrap { display:none; margin-top:10px; align-items:center; gap:10px; flex-wrap:wrap; }
    .custom-duration-wrap.open { display:flex; }
    .custom-duration-input {
      width:80px; background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.15);
      border-radius:8px; padding:7px 10px; color:#e5eef8; font-size:0.9rem; text-align:center; outline:none;
      transition: border-color .2s;
    }
    .custom-duration-input:focus { border-color: rgba(59,130,246,.5); }

    /* ── Session history ── */
    .history-section { margin-top:8px; }
    .history-title {
      font-size:0.72rem; text-transform:uppercase; letter-spacing:.6px; color:#4a6a8a;
      font-weight:700; margin-bottom:10px; display:flex; align-items:center; gap:6px;
    }
    .history-list { display:flex; flex-direction:column; gap:6px; }
    .history-item {
      display:flex; align-items:center; gap:10px;
      background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.07);
      border-radius:10px; padding:9px 14px;
    }
    .history-icon { font-size:1.3rem; flex-shrink:0; }
    .history-info { flex:1; min-width:0; }
    .history-name { font-size:0.85rem; font-weight:600; color:#c8d9f0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .history-date { font-size:0.72rem; color:#4a6a8a; margin-top:1px; }
    .history-dur { font-size:0.8rem; font-weight:700; color:#3b82f6; flex-shrink:0; }

    /* ── Mobile ── */
    @media (max-width:600px) {
      .page-shell { inset:8px; padding:14px 12px; border-radius:16px; }
      .sessions-grid { grid-template-columns: 1fr; }
      .header-bar { flex-direction:column; align-items:flex-start; gap:8px; }
      .timer-ring { width:130px; height:130px; }
      .timer-ring svg { width:130px; height:130px; }
      .timer-display { font-size:1.6rem; }
      .session-detail { padding:16px; }
      .breathing-rings { width:180px; height:180px; }
      .amb-btns { flex-wrap:wrap; }
    }
  </style>
  <meta name="robots" content="index,follow" />
  <meta name="description" content="Méditation guidée avec sessions personnalisées, exercices de respiration et sons d'ambiance pour progresser dans votre bien-être." />
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/png" sizes="96x96" href="/favicon-96x96.png">
  <link rel="icon" href="/favicon.ico">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <meta name="theme-color" content="#0070f3">
  <meta name="msapplication-TileColor" content="#07192f">
</head>
<body>
  <div id="vanta-birds-bg"></div>
  <div id="toast" class="toast"></div>
  <nav class="site-nav">
    <a href="/app/" class="site-nav__back">← Mon espace</a>
    <button class="user-panel-trigger" title="Mon Compte" aria-label="Ouvrir le menu">
      <svg data-cyf-logo="1" viewBox="0 0 200 120" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" style="width:36px;height:36px;display:block;border-radius:6px;"><g stroke-width="3"><circle cx="60" cy="60" r="40" fill="black" stroke="#3399ff" stroke-width="8"/><line x1="100" y1="60" x2="130" y2="30" stroke="white"/><line x1="100" y1="60" x2="130" y2="60" stroke="white"/><line x1="100" y1="60" x2="130" y2="90" stroke="white"/><circle cx="150" cy="30" r="18" fill="none" stroke="white"/><circle cx="150" cy="60" r="18" fill="none" stroke="white"/><circle cx="150" cy="90" r="18" fill="none" stroke="white"/></g></svg>
    </button>
  </nav>
  <main class="page-shell page-shell-nav">
    <div class="header-bar">
      <div>
        <h1>🧘 Méditation guidée</h1>
        <div style="font-size:0.85rem;color:#aab7cf">Trouve ta sérénité, respire, progresse</div>
      </div>
    </div>
    <div class="content-area">
      <!-- Accueil Syl : on cale l'humeur avant de proposer un mode -->
      <div class="lya-accueil">
        <div class="la-orb" aria-hidden="true"></div>
        <div style="flex:1;min-width:0">
          <div class="la-name">Syl</div>
          <div class="la-line" id="la-line">Avant de méditer - comment te sens-tu, là, maintenant ?</div>
          <div class="la-moods" id="la-moods">
            <button data-mood="stress">😣 Stressé</button>
            <button data-mood="agite">😵‍💫 Agité</button>
            <button data-mood="fatigue">😴 Fatigué</button>
            <button data-mood="triste">😔 Triste</button>
            <button data-mood="sens">🌌 En quête de sens</button>
            <button data-mood="bien">🙂 Plutôt bien</button>
          </div>
        </div>
      </div>
      <div id="player" class="player-panel">
        <div class="player-header">
          <div>
            <div class="player-title" id="player-title">Session</div>
            <div class="player-subtitle" id="player-subtitle"></div>
          </div>
        </div>
        <div class="timer-wrap">
          <div class="timer-ring">
            <svg viewBox="0 0 160 160" width="160" height="160">
              <circle class="timer-ring-bg" cx="80" cy="80" r="70"/>
              <circle class="timer-ring-fill" id="timer-ring-fill" cx="80" cy="80" r="70"/>
            </svg>
            <div class="timer-inner">
              <div class="timer-display" id="timer">00:00</div>
              <div class="timer-label" id="timer-label">restant</div>
            </div>
          </div>
        </div>
        <div class="breathing-guide" id="breathing-guide">
          <div class="breathing-rings" id="breathing-rings">
            <div class="b-ring b-ring-3"></div>
            <div class="b-ring b-ring-2"></div>
            <div class="b-ring b-ring-1"></div>
            <div class="b-core"></div>
          </div>
          <div class="breathing-phase-label" id="breathing-phase-label">Respiration guidée</div>
          <div class="breathing-text" id="breathing-text">Inspire...</div>
          <div class="breathing-progress" id="breathing-progress">
            <div class="bp-dot active" id="bp-0"></div>
            <div class="bp-dot" id="bp-1"></div>
            <div class="bp-dot" id="bp-2"></div>
          </div>
        </div>
        <!-- ── Sons ambiants ── -->
        <div class="ambient-section">
          <div class="ambient-label">🎵 Son d'ambiance</div>
          <div class="ambient-grid">
            <button class="amb-btn active" data-sound="none">🔇 Silence</button>
            <button class="amb-btn" data-sound="rain">🌧 Pluie</button>
            <button class="amb-btn" data-sound="ocean">🌊 Océan</button>
            <button class="amb-btn" data-sound="forest">🌿 Forêt</button>
            <button class="amb-btn" data-sound="white">📻 Bruit blanc</button>
          </div>
          <div class="amb-volume">
            <label>Volume</label>
            <input type="range" id="amb-volume" min="0" max="100" value="40" />
          </div>
        </div>
        <div class="controls">
          <button class="btn primary" id="btn-start">Démarrer</button>
          <button class="btn" id="btn-pause" style="display:none">Pause</button>
          <button class="btn" id="btn-stop">Arrêter</button>
        </div>
      </div>
      <div class="sessions-grid" id="sessions-grid"></div>
      <!-- Custom duration -->
      <div class="custom-duration-wrap" id="custom-dur-wrap">
        <span style="font-size:0.85rem;color:#9fb5ff;font-weight:600">Durée :</span>
        <input type="number" class="custom-duration-input" id="custom-dur-input" min="1" max="120" value="20" />
        <span style="font-size:0.85rem;color:#7e9ab5">min</span>
        <button class="btn primary" id="custom-dur-confirm" style="padding:7px 16px;font-size:0.85rem">Commencer →</button>
      </div>
      <div class="stats-bar">
        <div class="stat-card">
          <div class="stat-value" id="stat-total">0</div>
          <div class="stat-label">Sessions complétées</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="stat-time">0 min</div>
          <div class="stat-label">Temps total</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="stat-streak">0</div>
          <div class="stat-label">Série actuelle (jours)</div>
        </div>
      </div>
      <!-- Session history -->
      <div class="history-section" id="history-section" style="display:none">
        <div class="history-title">🕐 Sessions récentes</div>
        <div class="history-list" id="history-list"></div>
      </div>
    </div>
  </main>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vanta@0.5.24/dist/vanta.birds.min.js"></script>
  <script type="module" src="/js/i18n.js"></script>
  <script type="module" src="/js/meditation.js"></script>
</body>
</html>
