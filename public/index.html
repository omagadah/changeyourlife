<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />

  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" type="image/png" sizes="96x96" href="/favicon-96x96.png" />
  <link rel="icon" href="/favicon.ico" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%; overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #060e1a; color: #eef4ff;
      -webkit-font-smoothing: antialiased;
    }
    body {
      background:
        radial-gradient(ellipse 70% 50% at 50% 0%, rgba(0,112,243,0.16), transparent 70%),
        radial-gradient(ellipse 80% 60% at 50% 105%, rgba(0,112,243,0.10), transparent 70%),
        #060e1a;
    }
    .scene { position: fixed; inset: 0; }

    /* ── Arbre 3D (fond plein écran) ── */
    #arbre-canvas {
      position: absolute; inset: 0; width: 100%; height: 100%;
      display: block; animation: fadein 1.8s ease 0.2s both;
    }
    @keyframes fadein { from { opacity: 0; } to { opacity: 1; } }
    .loading-veil {
      position: absolute; inset: 0; display: flex;
      align-items: center; justify-content: center;
      color: #4a6a8c; font-size: 0.85rem; letter-spacing: 1px;
      text-transform: uppercase; pointer-events: none;
      animation: pulse 1.6s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100% { opacity: 0.35; } 50% { opacity: 0.75; } }
    body.tree-ready .loading-veil { display: none; }

    /* ── Bandeau ── */
    .site-header {
      position: absolute; top: 0; left: 0; right: 0; z-index: 4;
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px clamp(20px, 5vw, 64px);
      animation: fadeDown 1s ease both;
    }
    @keyframes fadeDown { from { opacity: 0; transform: translateY(-12px); } to { opacity: 1; transform: none; } }
    .brand { display: flex; align-items: center; gap: 10px; }
    .brand img { width: 30px; height: 30px; }
    .brand-name { font-size: 1.05rem; font-weight: 800; letter-spacing: -0.2px; }
    .brand-name span { color: #60a5fa; }
    .header-login {
      font-size: 0.88rem; font-weight: 600; color: #8ba4c8;
      text-decoration: none; padding: 8px 16px; border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.12); transition: color .2s, border-color .2s, background .2s;
    }
    .header-login:hover { color: #eef4ff; border-color: rgba(0,112,243,0.4); background: rgba(0,112,243,0.1); }

    /* ── Titre de présentation (fixe, autour de l'arbre) ── */
    .headline {
      position: absolute; z-index: 3; pointer-events: none;
      top: clamp(88px, 13vh, 132px); left: clamp(20px, 5vw, 64px);
      max-width: min(33rem, 52vw);
      animation: fadeUp 1.1s ease 0.4s both;
    }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: none; } }
    .headline h1 {
      font-size: clamp(1.85rem, 4.6vw, 3.3rem); font-weight: 800;
      line-height: 1.1; letter-spacing: -1px;
      background: linear-gradient(135deg, #ffffff 30%, #7fb4ff);
      -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
    }
    .headline p {
      margin-top: 14px; font-size: clamp(0.92rem, 1.5vw, 1.05rem);
      line-height: 1.6; color: #8ba4c8; max-width: 27rem;
    }

    /* ── Lya (bas) ── */
    .lya {
      position: absolute; left: 0; right: 0; bottom: 0; z-index: 4;
      display: flex; align-items: flex-end; gap: 18px;
      padding: 24px clamp(20px, 5vw, 64px) 30px;
      background: linear-gradient(0deg, rgba(6,14,26,0.94) 32%, transparent);
      animation: rise 1.2s ease 0.6s both;
    }
    @keyframes rise { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: none; } }
    .lya-orb {
      width: 60px; height: 60px; flex-shrink: 0; border-radius: 50%;
      background: radial-gradient(circle at 38% 34%, #8fc2ff 0%, #2f7ef0 42%, #1a3a8c 100%);
      box-shadow: 0 0 32px rgba(47,126,240,0.6), inset 0 0 18px rgba(255,255,255,0.25);
      position: relative; animation: breathe 4.6s ease-in-out infinite;
    }
    .lya-orb::after {
      content: ''; position: absolute; inset: 0; border-radius: 50%;
      background: radial-gradient(circle at 64% 70%, rgba(255,255,255,0.35), transparent 45%);
    }
    @keyframes breathe {
      0%,100% { transform: scale(1);    box-shadow: 0 0 28px rgba(47,126,240,0.5), inset 0 0 18px rgba(255,255,255,0.22); }
      50%     { transform: scale(1.06); box-shadow: 0 0 44px rgba(47,126,240,0.8), inset 0 0 22px rgba(255,255,255,0.32); }
    }
    .lya-body { flex: 1; min-width: 0; max-width: 600px; }
    .lya-name {
      font-size: 0.72rem; font-weight: 700; letter-spacing: 1.4px;
      text-transform: uppercase; color: #60a5fa; margin-bottom: 4px;
    }
    .lya-line {
      font-size: clamp(1rem, 2.2vw, 1.4rem); font-weight: 500;
      line-height: 1.5; min-height: 2.2em; color: #eef4ff;
    }
    .lya-line::after {
      content: "▌"; color: #60a5fa; margin-left: 2px;
      animation: caret 1s steps(1) infinite;
    }
    @keyframes caret { 50% { opacity: 0; } }
    .actions { display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
    .btn-enter {
      padding: 14px 26px; border-radius: 14px; border: none;
      background: #0070f3; color: #fff; font-size: 0.95rem; font-weight: 700;
      font-family: inherit; cursor: pointer; text-decoration: none; white-space: nowrap;
      box-shadow: 0 6px 24px rgba(0,112,243,0.4); transition: transform .2s, filter .2s;
    }
    .btn-enter:hover { transform: translateY(-2px); filter: brightness(1.1); }
    .lya-voice {
      padding: 11px 14px; border-radius: 12px; cursor: pointer;
      background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);
      color: #8ba4c8; font-size: 0.82rem; font-family: inherit; white-space: nowrap;
      transition: background .2s, color .2s, border-color .2s;
    }
    .lya-voice:hover { background: rgba(255,255,255,0.1); color: #eef4ff; }
    .lya-voice.on { color: #60a5fa; border-color: rgba(0,112,243,0.4); background: rgba(0,112,243,0.12); }

    /* ── HUD : compteur XP + stade ── */
    .hud {
      position: absolute; z-index: 4; pointer-events: none; text-align: right;
      top: clamp(64px, 9vh, 88px); right: clamp(20px, 5vw, 64px);
      animation: fadeDown 1s ease 0.4s both;
    }
    .hud-stage {
      font-size: 0.7rem; font-weight: 700; letter-spacing: 1.2px;
      text-transform: uppercase; color: #60a5fa; margin-bottom: 2px;
    }
    .hud-xp {
      font-size: clamp(1.6rem, 3.2vw, 2.5rem); font-weight: 800; letter-spacing: -0.5px;
      background: linear-gradient(135deg, #ffffff, #7fb4ff);
      -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
    }
    .hud-xp small {
      font-size: 0.4em; font-weight: 700; color: #8ba4c8;
      -webkit-text-fill-color: #8ba4c8; margin-left: 5px;
    }
    .hud.flash { animation: hudFlash 0.6s ease; }
    @keyframes hudFlash { 0%,100% { transform: none; } 32% { transform: scale(1.09); } }

    /* ── Flux de pop-ups « tâche accomplie » ── */
    .task-stream {
      position: absolute; z-index: 5; right: clamp(20px, 5vw, 64px); top: 36%;
      width: 252px; display: flex; flex-direction: column; gap: 10px;
      pointer-events: none;
    }
    .task-card {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 15px; border-radius: 14px;
      background: rgba(11,24,41,0.96); border: 1px solid rgba(0,112,243,0.3);
      box-shadow: 0 10px 32px rgba(0,0,0,0.5);
      transform: translateX(150%); opacity: 0;
      animation: cardIn .5s cubic-bezier(0.22,1,0.36,1) forwards;
    }
    .task-card.out { animation: cardOut .45s ease forwards; }
    @keyframes cardIn { to { transform: translateX(0); opacity: 1; } }
    @keyframes cardOut { to { transform: translateX(150%); opacity: 0; } }
    .task-card .ic { font-size: 1.5rem; flex-shrink: 0; }
    .task-card .bd { display: flex; flex-direction: column; }
    .task-card .nm { font-size: 0.85rem; font-weight: 700; color: #eef4ff; }
    .task-card .xp { font-size: 0.78rem; font-weight: 700; color: #4ade80; margin-top: 1px; }
    .task-card .ck {
      width: 24px; height: 24px; flex-shrink: 0; margin-left: auto; border-radius: 50%;
      background: #22c55e; color: #fff; font-size: 0.78rem; font-weight: 800;
      display: flex; align-items: center; justify-content: center;
    }

    /* ── Panneau explicatif d'une branche ── */
    .branch-panel {
      position: absolute; z-index: 8; top: 0; right: 0; bottom: 0;
      width: clamp(300px, 33vw, 410px);
      background: rgba(8,17,30,0.97); backdrop-filter: blur(20px);
      border-left: 1px solid rgba(255,255,255,0.1);
      box-shadow: -20px 0 60px rgba(0,0,0,0.5);
      padding: 30px clamp(24px, 3vw, 38px);
      transform: translateX(100%); transition: transform .5s cubic-bezier(0.22,1,0.36,1);
      overflow-y: auto;
    }
    .branch-panel.open { transform: translateX(0); }
    .bp-close {
      position: absolute; top: 18px; right: 18px;
      width: 34px; height: 34px; border-radius: 50%; cursor: pointer;
      background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);
      color: #8ba4c8; font-size: 0.9rem; transition: background .2s, color .2s;
    }
    .bp-close:hover { background: rgba(255,255,255,0.12); color: #eef4ff; }
    .bp-head { display: flex; align-items: center; gap: 12px; margin: 8px 0 14px; }
    .bp-dot { width: 16px; height: 16px; border-radius: 50%; flex-shrink: 0;
      box-shadow: 0 0 16px currentColor; }
    .bp-title { font-size: 1.7rem; font-weight: 800; letter-spacing: -0.5px; }
    .bp-desc { font-size: 0.95rem; line-height: 1.6; color: #b9c7da; margin-bottom: 22px; }
    .bp-sub {
      display: flex; gap: 12px; padding: 11px 0;
      border-top: 1px solid rgba(255,255,255,0.06);
      opacity: 0; transform: translateX(16px);
      animation: subIn .45s ease forwards;
    }
    @keyframes subIn { to { opacity: 1; transform: none; } }
    .bp-sub-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
    .bp-sub-txt { font-size: 0.88rem; line-height: 1.5; color: #8ba4c8; }
    .bp-sub-txt b { display: block; color: #eef4ff; font-weight: 700; margin-bottom: 1px; }
    .bp-modules {
      margin-top: 20px; padding: 12px 14px; border-radius: 12px;
      background: rgba(0,112,243,0.1); border: 1px solid rgba(0,112,243,0.22);
      font-size: 0.82rem; color: #7fb4ff; font-weight: 600;
    }

    /* ── Barre de temps (croissance de l'arbre) ── */
    .timeline {
      position: absolute; z-index: 5;
      top: clamp(120px, 17vh, 158px); right: clamp(20px, 5vw, 64px);
      width: 236px; display: flex; align-items: center; gap: 10px;
      opacity: 0; transition: opacity .6s; pointer-events: none;
    }
    .timeline.on { opacity: 1; pointer-events: auto; }
    .tl-play {
      width: 32px; height: 32px; flex-shrink: 0; border-radius: 50%;
      background: #0070f3; color: #fff; border: none; cursor: pointer;
      font-size: 0.7rem; display: flex; align-items: center; justify-content: center;
      transition: filter .2s, transform .2s;
    }
    .tl-play:hover { filter: brightness(1.15); transform: scale(1.08); }
    .tl-play:disabled { opacity: 0.5; cursor: default; transform: none; }
    .tl-range { flex: 1; height: 4px; accent-color: #0070f3; cursor: pointer; }
    .tl-range:disabled { cursor: default; opacity: 0.6; }

    @media (max-width: 820px) {
      .headline { max-width: 80vw; top: clamp(74px, 11vh, 110px); }
    }
    @media (max-width: 720px) {
      .lya { flex-direction: column; align-items: stretch; gap: 14px; }
      .lya-top { display: flex; align-items: center; gap: 14px; }
      .actions { justify-content: space-between; }
      .btn-enter { flex: 1; text-align: center; }
      .hud, .timeline { display: none; }
      .task-pop { left: 16px; right: 16px; top: auto; bottom: 188px; }
      .task-pop:not(.show) { transform: translateY(40px); }
    }
    @media (prefers-reduced-motion: reduce) {
      #arbre-canvas, .lya, .lya-orb, .headline, .site-header, .hud { animation: none !important; }
    }
  </style>
</head>
<body>
  <main class="scene">
    <canvas id="arbre-canvas" aria-label="Ton arbre de vie"></canvas>
    <div class="loading-veil" aria-hidden="true">l'arbre s'éveille…</div>

    <header class="site-header">
      <div class="brand">
        <img src="/favicon.svg" alt="" />
        <span class="brand-name">ChangeYourLife<span>.ai</span></span>
      </div>
      <a class="header-login" href="/login/">Se connecter</a>
    </header>

    <div class="headline">
      <h1>Construis la meilleure version de toi-même.</h1>
      <p>Ta vie devient un arbre vivant, inspiré de la <strong>pyramide de
        Maslow</strong> — de tes besoins vitaux, à la base, jusqu'à
        l'accomplissement de soi, tout en haut.</p>
    </div>

    <div class="hud" id="hud" aria-hidden="true">
      <div class="hud-stage" id="xp-stage">Sapling</div>
      <div class="hud-xp"><span id="xp-value">0</span><small>XP</small></div>
    </div>

    <div class="timeline" id="timeline" aria-hidden="true">
      <button class="tl-play" id="scrub-play" type="button" disabled
              title="Rejouer la croissance">▶</button>
      <input class="tl-range" id="scrub" type="range" min="0" max="1000" value="0"
             disabled aria-label="Évolution de l'arbre" />
    </div>

    <div class="task-stream" id="task-stream" aria-hidden="true"></div>

    <aside class="branch-panel" id="branch-panel" aria-hidden="true">
      <button class="bp-close" id="bp-close" type="button" aria-label="Fermer">✕</button>
      <div class="bp-head">
        <span class="bp-dot" id="bp-dot"></span>
        <h2 class="bp-title" id="bp-title"></h2>
      </div>
      <p class="bp-desc" id="bp-desc"></p>
      <div class="bp-subs" id="bp-subs"></div>
      <div class="bp-modules" id="bp-modules"></div>
    </aside>

    <section class="lya" aria-live="polite">
      <div class="lya-top" style="display:contents;">
        <div class="lya-orb" aria-hidden="true"></div>
        <div class="lya-body">
          <div class="lya-name">Lya</div>
          <p class="lya-line" id="lya-line"></p>
        </div>
      </div>
      <div class="actions">
        <button class="lya-voice" id="lya-voice" aria-pressed="false">🔇 Voix de Lya</button>
        <a class="btn-enter" href="/login/">Commencer l'aventure</a>
      </div>
    </section>
  </main>
  <script type="module" src="/js/arbre3d.js"></script>
</body>
</html>
