  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%; overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #060e1a; color: #eef4ff;
      -webkit-font-smoothing: antialiased;
    }
    body {
      background:
        radial-gradient(ellipse 70% 50% at 50% 0%, rgba(0,112,243,0.16), transparent 70%),
        radial-gradient(ellipse 80% 60% at 50% 105%, rgba(0,112,243,0.10), transparent 70%),
        #060e1a;
    }
    .scene { position: fixed; inset: 0; }

    /* ── Arbre 3D (fond plein écran) ── */
    #arbre-canvas {
      position: absolute; inset: 0; width: 100%; height: 100%;
      display: block; animation: fadein 1.8s ease 0.2s both;
    }
    @keyframes fadein { from { opacity: 0; } to { opacity: 1; } }
    .loading-veil {
      position: absolute; inset: 0; display: flex;
      align-items: center; justify-content: center;
      color: #4a6a8c; font-size: 0.85rem; letter-spacing: 1px;
      text-transform: uppercase; pointer-events: none;
      animation: pulse 1.6s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100% { opacity: 0.35; } 50% { opacity: 0.75; } }
    body.tree-ready .loading-veil { display: none; }

    /* ── Bandeau ── */
    .site-header {
      position: absolute; top: 0; left: 0; right: 0; z-index: 4;
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px clamp(20px, 5vw, 64px);
      animation: fadeDown 1s ease both;
    }
    @keyframes fadeDown { from { opacity: 0; transform: translateY(-12px); } to { opacity: 1; transform: none; } }
    .brand { display: flex; align-items: center; gap: 10px; }
    .brand img { width: 30px; height: 30px; }
    .brand-name { font-size: 1.05rem; font-weight: 800; letter-spacing: -0.2px; }
    .brand-name span { color: #60a5fa; }
    .header-login {
      font-size: 0.88rem; font-weight: 600; color: #8ba4c8;
      text-decoration: none; padding: 8px 16px; border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.12); transition: color .2s, border-color .2s, background .2s;
    }
    .header-login:hover { color: #eef4ff; border-color: rgba(0,112,243,0.4); background: rgba(0,112,243,0.1); }

    /* ── Titre de présentation (fixe, autour de l'arbre) ── */
    .headline {
      position: absolute; z-index: 3; pointer-events: none;
      top: clamp(88px, 13vh, 132px); left: clamp(20px, 5vw, 64px);
      max-width: min(33rem, 52vw);
      animation: fadeUp 1.1s ease 0.4s both;
    }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: none; } }
    .headline h1 {
      font-size: clamp(1.85rem, 4.6vw, 3.3rem); font-weight: 800;
      line-height: 1.1; letter-spacing: -1px;
      background: linear-gradient(135deg, #ffffff 30%, #7fb4ff);
      -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
    }
    .headline p {
      margin-top: 14px; font-size: clamp(0.92rem, 1.5vw, 1.05rem);
      line-height: 1.6; color: #8ba4c8; max-width: 27rem;
    }

    /* ── Lya (bas) ── */
    .lya {
      position: absolute; left: 0; right: 0; bottom: 0; z-index: 4;
      display: flex; align-items: flex-end; gap: 18px;
      padding: 24px clamp(20px, 5vw, 64px) 30px;
      background: linear-gradient(0deg, rgba(6,14,26,0.94) 32%, transparent);
      animation: rise 1.2s ease 0.6s both;
    }
    @keyframes rise { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: none; } }
    .lya-orb {
      width: 60px; height: 60px; flex-shrink: 0; border-radius: 50%;
      background: radial-gradient(circle at 38% 34%, #8fc2ff 0%, #2f7ef0 42%, #1a3a8c 100%);
      box-shadow: 0 0 32px rgba(47,126,240,0.6), inset 0 0 18px rgba(255,255,255,0.25);
      position: relative; animation: breathe 4.6s ease-in-out infinite;
    }
    .lya-orb::after {
      content: ''; position: absolute; inset: 0; border-radius: 50%;
      background: radial-gradient(circle at 64% 70%, rgba(255,255,255,0.35), transparent 45%);
    }
    @keyframes breathe {
      0%,100% { transform: scale(1);    box-shadow: 0 0 28px rgba(47,126,240,0.5), inset 0 0 18px rgba(255,255,255,0.22); }
      50%     { transform: scale(1.06); box-shadow: 0 0 44px rgba(47,126,240,0.8), inset 0 0 22px rgba(255,255,255,0.32); }
    }
    .lya-body { flex: 1; min-width: 0; max-width: 600px; }
    .lya-name {
      font-size: 0.72rem; font-weight: 700; letter-spacing: 1.4px;
      text-transform: uppercase; color: #60a5fa; margin-bottom: 4px;
    }
    .lya-line {
      font-size: clamp(1rem, 2.2vw, 1.4rem); font-weight: 500;
      line-height: 1.5; min-height: 2.2em; color: #eef4ff;
    }
    .lya-line::after {
      content: "▌"; color: #60a5fa; margin-left: 2px;
      animation: caret 1s steps(1) infinite;
    }
    @keyframes caret { 50% { opacity: 0; } }
    .actions { display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
    .btn-enter {
      padding: 14px 26px; border-radius: 14px; border: none;
      background: #0070f3; color: #fff; font-size: 0.95rem; font-weight: 700;
      font-family: inherit; cursor: pointer; text-decoration: none; white-space: nowrap;
      box-shadow: 0 6px 24px rgba(0,112,243,0.4); transition: transform .2s, filter .2s;
    }
    .btn-enter:hover { transform: translateY(-2px); filter: brightness(1.1); }
    .lya-voice {
      padding: 11px 14px; border-radius: 12px; cursor: pointer;
      background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);
      color: #8ba4c8; font-size: 0.82rem; font-family: inherit; white-space: nowrap;
      transition: background .2s, color .2s, border-color .2s;
    }
    .lya-voice:hover { background: rgba(255,255,255,0.1); color: #eef4ff; }
    .lya-voice.on { color: #60a5fa; border-color: rgba(0,112,243,0.4); background: rgba(0,112,243,0.12); }

    @media (max-width: 820px) {
      .headline { max-width: 80vw; top: clamp(74px, 11vh, 110px); }
    }
    @media (max-width: 720px) {
      .lya { flex-direction: column; align-items: stretch; gap: 14px; }
      .lya-top { display: flex; align-items: center; gap: 14px; }
      .actions { justify-content: space-between; }
      .btn-enter { flex: 1; text-align: center; }
    }
    @media (prefers-reduced-motion: reduce) {
      #arbre-canvas, .lya, .lya-orb, .headline, .site-header { animation: none !important; }
    }
  </style>
</head>
<body>
  <main class="scene">
    <canvas id="arbre-canvas" aria-label="Ton arbre de vie"></canvas>
    <div class="loading-veil" aria-hidden="true">l'arbre s'éveille…</div>

    <header class="site-header">
      <div class="brand">
        <img src="/favicon.svg" alt="" />
        <span class="brand-name">ChangeYourLife<span>.ai</span></span>
      </div>
      <a class="header-login" href="/login/">Se connecter</a>
    </header>

    <div class="headline">
      <h1>Construis la meilleure version de toi-même.</h1>
      <p>Ta vie devient un arbre vivant. Chaque dimension — corps, mental,
        relations, sens — prend racine et s'épanouit avec toi.</p>
    </div>

    <section class="lya" aria-live="polite">
      <div class="lya-top" style="display:contents;">
        <div class="lya-orb" aria-hidden="true"></div>
        <div class="lya-body">
          <div class="lya-name">Lya</div>
          <p class="lya-line" id="lya-line"></p>
        </div>
      </div>
      <div class="actions">
        <button class="lya-voice" id="lya-voice" aria-pressed="false">🔇 Voix de Lya</button>
        <a class="btn-enter" href="/login/">Commencer l'aventure</a>
      </div>
    </section>
  </main>
  <script type="module" src="/js/arbre3d.js"></script>
</body>
</html>
