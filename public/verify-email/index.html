<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vérification email - Change Your Life</title>
  <meta name="description" content="Vérifiez votre adresse email pour finaliser la création de votre compte Change Your Life.">
  <meta name="robots" content="noindex">
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/png" sizes="96x96" href="/favicon-96x96.png">
  <link rel="icon" href="/favicon.ico">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <meta name="theme-color" content="#00aaff">
  <meta name="msapplication-TileColor" content="#07192f">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; color: #fff; display: flex; justify-content: center; align-items: center; background: #07192f; overflow: hidden; }
    #vanta-birds-bg { position: fixed; inset: 0; z-index: -1; }

    .card {
      position: relative; z-index: 1;
      background: rgba(15, 28, 52, 0.92);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(0,112,243,0.25);
      border-radius: 24px;
      padding: 44px 40px;
      max-width: 480px; width: 92%;
      text-align: center;
      box-shadow: 0 24px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.04) inset;
      animation: fadein .5s ease;
    }
    @keyframes fadein { from { opacity:0; transform:translateY(24px); } to { opacity:1; transform:translateY(0); } }

    .logo-badge {
      display: inline-flex; align-items: center; justify-content: center;
      width: 64px; height: 64px; border-radius: 18px;
      background: linear-gradient(135deg, #0070f3, #00aaff);
      font-size: 1.6rem; margin-bottom: 20px;
      box-shadow: 0 8px 24px rgba(0,112,243,0.4);
    }

    h1 { font-size: 1.6rem; font-weight: 700; margin-bottom: 10px; }

    .subtitle { color: #9bb3d0; font-size: 0.92rem; line-height: 1.65; margin-bottom: 6px; }

    .email-badge {
      display: inline-block;
      background: rgba(0,112,243,0.15);
      border: 1px solid rgba(0,112,243,0.35);
      color: #7bbfff;
      padding: 5px 14px;
      border-radius: 20px;
      font-size: 0.88rem;
      font-weight: 600;
      margin-bottom: 32px;
      word-break: break-all;
    }

    /* ── OTP input ── */
    .otp-row {
      display: flex; gap: 10px; justify-content: center; margin-bottom: 12px;
    }
    .otp-box {
      width: 56px; height: 68px;
      font-size: 1.8rem; font-weight: 700; text-align: center;
      background: rgba(255,255,255,0.05);
      border: 2px solid rgba(255,255,255,0.12);
      border-radius: 14px;
      color: #fff;
      outline: none;
      transition: border-color .2s, background .2s, box-shadow .2s;
      caret-color: #0070f3;
    }
    .otp-box:focus {
      border-color: #0070f3;
      background: rgba(0,112,243,0.1);
      box-shadow: 0 0 0 3px rgba(0,112,243,0.2);
    }
    .otp-box.filled { border-color: rgba(0,170,255,0.5); }
    .otp-box.error { border-color: #ef4444; background: rgba(239,68,68,0.08); animation: shake .3s ease; }
    .otp-box.success { border-color: #10b981; background: rgba(16,185,129,0.1); }
    @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-4px)} 75%{transform:translateX(4px)} }

    .otp-hint { font-size: 0.78rem; color: #4a6a8a; margin-bottom: 24px; min-height: 1.2em; }

    .error-msg { font-size: 0.85rem; color: #ef4444; margin-bottom: 16px; min-height: 1.2em; }

    .btn {
      display: block; width: 100%;
      padding: 14px 20px; border-radius: 12px; border: none;
      font-size: 1rem; font-weight: 600; cursor: pointer;
      transition: all 0.2s; margin-bottom: 12px;
    }
    .btn-primary { background: linear-gradient(135deg, #0070f3, #0056d6); color: #fff; box-shadow: 0 4px 16px rgba(0,112,243,0.3); }
    .btn-primary:hover:not(:disabled) { background: linear-gradient(135deg, #0080ff, #0070f3); transform: translateY(-1px); box-shadow: 0 6px 20px rgba(0,112,243,0.4); }
    .btn-primary:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }
    .btn-secondary { background: rgba(255,255,255,0.06); color: #9bb3d0; border: 1px solid rgba(255,255,255,0.1); font-size: 0.88rem; }
    .btn-secondary:hover:not(:disabled) { background: rgba(255,255,255,0.1); color: #fff; }
    .btn-secondary:disabled { opacity: 0.4; cursor: not-allowed; }

    .cooldown { font-size: 0.8rem; color: #4a6a8a; margin-top: -4px; margin-bottom: 14px; min-height: 1.2em; }

    .divider { height: 1px; background: rgba(255,255,255,0.07); margin: 8px 0 16px; }

    .signout-link { font-size: 0.82rem; color: #4a6a8a; cursor: pointer; background: none; border: none; text-decoration: underline; transition: color .2s; }
    .signout-link:hover { color: #9bb3d0; }

    .status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #f59e0b; animation: pulse 1.6s ease-in-out infinite; margin-right: 6px; vertical-align: middle; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

    .notification {
      position: fixed; top: 20px; left: 50%;
      transform: translate(-50%, -100px);
      padding: 12px 24px; border-radius: 12px;
      font-weight: 600; z-index: 2000; font-size: 0.9rem;
      opacity: 0; visibility: hidden;
      transition: transform .4s ease, opacity .4s ease, visibility .4s;
      pointer-events: none;
    }
    .notification.show { transform: translate(-50%, 0); opacity: 1; visibility: visible; }
    .notification.success { background: rgba(16,185,129,0.92); color: #fff; }
    .notification.info { background: rgba(0,112,243,0.92); color: #fff; }
    .notification.error { background: rgba(239,68,68,0.92); color: #fff; }
  </style>
</head>
<body>
  <div id="vanta-birds-bg"></div>
  <div id="notification" class="notification"></div>

  <div class="card">
    <div class="logo-badge">📧</div>
    <h1>Vérifiez votre email</h1>
    <p class="subtitle">Un code à 6 chiffres a été envoyé à :</p>
    <div class="email-badge" id="user-email-display">…</div>

    <!-- OTP input -->
    <div class="otp-row" id="otp-row">
      <input class="otp-box" type="text" inputmode="numeric" maxlength="1" data-index="0" autocomplete="off">
      <input class="otp-box" type="text" inputmode="numeric" maxlength="1" data-index="1" autocomplete="off">
      <input class="otp-box" type="text" inputmode="numeric" maxlength="1" data-index="2" autocomplete="off">
      <input class="otp-box" type="text" inputmode="numeric" maxlength="1" data-index="3" autocomplete="off">
      <input class="otp-box" type="text" inputmode="numeric" maxlength="1" data-index="4" autocomplete="off">
      <input class="otp-box" type="text" inputmode="numeric" maxlength="1" data-index="5" autocomplete="off">
    </div>
    <div class="otp-hint" id="otp-hint"><span class="status-dot"></span> En attente de votre code…</div>
    <div class="error-msg" id="error-msg"></div>

    <button class="btn btn-primary" id="verify-btn" disabled>Vérifier mon email</button>

    <button class="btn btn-secondary" id="resend-btn">Renvoyer le code</button>
    <div class="cooldown" id="cooldown-msg"></div>

    <div class="divider"></div>
    <button class="signout-link" id="signout-btn">Se déconnecter et revenir à la connexion</button>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vanta@0.5.24/dist/vanta.birds.min.js"></script>
  <script type="module" src="/js/verify-email.js"></script>
</body>
</html>
