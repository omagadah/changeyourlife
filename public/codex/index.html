<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Codex de connaissance — Bientôt disponible</title>
  <link rel="stylesheet" href="/css/main.min.css" />
  <style>
    body { color:#e5eef8; }
    .shell { position: fixed; inset: 20px; border-radius: 20px; border:1px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.05); backdrop-filter: blur(12px); display:grid; place-items:center; }
    .card { text-align:center; max-width:800px; padding:24px; }
    .pill { display:inline-block; padding:6px 10px; border-radius:999px; background: rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.18); color:#cfe1ff; font-size:12px; margin-bottom:10px; }
    .cta { margin-top:18px; padding:10px 14px; border-radius:10px; border:1px solid rgba(255,255,255,0.2); color:#e5eef8; background: rgba(255,255,255,0.06); text-decoration:none; }
  </style>
</head>
<body>
  <div id="vanta-birds-bg"></div>
  <nav class="site-nav">
    <a href="/app/" class="site-nav__back">← Mon Espace</a>
    <button class="user-panel-trigger" title="Mon Compte" aria-label="Ouvrir le menu">
      <svg data-cyf-logo="1" viewBox="0 0 200 120" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" style="width:36px;height:36px;display:block;border-radius:6px;"><g stroke-width="3"><circle cx="60" cy="60" r="40" fill="black" stroke="#3399ff" stroke-width="8"/><line x1="100" y1="60" x2="130" y2="30" stroke="white"/><line x1="100" y1="60" x2="130" y2="60" stroke="white"/><line x1="100" y1="60" x2="130" y2="90" stroke="white"/><circle cx="150" cy="30" r="18" fill="none" stroke="white"/><circle cx="150" cy="60" r="18" fill="none" stroke="white"/><circle cx="150" cy="90" r="18" fill="none" stroke="white"/></g></svg>
    </button>
  </nav>
  <main class="shell" style="inset:70px 20px 20px 20px!important">
    <div class="card">
      <div class="pill">Bientôt disponible</div>
      <h1>Codex de connaissance</h1>
      <p>Une bibliothèque vivante de concepts, méthodes et checklists pour progresser plus vite.</p>
      <a class="cta" href="/app/">← Retour à Mon Espace</a>
    </div>
  </main>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.birds.min.js"></script>
  <script type="module">
    import { updateGlobalAvatar } from '/js/common.js';
    import { initUserMenu } from '/js/userMenu.js';
    try { initUserMenu(); } catch(e) {}
    window.addEventListener('DOMContentLoaded', () => {
      VANTA.BIRDS({ el:'#vanta-birds-bg', mouseControls: true, touchControls: true, backgroundColor:0x07192f, quantity:4.0 });
      try { updateGlobalAvatar(); } catch(e){}
    });
  </script>
</body>
</html>
