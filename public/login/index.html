<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Connexion - Change Your Life</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; color: #fff; display: flex; justify-content: center; align-items: center; }
        #vanta-birds-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }

        .notification {
            position: fixed; top: 20px; left: 50%; transform: translate(-50%, -100px);
            background: linear-gradient(135deg, #0d2a1a, #0a1f14);
            border: 1px solid rgba(52, 211, 153, 0.4);
            color: #34d399; padding: 14px 28px; border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4), 0 0 0 1px rgba(52,211,153,0.1);
            font-size: 0.95rem; font-weight: 600; z-index: 1000;
            opacity: 0; visibility: hidden;
            transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s ease, visibility 0.3s;
        }
        .notification.show { transform: translate(-50%, 0); opacity: 1; visibility: visible; }

        .auth-container {
            background: rgba(10, 22, 45, 0.92);
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 24px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(0,112,243,0.15);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(0, 112, 243, 0.25);
            width: 100%; max-width: 420px;
            text-align: center; z-index: 1;
            overflow-y: auto; max-height: 96vh;
        }
        .auth-container h1 {
            margin-bottom: 1.5rem; font-weight: 700; font-size: 1.6rem;
            background: linear-gradient(135deg, #ffffff, #9bb3d0);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }

        .input-group { margin-bottom: 1.2rem; text-align: left; }
        .input-group label { display: block; margin-bottom: 0.45rem; font-size: 0.85rem; color: #7ba3c8; font-weight: 500; letter-spacing: 0.3px; }
        .input-group input {
            width: 100%; padding: 0.8rem 1rem; border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.06);
            color: #e8f0fe; font-size: 1rem;
            transition: border-color 0.25s ease, box-shadow 0.25s ease, background 0.25s ease;
        }
        .input-group input::placeholder { color: rgba(155,179,208,0.4); }
        .input-group input:focus {
            outline: none;
            border-color: rgba(0,112,243,0.6);
            background: rgba(0,112,243,0.08);
            box-shadow: 0 0 0 3px rgba(0,112,243,0.18);
        }

        .submit-button {
            width: 100%; padding: 0.9rem; border: none; border-radius: 10px;
            background: linear-gradient(135deg, #0070f3, #0056cc);
            color: white; font-weight: 700; font-size: 1rem; cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
            box-shadow: 0 4px 20px rgba(0,112,243,0.4);
            margin-top: 0.5rem; letter-spacing: 0.2px;
        }
        .submit-button:hover { transform: translateY(-1px); box-shadow: 0 8px 28px rgba(0,112,243,0.5); }
        .submit-button:active { transform: translateY(0); }

        .divider {
            display: flex; align-items: center; text-align: center;
            color: rgba(155,179,208,0.5); margin: 1.4rem 0; font-size: 0.82rem; letter-spacing: 0.5px;
        }
        .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid rgba(255,255,255,0.08); }
        .divider:not(:empty)::before { margin-right: .6em; }
        .divider:not(:empty)::after { margin-left: .6em; }

        .social-btn {
            display: flex; align-items: center; justify-content: center;
            width: 100%; padding: 0.75rem; margin-bottom: 0.8rem; border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.05);
            color: #c8d8ee; font-size: 0.95rem; font-weight: 500; cursor: pointer;
            transition: background 0.2s ease, border-color 0.2s ease, transform 0.15s ease;
        }
        .social-btn:hover {
            background: rgba(255,255,255,0.09);
            border-color: rgba(0,112,243,0.3);
            transform: translateY(-1px);
        }
        .social-btn svg { width: 22px; height: 22px; margin-right: 10px; opacity: 0.85; }

        #error-message { color: #f87171; margin-top: 1rem; font-size: 0.88rem; min-height: 1.2em; }

        .auth-toggle { margin-top: 1.4rem; font-size: 0.88rem; color: #7ba3c8; }
        .auth-toggle a, .highlight-link {
            color: #60aeff; text-decoration: none; font-weight: 600;
            transition: color 0.2s ease;
        }
        .auth-toggle a:hover, .highlight-link:hover { color: #93c5fd; text-decoration: underline; }

        .back-link { display: inline-block; margin-top: 1rem; color: #4a6a8a; font-size: 0.85rem; text-decoration: none; transition: color 0.2s; }
        .back-link:hover { color: #7ba3c8; }

        #password-requirements {
            margin: 0.8rem 0; padding: 0.9rem 1rem;
            background: rgba(251,191,36,0.06);
            border-radius: 10px; border-left: 3px solid rgba(251,191,36,0.5);
        }
        #password-requirements small { color: #fbbf24; font-weight: 600; font-size: 0.82rem; }
        #password-requirements ul { margin: 0.4rem 0 0 1.2rem; color: #8aadcc; font-size: 0.82rem; }
        #password-requirements li.ok { color: #34d399; }

        .extra-links a { color: #4a7aa8; font-size: 0.85rem; text-decoration: none; }
        .extra-links a:hover { color: #7ba3c8; text-decoration: underline; }

        .user-panel-trigger {
            width: 40px; height: 40px; background-color: transparent; border: none; border-radius: 8px;
            cursor: pointer; display: inline-flex; align-items: center; justify-content: center;
            transition: transform 0.2s ease, box-shadow 0.2s ease; user-select: none;
        }
        .user-panel-trigger:hover { transform: scale(1.06); box-shadow: 0 0 14px rgba(255,255,255,0.4); }
    </style>
</head>
<body>
    <div id="notification" class="notification"></div>
    <div id="vanta-birds-bg" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;"></div>
        <header class="header" style="position:fixed;top:20px;right:30px;z-index:100;">
                <button class="user-panel-trigger" title="Mon Compte" aria-label="Logo - Ouvrir le menu">
                        <svg data-cyf-logo="1" viewBox="0 0 200 120" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" style="width:40px;height:40px;display:block;border-radius:6px;">
                            <g stroke-width="3">
                                <circle cx="60" cy="60" r="40" fill="black" stroke="#3399ff" stroke-width="8"/>
                                <line x1="100" y1="60" x2="130" y2="30" stroke="white"/>
                                <line x1="100" y1="60" x2="130" y2="60" stroke="white"/>
                                <line x1="100" y1="60" x2="130" y2="90" stroke="white"/>
                                <circle cx="150" cy="30" r="18" fill="none" stroke="white"/>
                                <circle cx="150" cy="60" r="18" fill="none" stroke="white"/>
                                <circle cx="150" cy="90" r="18" fill="none" stroke="white"/>
                                <g fill="none" stroke="white" stroke-linecap="round">
                                    <circle cx="145" cy="30" r="3"/>
                                    <circle cx="155" cy="30" r="3"/>
                                    <line x1="145" y1="30" x2="155" y2="30"/>
                                    <path d="M 150 52 l 6 10 h -12 z" />
                                    <circle cx="150" cy="85" r="3"/>
                                    <circle cx="144" cy="95" r="3"/>
                                    <circle cx="156" cy="95" r="3"/>
                                    <line x1="150" y1="85" x2="144" y2="95"/>
                                    <line x1="150" y1="85" x2="156" y2="95"/>
                                </g>
                            </g>
                        </svg>
                </button>
        </header>
    <div class="auth-container">
        <h1 id="auth-title">Connexion</h1>
        <form id="auth-form">
            <div class="input-group">
                <label for="email">Adresse e-mail</label>
                <input type="email" id="email" name="email" required autocomplete="email" aria-label="Adresse e-mail">
                <small id="email-hint" style="color:#aaa;font-size:0.8rem;margin-top:4px;display:block;"></small>
            </div>
            <div class="input-group">
                <label for="password">Mot de passe</label>
                <input type="password" id="password" name="password" required autocomplete="current-password" aria-label="Mot de passe">
                <small id="password-hint" style="color:#aaa;font-size:0.8rem;margin-top:4px;display:block;"></small>
            </div>
            <div id="password-requirements" style="display:none;">
                <small>Exigences du mot de passe :</small>
                <ul>
                    <li id="req-length">Au moins 8 caractères</li>
                    <li id="req-upper">Au moins une majuscule</li>
                    <li id="req-lower">Au moins une minuscule</li>
                    <li id="req-digit">Au moins un chiffre</li>
                    <li id="req-special">Au moins un caractère spécial (@$!%*?&)</li>
                </ul>
            </div>
            <div class="input-group" id="password-confirm-group" style="display:none;">
                <label for="password-confirm">Confirmer le mot de passe</label>
                <input type="password" id="password-confirm" name="password-confirm" autocomplete="new-password" aria-label="Confirmer le mot de passe">
                <small id="password-confirm-hint" style="color:#aaa;font-size:0.8rem;margin-top:4px;display:block;"></small>
            </div>
            <button id="submit-button" type="submit" class="submit-button">Se connecter</button>
        </form>
        <div class="extra-links" style="justify-content: center; margin-top: 1rem;"><a href="#" id="forgot-password-link">Mot de passe oublié ?</a></div>
        <div class="divider">OU</div>
        <button id="google-signin" class="social-btn"><svg role="img" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="currentColor"><title>Google</title><path d="M12.48 10.92v3.28h7.84c-.24 1.84-.85 3.18-1.73 4.1-1.02 1.02-2.3 1.84-4.32 1.84-5.18 0-9.4-4.22-9.4-9.4s4.22-9.4 9.4-9.4c2.6 0 4.92 1.02 6.62 2.72l2.5-2.5C19.22 1.45 16.02 0 12.48 0 5.6 0 0 5.6 0 12.48s5.6 12.48 12.48 12.48c7.2 0 12.04-4.82 12.04-12.04 0-.82-.07-1.62-.2-2.4H12.48z"/></svg> Continuer avec Google</button>
        <button id="github-signin" class="social-btn"><svg role="img" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="currentColor"><title>GitHub</title><path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/></svg> Continuer avec GitHub</button>
        <p id="error-message"></p>
        <p class="auth-toggle" id="auth-toggle-p">
            <span id="auth-toggle-text">Pas encore de compte ?</span> 
            <a href="#" id="auth-toggle-link" class="highlight-link">Créer un compte</a>
        </p>
        <a href="/" class="back-link">Retour à l'accueil</a>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.birds.min.js"></script>
    <script> VANTA.BIRDS({ el: "#vanta-birds-bg", mouseControls: true, touchControls: true, gyroControls: false, minHeight: 200.00, minWidth: 200.00, scale: 1.00, scaleMobile: 1.00, backgroundColor: 0x0, color1: 0x7192ff, color2: 0xd1ff, colorMode: "varianceGradient", quantity: 5.00 }); </script>
    <script type="module" src="/js/inscription.js?v=17"></script>
    <script type="module">
        import { updateGlobalAvatar } from '/js/common.js';
        window.addEventListener('DOMContentLoaded', () => { try { updateGlobalAvatar(); } catch (e) {} });
    </script>
</body>
</html>
