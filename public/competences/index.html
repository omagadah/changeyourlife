<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mes compétences - Change Your Life</title>
  <meta name="description" content="Tes savoir-faire qui grandissent avec le temps : chaque tâche accomplie fait monter une compétence. Vois-toi progresser, pour de vrai." />
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/png" sizes="96x96" href="/favicon-96x96.png">
  <link rel="icon" href="/favicon.ico">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <meta name="theme-color" content="#0070f3">
  <link rel="stylesheet" href="/css/main.min.css" />
  <meta name="robots" content="noindex" />
  <style>
    body { color:var(--text-1); }
    .page-shell { position:fixed; inset:20px; background:var(--glass-bg); backdrop-filter:blur(15px); border-radius:20px; border:1px solid var(--glass-border); padding:20px; display:grid; grid-template-rows:auto 1fr; gap:16px; overflow:hidden; }
    .header-bar h1 { font-size:1.5rem; letter-spacing:-.4px; }
    .header-sub { font-size:0.85rem; color:var(--text-2); margin-top:3px; }
    .content-area { overflow-y:auto; display:flex; flex-direction:column; gap:20px; padding-bottom:24px; }
    .toast { position:fixed; top:22px; left:50%; transform:translate(-50%,-130px); background:rgba(16,185,129,.92); color:#fff; padding:10px 20px; border-radius:10px; font-weight:600; z-index:99999; transition:transform .3s ease; font-size:.88rem; box-shadow:0 8px 28px rgba(0,0,0,.35); }
    .toast.show { transform:translate(-50%,0); }
    .toast.xp { background:rgba(59,130,246,.92); }
    .toast.up { background:linear-gradient(135deg,#7c3aed,#a855f7); }

    .lya-bar { display:flex; align-items:center; gap:14px; padding:14px 18px; border-radius:16px;
      background:linear-gradient(135deg,rgba(124,58,237,0.16),rgba(45,212,191,0.06)); border:1px solid rgba(124,58,237,0.24); }
    .lya-orb { width:42px; height:42px; flex-shrink:0; border-radius:50%;
      background:radial-gradient(circle at 36% 32%,#fbe6b0,#e7b15c 40%,#4a7a3a 100%);
      box-shadow:0 0 18px rgba(231,177,92,.5), inset 0 0 10px rgba(255,255,255,.25); }
    .lya-name { font-size:0.64rem; font-weight:800; letter-spacing:1px; text-transform:uppercase; color:#c4b5fd; }
    .lya-line { font-size:0.92rem; color:var(--text-1); line-height:1.45; margin-top:2px; }

    .rf-input, .rf-select { padding:9px 12px; border-radius:10px; border:1px solid rgba(255,255,255,0.1);
      background:rgba(255,255,255,0.05); color:var(--text-1); font-size:0.88rem; font-family:inherit; transition:border-color .2s; }
    .rf-input:focus, .rf-select:focus { outline:none; border-color:rgba(124,58,237,0.5); }
    .rf-select { color-scheme: dark; }
    .rf-select option { background:#0b1829; color:#eef4ff; }

    .add-row { display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
    .add-row .rf-input { flex:1; min-width:170px; }
    .btn-primary { display:inline-flex; align-items:center; gap:6px; padding:10px 18px; border-radius:99px; border:none;
      background:linear-gradient(135deg,#a855f7,#7c3aed); color:#fff; font-weight:800; font-size:0.86rem; cursor:pointer; transition:transform .2s, filter .2s; white-space:nowrap; }
    .btn-primary:hover { transform:translateY(-2px); filter:brightness(1.08); }

    .sec-head { display:flex; align-items:center; gap:8px; margin:4px 0 4px; }
    .sec-title { font-size:0.74rem; font-weight:800; text-transform:uppercase; letter-spacing:.7px; color:var(--text-2); }
    .sec-line { flex:1; height:1px; background:rgba(255,255,255,0.06); }

    .skill-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:14px; }
    .skill-card { background:rgba(255,255,255,0.025); border:1px solid rgba(255,255,255,0.07); border-radius:16px; padding:16px 18px;
      position:relative; overflow:hidden; transition:transform .18s, background .18s, border-color .18s; }
    .skill-card::before { content:''; position:absolute; left:0; top:0; bottom:0; width:3px; background:var(--bc,#a855f7); opacity:.8; }
    .skill-card:hover { transform:translateY(-3px); background:rgba(255,255,255,0.045); }
    .sk-top { display:flex; align-items:center; gap:11px; }
    .sk-emoji { font-size:1.7rem; }
    .sk-id { flex:1; min-width:0; }
    .sk-name { font-size:0.98rem; font-weight:800; color:var(--text-1); }
    .sk-branch { font-size:0.7rem; font-weight:700; color:var(--bc,var(--text-3)); margin-top:1px; }
    .sk-del { opacity:0; border:1px solid rgba(255,255,255,0.1); background:rgba(255,255,255,0.04); color:var(--text-3);
      border-radius:7px; font-size:0.7rem; padding:3px 7px; cursor:pointer; transition:all .15s; }
    .skill-card:hover .sk-del { opacity:1; }
    .sk-del:hover { background:rgba(239,68,68,0.12); border-color:rgba(239,68,68,0.3); color:#f87171; }
    .sk-lvl { display:flex; align-items:baseline; justify-content:space-between; margin:13px 0 6px; }
    .sk-lvl-name { font-size:0.82rem; font-weight:800; color:var(--bc,#a855f7); }
    .sk-lvl-xp { font-size:0.72rem; color:var(--text-3); }
    .sk-bar-bg { height:6px; background:rgba(255,255,255,0.07); border-radius:6px; overflow:hidden; }
    .sk-bar { height:100%; background:var(--bc,#a855f7); border-radius:6px; width:0%; transition:width .8s cubic-bezier(.4,0,.2,1); }
    .sk-foot { display:flex; align-items:center; justify-content:space-between; margin-top:13px; gap:8px; }
    .sk-last { font-size:0.7rem; color:var(--text-3); }
    .btn-practice { display:inline-flex; align-items:center; gap:5px; padding:7px 14px; border-radius:99px; cursor:pointer;
      border:1px solid rgba(124,58,237,0.4); background:rgba(124,58,237,0.1); color:#c4b5fd; font-size:0.78rem; font-weight:700; transition:all .18s; }
    .btn-practice:hover { background:rgba(124,58,237,0.2); transform:translateY(-1px); }

    .empty { text-align:center; padding:34px 20px; color:var(--text-3); }
    .empty .ic { font-size:2.6rem; margin-bottom:10px; }
    .suggest { display:flex; gap:8px; flex-wrap:wrap; justify-content:center; margin-top:14px; }
    .sug-chip { padding:7px 13px; border-radius:99px; border:1px dashed rgba(124,58,237,0.4); background:rgba(124,58,237,0.06);
      color:#c4b5fd; font-size:0.8rem; font-weight:700; cursor:pointer; transition:all .15s; }
    .sug-chip:hover { background:rgba(124,58,237,0.14); border-style:solid; }

    @media (max-width:600px){ .page-shell{ inset:8px; padding:14px 12px; border-radius:16px; } .add-row .rf-select{ flex:1; } }
  </style>
</head>
<body>
  <div id="vanta-birds-bg"></div>
  <div id="toast" class="toast"></div>
  <nav class="site-nav">
    <a href="/app/" class="site-nav__back">← Mon espace</a>
    <button class="user-panel-trigger" title="Mon Compte" aria-label="Ouvrir le menu">
      <svg data-cyf-logo="1" viewBox="0 0 200 120" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" style="width:36px;height:36px;display:block;border-radius:6px;"><g stroke-width="3"><circle cx="60" cy="60" r="40" fill="black" stroke="#3399ff" stroke-width="8"/><line x1="100" y1="60" x2="130" y2="30" stroke="white"/><line x1="100" y1="60" x2="130" y2="60" stroke="white"/><line x1="100" y1="60" x2="130" y2="90" stroke="white"/></g></svg>
    </button>
  </nav>

  <main class="page-shell page-shell-nav">
    <div class="header-bar">
      <div>
        <h1>🧗 Mes compétences</h1>
        <div class="header-sub">Ce que tu maîtrises grandit avec le temps - chaque pratique compte.</div>
      </div>
    </div>

    <div class="content-area">
      <div class="lya-bar">
        <div class="lya-orb" aria-hidden="true"></div>
        <div>
          <div class="lya-name">SYL</div>
          <div class="lya-line" id="lya-line">Ajoute les savoir-faire qui comptent pour toi. À chaque fois que tu les pratiques, ils montent - et tu vois enfin tes progrès s'accumuler.</div>
        </div>
      </div>

      <div>
        <div class="sec-head"><span class="sec-title">Ajouter une compétence</span><span class="sec-line"></span></div>
        <div class="add-row">
          <input type="text" class="rf-input" id="sk-name" maxlength="40" placeholder="Ex : Cuisine, Informatique, Guitare…" />
          <select class="rf-select" id="sk-emoji" aria-label="Icône"></select>
          <select class="rf-select" id="sk-branch" aria-label="Branche"></select>
          <button class="btn-primary" id="btn-add">+ Ajouter</button>
        </div>
      </div>

      <div>
        <div class="sec-head"><span class="sec-title">Tes compétences</span><span class="sec-line"></span></div>
        <div id="skills-host"></div>
      </div>
    </div>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vanta@0.5.24/dist/vanta.birds.min.js"></script>
  <script type="module" src="/js/competences.js"></script>
</body>
</html>
