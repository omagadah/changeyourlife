<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Journal - Change Your Life</title>
  <meta name="description" content="Votre journal de bord personnel — réflexions quotidiennes, émotions et insights pour mieux vous connaître." />
  <link rel="stylesheet" href="/css/main.min.css" />
  <style>
    body { color: #e5eef8; }

    .layout {
      position: fixed; top: 56px; bottom: 20px; left: 20px; right: 20px;
      display: grid;
      grid-template-columns: 300px 1fr;
      gap: 16px;
    }
    @media (max-width: 820px) {
      .layout { grid-template-columns: 1fr; grid-template-rows: 220px 1fr; top: 52px; }
    }

    .panel {
      background: var(--glass-bg);
      backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      display: flex; flex-direction: column;
      overflow: hidden;
    }
    .panel-header {
      padding: 18px 20px 14px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      flex-shrink: 0;
    }
    .panel-body { flex: 1; overflow-y: auto; padding: 14px 16px; }

    .sidebar-title { font-size: 1.05rem; font-weight: 700; margin-bottom: 2px; }
    .sidebar-sub { font-size: 0.78rem; color: #7e9ab5; }

    .btn-new {
      display: flex; align-items: center; justify-content: center; gap: 6px;
      width: 100%; margin-top: 10px; padding: 9px;
      border-radius: 10px; border: 1px dashed rgba(59,130,246,0.45);
      background: rgba(59,130,246,0.07); color: #9fb5ff;
      font-weight: 600; font-size: 0.85rem; cursor: pointer; transition: all 0.2s;
    }
    .btn-new:hover { background: rgba(59,130,246,0.18); border-color: #3b82f6; }

    .entry-item {
      padding: 12px 14px; border-radius: 13px;
      border: 1px solid rgba(255,255,255,0.07);
      background: rgba(255,255,255,0.03);
      cursor: pointer; transition: all 0.18s; margin-bottom: 6px;
      position: relative; overflow: hidden;
    }
    .entry-item::before {
      content: ''; position: absolute; left: 0; top: 0; bottom: 0;
      width: 3px; background: transparent; border-radius: 13px 0 0 13px;
      transition: background .18s;
    }
    .entry-item:hover { background: rgba(255,255,255,0.07); border-color: rgba(255,255,255,0.14); transform: translateX(2px); }
    .entry-item:hover::before { background: rgba(59,130,246,0.5); }
    .entry-item.active { background: rgba(59,130,246,0.12); border-color: rgba(59,130,246,0.35); }
    .entry-item.active::before { background: #3b82f6; }
    .search-bar { margin-top: 8px; position: relative; }
    .search-bar input { width:100%; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); border-radius:8px; padding:7px 28px 7px 10px; color:#e5eef8; font-size:0.82rem; outline:none; transition:border-color .2s; }
    .search-bar input:focus { border-color:rgba(59,130,246,.5); }
    .search-bar input::placeholder { color:#4a6278; }
    .search-clear { position:absolute; right:8px; top:50%; transform:translateY(-50%); background:none; border:none; color:#7e9ab5; cursor:pointer; font-size:1rem; padding:0; display:none; }
    .filter-pills { display:flex; gap:4px; flex-wrap:wrap; margin-top:6px; }
    .filter-pill { padding:3px 8px; border-radius:20px; border:1px solid rgba(255,255,255,0.1); background:transparent; color:#7e9ab5; cursor:pointer; font-size:0.75rem; transition:all .15s; }
    .filter-pill:hover { background:rgba(255,255,255,0.08); }
    .filter-pill.active { background:rgba(59,130,246,0.2); border-color:#3b82f6; color:#9fb5ff; }
    .filter-pill.clear-btn { border-color:rgba(239,68,68,.3); color:#ef4444; }
    .edited-badge { font-size:0.72rem; color:#7e9ab5; font-style:italic; margin-left:6px; }
    .entry-item-row { display: flex; align-items: center; gap: 7px; margin-bottom: 3px; }
    .entry-emoji { font-size: 1.1rem; }
    .entry-date { font-size: 0.72rem; color: #7e9ab5; flex: 1; }
    .entry-domain-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .entry-preview { font-size: 0.8rem; color: #9fb5ff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .empty-list { text-align: center; padding: 36px 16px; color: #7e9ab5; font-size: 0.88rem; }
    .empty-list-icon { font-size: 2.2rem; margin-bottom: 8px; }

    .mood-chart-wrap { margin-top: 10px; }
    .mood-chart { display: flex; gap: 5px; align-items: flex-end; height: 44px; padding: 0 2px; }
    .mood-bar-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px; }
    .mood-bar-bg { width: 14px; background: rgba(255,255,255,0.06); border-radius: 4px; overflow: hidden; height: 32px; display: flex; align-items: flex-end; }
    .mood-bar-fill { width: 100%; background: #3b82f6; border-radius: 4px; }
    .mood-bar-label { font-size: 0.7rem; color: #7e9ab5; }

    .emotions { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
    .emotion-btn {
      padding: 5px 10px; border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.04); color: #e5eef8;
      cursor: pointer; font-size: 0.8rem; transition: all 0.15s;
      display: flex; align-items: center; gap: 4px;
    }
    .emotion-btn:hover { background: rgba(255,255,255,0.1); }
    .emotion-btn.selected { background: rgba(59,130,246,0.22); border-color: #3b82f6; color: #fff; }

    .domains { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
    .domain-btn {
      padding: 4px 10px; border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.1);
      background: transparent; color: #9ca3af;
      cursor: pointer; font-size: 0.74rem; font-weight: 600; text-transform: uppercase; transition: all 0.15s;
    }
    .domain-btn.sel-none  { border-color: #6b7280; color: #9ca3af; background: rgba(107,114,128,0.15); }
    .domain-btn.sel-body  { border-color: #2dd4bf; color: #2dd4bf; background: rgba(45,212,191,0.15); }
    .domain-btn.sel-heart { border-color: #ef4444; color: #ef4444; background: rgba(239,68,68,0.15); }
    .domain-btn.sel-etre  { border-color: #9ca3ff; color: #9ca3ff; background: rgba(156,163,255,0.15); }
    .domain-btn.sel-order { border-color: #f59e0b; color: #f59e0b; background: rgba(245,158,11,0.15); }

    .editor-date { font-size: 0.78rem; color: #7e9ab5; margin-bottom: 12px; }
    .editor-title-input {
      width: 100%; font-size: 1.3rem; font-weight: 700;
      background: transparent; border: none; color: #e5eef8; outline: none;
      margin-bottom: 10px; border-bottom: 1px solid rgba(255,255,255,0.08); padding-bottom: 8px;
    }
    .editor-title-input::placeholder { color: rgba(229,238,248,0.25); }
    .editor-content-input {
      width: 100%; flex: 1; min-height: 180px;
      background: transparent; border: none; color: #e5eef8; outline: none;
      resize: none; font-size: 0.97rem; line-height: 1.75; font-family: inherit;
    }
    .editor-content-input::placeholder { color: rgba(229,238,248,0.22); }
    .editor-footer {
      display: flex; justify-content: space-between; align-items: center;
      padding-top: 12px; border-top: 1px solid rgba(255,255,255,0.08); margin-top: 10px; flex-shrink: 0;
    }
    .word-count { font-size: 0.76rem; color: #7e9ab5; }

    .read-title { font-size: 1.4rem; font-weight: 700; margin-bottom: 8px; }
    .read-meta { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; font-size: 0.78rem; color: #7e9ab5; }
    .read-content { font-size: 0.97rem; line-height: 1.8; color: #c8d9ec; white-space: pre-wrap; margin-top: 16px; }
    .read-footer { display: flex; justify-content: flex-end; gap: 10px; padding-top: 12px; border-top: 1px solid rgba(255,255,255,0.08); margin-top: 14px; }

    .empty-editor { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; color: #7e9ab5; padding: 40px; }
    .empty-editor-icon { font-size: 3rem; margin-bottom: 14px; }
    .empty-editor-title { font-size: 1rem; font-weight: 600; color: #9fb5ff; margin-bottom: 6px; }
    .empty-editor-sub { font-size: 0.85rem; line-height: 1.5; }

    .btn { padding: 9px 16px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.06); color: #e5eef8; cursor: pointer; font-weight: 600; font-size: 0.88rem; transition: all 0.2s; }
    .btn:hover { background: rgba(255,255,255,0.12); }
    .btn.primary { background: linear-gradient(135deg,#3b82f6,#2563eb); border-color: transparent; box-shadow: 0 4px 14px rgba(59,130,246,.3); }
    .btn.primary:hover { filter: brightness(1.1); transform: translateY(-1px); box-shadow: 0 6px 18px rgba(59,130,246,.4); }
    .btn.danger { background: rgba(239,68,68,0.12); border-color: #ef4444; color: #ef4444; }
    .btn.danger:hover { background: rgba(239,68,68,0.25); }

    .toast { position: fixed; top: 22px; left: 50%; transform: translate(-50%, -130px); background: rgba(16,185,129,0.92); color: #fff; padding: 11px 20px; border-radius: 10px; font-weight: 600; z-index: 99999; transition: transform .3s ease; font-size: 0.9rem; }
    .toast.show { transform: translate(-50%, 0); }
    .toast.error { background: rgba(239,68,68,0.92); }
  </style>
</head>
<body>
  <div id="vanta-birds-bg"></div>
  <div id="toast" class="toast"></div>

  <nav class="site-nav">
    <a href="/app/" class="site-nav__back">← Mon Espace</a>
    <button class="user-panel-trigger" title="Mon Compte" aria-label="Ouvrir le menu">
      <svg data-cyf-logo="1" viewBox="0 0 200 120" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" style="width:36px;height:36px;display:block;border-radius:6px;"><g stroke-width="3"><circle cx="60" cy="60" r="40" fill="black" stroke="#3399ff" stroke-width="8"/><line x1="100" y1="60" x2="130" y2="30" stroke="white"/><line x1="100" y1="60" x2="130" y2="60" stroke="white"/><line x1="100" y1="60" x2="130" y2="90" stroke="white"/><circle cx="150" cy="30" r="18" fill="none" stroke="white"/><circle cx="150" cy="60" r="18" fill="none" stroke="white"/><circle cx="150" cy="90" r="18" fill="none" stroke="white"/></g></svg>
    </button>
  </nav>

  <div class="layout">
    <!-- ── Sidebar ── -->
    <aside class="panel">
      <div class="panel-header">
        <div class="sidebar-title">📔 Journal</div>
        <div class="sidebar-sub" id="entry-count">Chargement…</div>
        <button class="btn-new" id="btn-new-entry">✦ Nouvelle entrée</button>
        <div class="search-bar">
          <input type="text" id="journal-search" placeholder="Rechercher…" autocomplete="off" />
          <button class="search-clear" id="search-clear" aria-label="Effacer">×</button>
        </div>
        <div class="filter-pills" id="filter-pills"></div>
        <div class="mood-chart-wrap" id="mood-chart-wrap" style="display:none">
          <div style="font-size:0.7rem;color:#7e9ab5;margin:8px 0 4px;text-transform:uppercase;letter-spacing:.5px">Humeur · 7 jours</div>
          <div class="mood-chart" id="mood-chart"></div>
        </div>
      </div>
      <div class="panel-body" id="entry-list"></div>
    </aside>

    <!-- ── Main panel ── -->
    <section class="panel" id="main-panel">

      <!-- Empty state -->
      <div class="panel-body empty-editor" id="view-empty">
        <div class="empty-editor-icon">✍️</div>
        <div class="empty-editor-title">Commence à écrire</div>
        <div class="empty-editor-sub">Sélectionne une entrée à gauche,<br/>ou crée une nouvelle pour aujourd'hui.</div>
      </div>

      <!-- Editor -->
      <div style="display:none;flex-direction:column;height:100%;overflow:hidden" id="view-editor">
        <div class="panel-header">
          <div class="editor-date" id="editor-date"></div>
          <div class="emotions" id="emotion-picker"></div>
          <div class="domains" id="domain-picker"></div>
        </div>
        <div class="panel-body" style="display:flex;flex-direction:column;gap:0">
          <input type="text" class="editor-title-input" id="editor-title" placeholder="Titre (optionnel)…" maxlength="120" />
          <div id="prompt-du-jour" style="display:none;margin-bottom:10px;padding:10px 14px;background:rgba(59,130,246,0.07);border:1px solid rgba(59,130,246,0.2);border-radius:10px;cursor:pointer;transition:background .2s" title="Cliquer pour utiliser ce prompt">
            <div style="font-size:0.7rem;text-transform:uppercase;letter-spacing:.6px;color:#60aeff;font-weight:700;margin-bottom:4px">✦ Prompt du jour</div>
            <div id="prompt-text" style="font-size:0.88rem;color:#c8d8ee;line-height:1.5"></div>
            <div style="font-size:0.72rem;color:#4a6a8a;margin-top:5px">Cliquer pour l'utiliser →</div>
          </div>
          <textarea class="editor-content-input" id="editor-content" placeholder="Commence à écrire… Que s'est-il passé aujourd'hui ? Comment te sens-tu ? Quelles pensées traversent ton esprit ?"></textarea>
          <div class="editor-footer">
            <span class="word-count" id="word-count">0 mot</span>
            <div style="display:flex;gap:8px">
              <button class="btn" id="btn-cancel-edit">Annuler</button>
              <button class="btn primary" id="btn-save-entry">Sauvegarder</button>
            </div>
          </div>
        </div>
      </div>

      <!-- Read view -->
      <div style="display:none;flex-direction:column;height:100%;overflow:hidden" id="view-read">
        <div class="panel-header">
          <div class="read-title" id="read-title"></div>
          <div class="read-meta">
            <span id="read-emotion-badge"></span>
            <span>·</span>
            <span id="read-date"></span>
            <span>·</span>
            <span id="read-domain-badge"></span>
            <span id="read-word-count"></span>
            <span id="read-edited-badge" class="edited-badge" style="display:none">(modifié)</span>
          </div>
        </div>
        <div class="panel-body" style="flex:1;overflow-y:auto">
          <div class="read-content" id="read-content"></div>
          <div class="read-footer">
            <button class="btn danger" id="btn-delete-entry">Supprimer</button>
            <button class="btn" id="btn-edit-entry">✏️ Modifier</button>
          </div>
        </div>
      </div>

    </section>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.birds.min.js"></script>
  <script>try { VANTA.BIRDS({ el:'#vanta-birds-bg', mouseControls:true, touchControls:true, backgroundColor:0x07192f, quantity:3.0 }); } catch(e){}</script>

  <script type="module">
    import { updateGlobalAvatar } from '/js/common.js';
    import { initUserMenu } from '/js/userMenu.js';
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
    import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';
    import { getFirestore, collection, doc, getDocs, setDoc, deleteDoc, orderBy, query, limit, serverTimestamp, updateDoc, increment } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

    try { updateGlobalAvatar(); } catch(e) {}
    try { initUserMenu(); } catch(e) {}

    // ── Firebase ──────────────────────────────────────────────────────────────
    let auth, db, uid;
    if (window._cyfFirebase) {
      ({ auth, db } = window._cyfFirebase);
    } else {
      const cfg = { apiKey:"AIzaSyCvEtaivyC5QD0dGyPKh97IgYU8U8QrrWg", authDomain:"changeyourlife-cc210.firebaseapp.com", projectId:"changeyourlife-cc210", storageBucket:"changeyourlife-cc210.appspot.com", messagingSenderId:"801720080785", appId:"1:801720080785:web:1a74aadba5755ea26c2230" };
      const app = initializeApp(cfg);
      auth = getAuth(app); db = getFirestore(app);
      window._cyfFirebase = { app, auth, db };
    }

    // ── Data constants ─────────────────────────────────────────────────────────
    const EMOTIONS = [
      { key:'joy',      emoji:'😊', label:'Joie' },
      { key:'calm',     emoji:'😌', label:'Calme' },
      { key:'grateful', emoji:'🙏', label:'Gratitude' },
      { key:'worried',  emoji:'😟', label:'Inquiet' },
      { key:'sad',      emoji:'😢', label:'Triste' },
      { key:'angry',    emoji:'😡', label:'Frustré' },
      { key:'neutral',  emoji:'😐', label:'Neutre' },
    ];
    const DOMAINS = [
      { key:'none',  label:'Général' },
      { key:'body',  label:'Corps' },
      { key:'heart', label:'Cœur' },
      { key:'etre',  label:'Être' },
      { key:'order', label:'Ordre' },
    ];
    const EMOTION_MAP = Object.fromEntries(EMOTIONS.map(e => [e.key, e]));
    const DOMAIN_COLORS = { body:'#2dd4bf', heart:'#ef4444', etre:'#9ca3ff', order:'#f59e0b', none:'#6b7280' };
    const MOOD_SCORE = { joy:9, grateful:8, calm:7, neutral:5, worried:4, sad:3, angry:2 };

    // ── State ──────────────────────────────────────────────────────────────────
    let entries = [];
    let selEmotion = 'neutral';
    let selDomain = 'none';
    let editingId = null;
    let readId = null;
    let filterEmotion = null;
    let filterDomain  = null;
    let searchQuery   = '';

    // ── Auth ───────────────────────────────────────────────────────────────────
    onAuthStateChanged(auth, async (user) => {
      if (!user) { window.location.href = '/login'; return; }
      uid = user.uid;
      await loadEntries();
      buildPickers();
    });

    // ── Firestore helpers ──────────────────────────────────────────────────────
    const journalCol = () => collection(db, 'users', uid, 'journal');

    async function loadEntries() {
      try {
        const snap = await getDocs(query(journalCol(), orderBy('createdAt','desc'), limit(300)));
        entries = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      } catch(e) { console.warn(e); entries = []; }
      renderList();
      renderMoodChart();
      renderFilterPills();
    }

    // ── Render: filter pills ────────────────────────────────────────────────────
    function renderFilterPills() {
      const fp = document.getElementById('filter-pills'); fp.innerHTML = '';
      const hasFilter = filterEmotion || filterDomain;
      EMOTIONS.forEach(({ key, emoji }) => {
        const p = document.createElement('button'); p.className = `filter-pill${filterEmotion===key?' active':''}`;
        p.textContent = emoji; p.title = EMOTION_MAP[key].label;
        p.addEventListener('click', () => { filterEmotion = filterEmotion===key ? null : key; renderFilterPills(); renderList(); });
        fp.appendChild(p);
      });
      if (hasFilter) {
        const c = document.createElement('button'); c.className = 'filter-pill clear-btn'; c.textContent = '× Tout';
        c.addEventListener('click', () => { filterEmotion=null; filterDomain=null; renderFilterPills(); renderList(); });
        fp.appendChild(c);
      }
    }

    // ── Render: entry list ─────────────────────────────────────────────────────
    function renderList() {
      const list = document.getElementById('entry-list');
      const cnt  = document.getElementById('entry-count');
      const q = searchQuery.toLowerCase().trim();
      const visible = entries.filter(e => {
        if (filterEmotion && e.emotion !== filterEmotion) return false;
        if (filterDomain  && (e.domain || 'none') !== filterDomain) return false;
        if (q && !(e.title||'').toLowerCase().includes(q) && !(e.content||'').toLowerCase().includes(q)) return false;
        return true;
      });
      cnt.textContent = visible.length !== entries.length
        ? `${visible.length}/${entries.length} entrée${entries.length>1?'s':''}`
        : entries.length ? `${entries.length} entrée${entries.length > 1 ? 's' : ''}` : 'Aucune entrée';
      list.innerHTML = '';
      if (!visible.length) {
        const empty = document.createElement('div'); empty.className = 'empty-list';
        const noMsg = entries.length ? 'Aucun résultat pour ce filtre' : 'Aucune entrée';
        const noSub = entries.length ? 'Modifie ou efface le filtre' : 'Commence par écrire aujourd\'hui';
        empty.innerHTML = `<div class="empty-list-icon">📝</div><div>${noMsg}</div><div style="font-size:.75rem;margin-top:4px">${noSub}</div>`;
        list.appendChild(empty); return;
      }
      visible.forEach(e => {
        const item = document.createElement('div');
        item.className = `entry-item${e.id === readId ? ' active' : ''}`;
        item.dataset.id = e.id;

        const row = document.createElement('div'); row.className = 'entry-item-row';
        const emoSpan = document.createElement('span'); emoSpan.className = 'entry-emoji';
        emoSpan.textContent = (EMOTION_MAP[e.emotion] || EMOTION_MAP.neutral).emoji;
        const dateSpan = document.createElement('span'); dateSpan.className = 'entry-date';
        const ts = tsToDate(e.createdAt);
        dateSpan.textContent = ts.toLocaleDateString('fr-FR', { day:'numeric', month:'short', year:'numeric' });
        const dot = document.createElement('div'); dot.className = 'entry-domain-dot';
        dot.style.background = DOMAIN_COLORS[e.domain || 'none'];
        row.append(emoSpan, dateSpan, dot); item.appendChild(row);

        const prev = document.createElement('div'); prev.className = 'entry-preview';
        const raw = e.title || (e.content || '').slice(0, 55) || '(vide)';
        prev.textContent = !e.title && (e.content||'').length > 55 ? raw + '…' : raw;
        item.appendChild(prev);
        item.addEventListener('click', () => openReadView(e.id));
        list.appendChild(item);
      });
    }

    // ── Render: mood chart ─────────────────────────────────────────────────────
    function renderMoodChart() {
      const wrap  = document.getElementById('mood-chart-wrap');
      const chart = document.getElementById('mood-chart');
      if (entries.length < 2) { wrap.style.display = 'none'; return; }
      wrap.style.display = 'block'; chart.innerHTML = '';
      const localIso = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
      const days = Array.from({ length: 7 }, (_, i) => {
        const d = new Date(); d.setDate(d.getDate() - (6 - i));
        return { iso: localIso(d), lbl: d.toLocaleDateString('fr-FR', { weekday:'narrow' }) };
      });
      days.forEach(({ iso, lbl }) => {
        const dayE = entries.filter(e => localIso(tsToDate(e.createdAt)) === iso);
        const avg = dayE.length ? dayE.reduce((s,e) => s + (MOOD_SCORE[e.emotion]||5), 0) / dayE.length : 0;
        const h = Math.round((avg / 10) * 28);
        const bwrap = document.createElement('div'); bwrap.className = 'mood-bar-wrap';
        const bg = document.createElement('div'); bg.className = 'mood-bar-bg';
        const fill = document.createElement('div'); fill.className = 'mood-bar-fill';
        fill.style.height = `${h}px`;
        fill.style.background = avg >= 7 ? '#10b981' : avg >= 5 ? '#3b82f6' : avg > 0 ? '#f59e0b' : 'rgba(255,255,255,.06)';
        bg.appendChild(fill); bwrap.appendChild(bg);
        const ll = document.createElement('div'); ll.className = 'mood-bar-label'; ll.textContent = lbl;
        bwrap.appendChild(ll); chart.appendChild(bwrap);
      });
    }

    // ── Pickers ────────────────────────────────────────────────────────────────
    function buildPickers() {
      // Emotions
      const ep = document.getElementById('emotion-picker'); ep.innerHTML = '';
      EMOTIONS.forEach(({ key, emoji, label }) => {
        const btn = document.createElement('button'); btn.className = `emotion-btn${key===selEmotion?' selected':''}`; btn.dataset.key = key;
        const s1 = document.createElement('span'); s1.textContent = emoji;
        const s2 = document.createElement('span'); s2.textContent = label;
        btn.append(s1, s2);
        btn.addEventListener('click', () => { selEmotion = key; ep.querySelectorAll('.emotion-btn').forEach(b => b.classList.toggle('selected', b.dataset.key===key)); });
        ep.appendChild(btn);
      });
      // Domains
      const dp = document.getElementById('domain-picker'); dp.innerHTML = '';
      DOMAINS.forEach(({ key, label }) => {
        const btn = document.createElement('button'); btn.className = `domain-btn${key===selDomain?` sel-${key}`:''}`; btn.dataset.key = key; btn.textContent = label;
        btn.addEventListener('click', () => { selDomain = key; dp.querySelectorAll('.domain-btn').forEach(b => { b.className = `domain-btn${b.dataset.key===key?` sel-${key}`:''}`; }); });
        dp.appendChild(btn);
      });
    }

    function setEmotion(key) { selEmotion = key; document.querySelectorAll('#emotion-picker .emotion-btn').forEach(b => b.classList.toggle('selected', b.dataset.key===key)); }
    function setDomain(key) { selDomain = key; document.querySelectorAll('#domain-picker .domain-btn').forEach(b => { b.className = `domain-btn${b.dataset.key===key?` sel-${key}`:''}`; }); }

    // ── Views ──────────────────────────────────────────────────────────────────
    function showView(name) {
      ['empty','editor','read'].forEach(v => {
        const el = document.getElementById(`view-${v}`);
        el.style.display = (name===v) ? 'flex' : 'none';
      });
    }

    const PROMPTS = [
      "Quelle est la chose la plus importante que j'ai apprise sur moi-même cette semaine ?",
      "Qu'est-ce qui m'a donné de l'énergie aujourd'hui ? Qu'est-ce qui m'en a pris ?",
      "Si je pouvais changer une seule chose de ma journée, ce serait quoi ?",
      "Quel obstacle ai-je surmonté récemment dont je suis fier(e) ?",
      "Quelle habitude je voudrais cultiver ce mois-ci, et pourquoi ?",
      "Décris un moment de la journée où tu t'es senti(e) pleinement vivant(e).",
      "Qu'est-ce que je reporte depuis trop longtemps ? Pourquoi ?",
      "Quelles sont les 3 choses pour lesquelles je suis reconnaissant(e) aujourd'hui ?",
      "Comment mon corps se sent-il en ce moment ? Qu'est-ce qu'il essaie de me dire ?",
      "Quelle peur m'empêche d'avancer vers ce que je veux vraiment ?",
      "Si j'avais tout l'argent et le temps du monde, comment passerais-je ma journée idéale ?",
      "Qu'est-ce qui me met en colère ? Qu'est-ce que ça révèle sur mes valeurs ?",
      "Qui a eu un impact positif sur moi récemment ? Est-ce que je le lui ai dit ?",
      "Quelle décision difficile dois-je prendre et qu'est-ce qui me retient ?",
      "Décris une version de toi dans 5 ans. Qu'est-ce qui a changé ?",
      "Quel est mon plus grand rêve que je n'ose pas encore avouer ?",
      "Qu'est-ce que la réussite signifie vraiment pour moi, pas pour les autres ?",
      "Dans quel domaine est-ce que je me mens à moi-même en ce moment ?",
      "Quelle relation dans ma vie mérite plus d'attention et d'énergie ?",
      "Quel conseil donnerais-je à mon moi d'il y a 10 ans ?",
      "Qu'est-ce qui m'apporte de la joie pure, sans raison particulière ?",
      "Quelle habitude toxique voudrais-je abandonner définitivement ?",
      "Comment est-ce que je prends soin de mon bien-être mental en ce moment ?",
      "Qu'est-ce que j'ai évité de ressentir cette semaine ? Pourquoi ?",
      "Quelle est la dernière fois où j'ai fait quelque chose pour la première fois ?",
      "Qu'est-ce qui compte vraiment pour moi quand je retire tout le superflu ?",
      "Comment est-ce que je réagis face à l'échec ? Est-ce que ça me convient ?",
      "Qu'est-ce que j'aurais voulu apprendre plus tôt dans ma vie ?",
      "Dans quelle situation est-ce que je me sens le plus moi-même ?",
      "Quelle limite saine est-ce que je dois poser dans ma vie en ce moment ?",
      "Qu'est-ce qui m'inspire profondément en ce moment ? Pourquoi ?",
      "Comment est-ce que je me parle à moi-même quand je fais une erreur ?",
      "Qu'est-ce que je ferais différemment si je n'avais pas peur du jugement ?",
      "Quelle est la leçon la plus précieuse que m'a apprise une douleur passée ?",
      "En quoi est-ce que je suis devenu(e) meilleur(e) cette année ?",
      "Qu'est-ce qui me donne l'impression de me trahir moi-même ?",
      "Quelles croyances limitantes est-ce que je porte depuis trop longtemps ?",
      "Comment est-ce que je veux me souvenir de cette période dans ma vie ?",
      "Qu'est-ce que j'aurais besoin d'entendre de quelqu'un en ce moment ?",
      "Si ma vie était un livre, quel titre donnerais-je à ce chapitre ?",
      "Quelle petite action concrète puis-je faire aujourd'hui pour avancer vers mon objectif ?",
      "Qu'est-ce qui me manque pour me sentir vraiment en paix avec moi-même ?"
    ];

    function openEditor(id = null) {
      editingId = id;
      const promptDiv = document.getElementById('prompt-du-jour');
      const promptText = document.getElementById('prompt-text');
      const contentEl = document.getElementById('editor-content');
      const todayStr = capFirst(new Date().toLocaleDateString('fr-FR', { weekday:'long', day:'numeric', month:'long', year:'numeric' }));
      if (id) {
        const e = entries.find(x => x.id===id); if (!e) return;
        document.getElementById('editor-date').textContent = capFirst(tsToDate(e.createdAt).toLocaleDateString('fr-FR', { weekday:'long', day:'numeric', month:'long', year:'numeric' }));
        document.getElementById('editor-title').value = e.title || '';
        contentEl.value = e.content || '';
        setEmotion(e.emotion || 'neutral');
        setDomain(e.domain || 'none');
        if (promptDiv) promptDiv.style.display = 'none';
      } else {
        document.getElementById('editor-date').textContent = todayStr;
        // Restore draft if exists for a new entry (not editing)
        const draft = (() => { try { const d = localStorage.getItem(DRAFT_KEY); return d ? JSON.parse(d) : null; } catch(e) { return null; } })();
        if (draft && !draft.editingId) {
          document.getElementById('editor-title').value = draft.title || '';
          contentEl.value = draft.content || '';
          setEmotion(draft.emotion || 'neutral'); setDomain(draft.domain || 'none');
          selEmotion = draft.emotion || 'neutral'; selDomain = draft.domain || 'none';
          if (promptDiv) promptDiv.style.display = 'none';
        } else {
          document.getElementById('editor-title').value = '';
          contentEl.value = '';
          setEmotion('neutral'); setDomain('none');
          selEmotion = 'neutral'; selDomain = 'none';
          // Show daily prompt (cycles by day)
          if (promptDiv && promptText) {
            const dayIndex = Math.floor(Date.now() / 86400000) % PROMPTS.length;
            promptText.textContent = PROMPTS[dayIndex];
            promptDiv.style.display = 'block';
            promptDiv.onclick = () => {
              contentEl.value = PROMPTS[dayIndex] + '\n\n';
              promptDiv.style.display = 'none';
              contentEl.focus();
              updateWC();
            };
          }
        }
      }
      updateWC(); showView('editor');
      setTimeout(() => contentEl.focus(), 80);
    }

    function openReadView(id) {
      readId = id;
      const e = entries.find(x => x.id===id); if (!e) return;
      const ts = tsToDate(e.createdAt);
      const emo = EMOTION_MAP[e.emotion] || EMOTION_MAP.neutral;
      const dm  = DOMAINS.find(x => x.key===(e.domain||'none'));
      const wc  = (e.content||'').trim().split(/\s+/).filter(Boolean).length;
      document.getElementById('read-title').textContent = e.title || 'Entrée sans titre';
      document.getElementById('read-date').textContent = ts.toLocaleDateString('fr-FR', { day:'numeric', month:'long', year:'numeric', hour:'2-digit', minute:'2-digit' });
      document.getElementById('read-emotion-badge').textContent = `${emo.emoji} ${emo.label}`;
      document.getElementById('read-domain-badge').textContent = dm ? dm.label : 'Général';
      document.getElementById('read-word-count').textContent = `${wc} mot${wc!==1?'s':''}`;
      document.getElementById('read-content').textContent = e.content || '';
      // Show "modifié" badge if updatedAt differs meaningfully from createdAt
      const badge = document.getElementById('read-edited-badge');
      const createdTs = tsToDate(e.createdAt).getTime();
      const updatedTs = e.updatedAt ? tsToDate(e.updatedAt).getTime() : createdTs;
      badge.style.display = Math.abs(updatedTs - createdTs) > 5000 ? 'inline' : 'none';
      renderList();
      showView('read');
    }

    // ── Word count + draft autosave ────────────────────────────────────────────
    const DRAFT_KEY = 'cyf_journal_draft';
    function updateWC() {
      const wc = (document.getElementById('editor-content').value||'').trim().split(/\s+/).filter(Boolean).length;
      document.getElementById('word-count').textContent = `${wc} mot${wc!==1?'s':''}`;
    }
    function saveDraft() {
      const title = document.getElementById('editor-title').value;
      const content = document.getElementById('editor-content').value;
      if (!title && !content) { localStorage.removeItem(DRAFT_KEY); return; }
      localStorage.setItem(DRAFT_KEY, JSON.stringify({ title, content, editingId, emotion: selEmotion, domain: selDomain, ts: Date.now() }));
    }
    document.getElementById('editor-content').addEventListener('input', () => { updateWC(); saveDraft(); });
    document.getElementById('editor-title').addEventListener('input', saveDraft);

    // ── Save entry ─────────────────────────────────────────────────────────────
    const btnSave = document.getElementById('btn-save-entry');
    btnSave.addEventListener('click', async () => {
      if (btnSave.disabled) return;
      const title   = document.getElementById('editor-title').value.trim();
      const content = document.getElementById('editor-content').value.trim();
      if (!content && !title) { document.getElementById('editor-content').focus(); return; }
      btnSave.disabled = true; btnSave.textContent = 'Sauvegarde…';
      const id = editingId || `e_${Date.now()}`;
      const existing = editingId ? entries.find(x => x.id===id) : null;
      const data = { id, title, content, emotion: selEmotion, domain: selDomain, userId: uid, createdAt: existing?.createdAt || serverTimestamp(), updatedAt: serverTimestamp() };
      try {
        await setDoc(doc(journalCol(), id), data, { merge: true });
        if (!editingId) {
          entries.unshift({ ...data, createdAt: { toDate: () => new Date() } });
          // Award XP for journaling (10 XP to matching domain)
          try {
            const xpKey = selDomain === 'none' ? 'etre' : selDomain;
            await updateDoc(doc(db,'users',uid), { [`levels.${xpKey}.xp`]: increment(10) });
          } catch(_) {}
        } else {
          const idx = entries.findIndex(x => x.id===id);
          if (idx !== -1) entries[idx] = { ...data, createdAt: entries[idx].createdAt };
        }
        localStorage.removeItem(DRAFT_KEY);
        editingId = null; readId = id;
        renderList(); renderMoodChart();
        showToast('Entrée sauvegardée ✓');
        openReadView(id);
      } catch(e) { console.error(e); showToast('Erreur lors de la sauvegarde', true); }
      finally { btnSave.disabled = false; btnSave.textContent = 'Sauvegarder'; }
    });

    // ── Delete entry (2-step confirm) ──────────────────────────────────────────
    const btnDel = document.getElementById('btn-delete-entry');
    btnDel.dataset.pending = '0';
    btnDel.addEventListener('click', async () => {
      if (!readId) return;
      if (btnDel.dataset.pending !== '1') {
        btnDel.dataset.pending = '1'; btnDel.textContent = 'Confirmer la suppression ?';
        setTimeout(() => { if (btnDel.dataset.pending === '1') { btnDel.dataset.pending = '0'; btnDel.textContent = 'Supprimer'; } }, 3000);
        return;
      }
      btnDel.dataset.pending = '0'; btnDel.textContent = 'Supprimer';
      try {
        await deleteDoc(doc(journalCol(), readId));
        entries = entries.filter(e => e.id !== readId);
        readId = null; renderList(); renderMoodChart(); showView('empty');
        showToast('Entrée supprimée');
      } catch(e) { console.error(e); }
    });

    // ── Keyboard shortcut: Ctrl+S to save while editor is open ─────────────────
    document.addEventListener('keydown', e => {
      if ((e.ctrlKey || e.metaKey) && e.key === 's') {
        const editorVisible = document.getElementById('view-editor').style.display !== 'none';
        if (editorVisible) { e.preventDefault(); btnSave.click(); }
      }
    });

    // ── Search & filter wiring ─────────────────────────────────────────────────
    const searchInput = document.getElementById('journal-search');
    const searchClear = document.getElementById('search-clear');
    searchInput.addEventListener('input', () => {
      searchQuery = searchInput.value;
      searchClear.style.display = searchQuery ? 'block' : 'none';
      renderList();
    });
    searchClear.addEventListener('click', () => { searchQuery = ''; searchInput.value = ''; searchClear.style.display = 'none'; renderList(); });

    // ── Button wiring ──────────────────────────────────────────────────────────
    document.getElementById('btn-new-entry').addEventListener('click', () => { readId = null; openEditor(null); });
    document.getElementById('btn-cancel-edit').addEventListener('click', () => { localStorage.removeItem(DRAFT_KEY); editingId = null; showView(readId ? 'read' : 'empty'); if (readId) openReadView(readId); });
    document.getElementById('btn-edit-entry').addEventListener('click', () => { if (readId) openEditor(readId); });

    // ── Helpers ────────────────────────────────────────────────────────────────
    function tsToDate(ts) { return ts?.toDate ? ts.toDate() : new Date(ts || Date.now()); }
    function capFirst(s) { return s ? s.charAt(0).toUpperCase() + s.slice(1) : s; }
    function showToast(msg, err = false) {
      const t = document.getElementById('toast'); t.textContent = msg;
      t.className = `toast${err?' error':''} show`;
      setTimeout(() => t.classList.remove('show'), 2800);
    }

    // ── Init: show empty state ─────────────────────────────────────────────────
    showView('empty');
  </script>
</body>
</html>
