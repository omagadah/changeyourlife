<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aujourd'hui - Change Your Life</title>
  <meta name="description" content="Ton poste de pilotage quotidien : ton rythme de vie, tes besoins essentiels et tes tâches du jour — chaque action validée fait grandir ton arbre." />
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/png" sizes="96x96" href="/favicon-96x96.png">
  <link rel="icon" href="/favicon.ico">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <meta name="theme-color" content="#0070f3">
  <meta name="msapplication-TileColor" content="#07192f">
  <link rel="stylesheet" href="/css/main.min.css" />
  <meta name="robots" content="noindex" />
  <style>
    body { color:var(--text-1); }
    .page-shell { position:fixed; inset:20px; background:var(--glass-bg); backdrop-filter:blur(15px); border-radius:20px; border:1px solid var(--glass-border); padding:20px; display:grid; grid-template-rows:auto 1fr; gap:16px; overflow:hidden; }
    .header-bar { display:flex; justify-content:space-between; align-items:flex-start; flex-wrap:wrap; gap:12px; }
    .header-bar h1 { font-size:1.5rem; letter-spacing:-.4px; }
    .header-sub { font-size:0.85rem; color:var(--text-2); margin-top:3px; }
    .header-date { font-size:0.78rem; color:var(--text-3); margin-top:2px; text-transform:capitalize; }
    .content-area { overflow-y:auto; display:flex; flex-direction:column; gap:22px; padding-bottom:24px; }
    .toast { position:fixed; top:22px; left:50%; transform:translate(-50%,-130px); background:rgba(16,185,129,.92); color:#fff; padding:10px 20px; border-radius:10px; font-weight:600; z-index:99999; transition:transform .3s ease; font-size:.88rem; white-space:nowrap; box-shadow:0 8px 28px rgba(0,0,0,.35); }
    .toast.show { transform:translate(-50%,0); }
    .toast.xp { background:rgba(59,130,246,.92); }

    /* ── Section ── */
    .sec-head { display:flex; align-items:center; gap:8px; margin-bottom:12px; }
    .sec-title { font-size:0.74rem; font-weight:800; text-transform:uppercase; letter-spacing:.7px; color:var(--text-2); }
    .sec-line { flex:1; height:1px; background:rgba(255,255,255,0.06); }
    .card { background:rgba(255,255,255,0.025); border:1px solid rgba(255,255,255,0.07); border-radius:16px; padding:18px 20px; }

    /* ── Lya bandeau ── */
    .lya-bar { display:flex; align-items:center; gap:14px; padding:14px 18px; border-radius:16px;
      background:linear-gradient(135deg,rgba(99,102,241,0.14),rgba(45,212,191,0.06)); border:1px solid rgba(99,102,241,0.22); }
    .lya-orb { width:42px; height:42px; flex-shrink:0; border-radius:50%;
      background:radial-gradient(circle at 36% 32%,#fbe6b0,#e7b15c 40%,#4a7a3a 100%);
      box-shadow:0 0 18px rgba(231,177,92,.5), inset 0 0 10px rgba(255,255,255,.25); }
    .lya-txt { flex:1; min-width:0; }
    .lya-name { font-size:0.64rem; font-weight:800; letter-spacing:1px; text-transform:uppercase; color:#9db8ff; }
    .lya-line { font-size:0.92rem; color:var(--text-1); line-height:1.45; margin-top:2px; }

    /* ── Rythme ── */
    .rhythm-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:14px; }
    .rf-label { font-size:0.72rem; font-weight:700; color:var(--text-2); margin-bottom:6px; display:block; }
    .rf-input, .rf-select { width:100%; padding:9px 12px; border-radius:10px; border:1px solid rgba(255,255,255,0.1);
      background:rgba(255,255,255,0.05); color:var(--text-1); font-size:0.88rem; font-family:inherit; transition:border-color .2s; }
    .rf-input:focus, .rf-select:focus { outline:none; border-color:rgba(45,212,191,0.5); }
    /* Liste déroulante native lisible (sinon blanc sur blanc sous Windows) */
    .rf-select { color-scheme: dark; }
    .rf-select option { background:#0b1829; color:#eef4ff; }
    .energy-chips { display:flex; gap:6px; }
    .energy-chip { flex:1; padding:9px 0; border-radius:10px; border:1px solid rgba(255,255,255,0.1);
      background:rgba(255,255,255,0.04); color:var(--text-2); font-size:1rem; cursor:pointer; text-align:center; transition:all .15s; }
    .energy-chip.on { background:rgba(45,212,191,0.14); border-color:rgba(45,212,191,0.5); transform:translateY(-1px); }
    .rhythm-save-row { display:flex; justify-content:flex-end; margin-top:16px; }

    /* ── Boutons ── */
    .btn-primary { display:inline-flex; align-items:center; gap:6px; padding:10px 20px; border-radius:99px; border:none;
      background:linear-gradient(135deg,#2dd4bf,#0ea5a3); color:#04201d; font-weight:800; font-size:0.86rem; cursor:pointer; transition:transform .2s, filter .2s; }
    .btn-primary:hover { transform:translateY(-2px); filter:brightness(1.06); }
    .btn-ghost { display:inline-flex; align-items:center; gap:6px; padding:9px 16px; border-radius:99px;
      border:1px dashed rgba(45,212,191,0.4); background:rgba(45,212,191,0.06); color:#7fe3d6; font-size:0.84rem; font-weight:700; cursor:pointer; transition:all .2s; }
    .btn-ghost:hover { background:rgba(45,212,191,0.12); border-style:solid; }

    /* ── Base vitale ── */
    .vitals-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(130px,1fr)); gap:12px; }
    .vital-card { display:flex; flex-direction:column; align-items:center; gap:8px; padding:16px 10px; border-radius:14px;
      background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.08); cursor:pointer; transition:all .18s; position:relative; }
    .vital-card:hover { transform:translateY(-2px); background:rgba(255,255,255,0.055); }
    .vital-card.done { background:rgba(34,197,94,0.1); border-color:rgba(34,197,94,0.35); }
    .vital-emoji { font-size:1.7rem; }
    .vital-name { font-size:0.78rem; font-weight:700; color:var(--text-1); }
    .vital-check { position:absolute; top:8px; right:8px; width:20px; height:20px; border-radius:50%; border:2px solid rgba(255,255,255,0.18);
      display:flex; align-items:center; justify-content:center; font-size:0.7rem; color:transparent; }
    .vital-card.done .vital-check { background:#22c55e; border-color:#22c55e; color:#fff; }

    /* ── Tâches ── */
    .tasks-head { display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:12px; }
    .tasks-progress { font-size:0.78rem; color:var(--text-3); }
    .task-list { display:flex; flex-direction:column; gap:8px; }
    .task-card { display:flex; align-items:center; gap:13px; padding:12px 14px; border-radius:12px;
      background:rgba(255,255,255,0.025); border:1px solid rgba(255,255,255,0.07); position:relative; overflow:hidden; transition:background .18s, transform .18s; }
    .task-card::before { content:''; position:absolute; left:0; top:0; bottom:0; width:3px; background:var(--bc,rgba(255,255,255,0.2)); opacity:.7; }
    .task-card:hover { background:rgba(255,255,255,0.05); transform:translateX(2px); }
    .task-card.done { opacity:0.55; }
    .task-card.done .task-title { text-decoration:line-through; }
    .task-check { width:28px; height:28px; flex-shrink:0; border-radius:50%; border:2px solid rgba(255,255,255,0.2);
      background:transparent; cursor:pointer; display:flex; align-items:center; justify-content:center; color:transparent; font-size:0.85rem; transition:all .2s; }
    .task-card.done .task-check { background:var(--bc,#22c55e); border-color:var(--bc,#22c55e); color:#062018; }
    .task-body { flex:1; min-width:0; }
    .task-title { font-size:0.9rem; font-weight:600; color:var(--text-1); }
    .task-branch { font-size:0.7rem; font-weight:700; color:var(--bc,var(--text-3)); margin-top:2px; }
    .task-del { opacity:0; padding:4px 8px; border-radius:6px; border:1px solid rgba(255,255,255,0.1); background:rgba(255,255,255,0.04);
      color:var(--text-3); font-size:0.72rem; cursor:pointer; transition:all .15s; }
    .task-card:hover .task-del { opacity:1; }
    .task-del:hover { background:rgba(239,68,68,0.12); border-color:rgba(239,68,68,0.3); color:#f87171; }

    .add-task-row { display:flex; gap:8px; margin-top:12px; flex-wrap:wrap; }
    .add-task-row .rf-input { flex:1; min-width:160px; }
    .add-task-row .rf-select { width:auto; min-width:150px; }

    .empty-tasks { text-align:center; padding:30px 20px; color:var(--text-3); font-size:0.88rem; }

    @media (max-width:600px) {
      .page-shell { inset:8px; padding:14px 12px; border-radius:16px; }
      .add-task-row .rf-select { width:100%; }
      .task-del { opacity:1; }
    }
  </style>
</head>
<body>
  <div id="vanta-birds-bg"></div>
  <div id="toast" class="toast"></div>
  <nav class="site-nav">
    <a href="/app/" class="site-nav__back">← Mon espace</a>
    <button class="user-panel-trigger" title="Mon Compte" aria-label="Ouvrir le menu">
      <svg data-cyf-logo="1" viewBox="0 0 200 120" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" style="width:36px;height:36px;display:block;border-radius:6px;"><g stroke-width="3"><circle cx="60" cy="60" r="40" fill="black" stroke="#3399ff" stroke-width="8"/><line x1="100" y1="60" x2="130" y2="30" stroke="white"/><line x1="100" y1="60" x2="130" y2="60" stroke="white"/><line x1="100" y1="60" x2="130" y2="90" stroke="white"/><circle cx="150" cy="30" r="18" fill="none" stroke="white"/><circle cx="150" cy="60" r="18" fill="none" stroke="white"/><circle cx="150" cy="90" r="18" fill="none" stroke="white"/></g></svg>
    </button>
  </nav>

  <main class="page-shell page-shell-nav">
    <div class="header-bar">
      <div>
        <h1>🌅 Aujourd'hui</h1>
        <div class="header-sub">Ton poste de pilotage — à ton rythme</div>
        <div class="header-date" id="header-date"></div>
      </div>
    </div>

    <div class="content-area">
      <!-- Lya -->
      <div class="lya-bar">
        <div class="lya-orb" aria-hidden="true"></div>
        <div class="lya-txt">
          <div class="lya-name">Lya</div>
          <div class="lya-line" id="lya-line">Bonjour. Commençons par caler ton rythme du jour.</div>
        </div>
      </div>

      <!-- Rythme du jour -->
      <section>
        <div class="sec-head"><span class="sec-title">Ton rythme du jour</span><span class="sec-line"></span></div>
        <div class="card">
          <div class="rhythm-grid">
            <div>
              <label class="rf-label" for="r-wake">Réveil</label>
              <input type="time" class="rf-input" id="r-wake" />
            </div>
            <div>
              <label class="rf-label" for="r-sleep">Sommeil (h)</label>
              <select class="rf-select" id="r-sleep">
                <option value="">—</option>
                <option>4</option><option>5</option><option>6</option><option>7</option>
                <option>8</option><option>9</option><option>10</option>
              </select>
            </div>
            <div>
              <label class="rf-label">Énergie</label>
              <div class="energy-chips" id="energy-chips">
                <div class="energy-chip" data-v="1" title="Épuisé">😴</div>
                <div class="energy-chip" data-v="2" title="Bas">🙁</div>
                <div class="energy-chip" data-v="3" title="Moyen">😐</div>
                <div class="energy-chip" data-v="4" title="Bien">🙂</div>
                <div class="energy-chip" data-v="5" title="En feu">🤩</div>
              </div>
            </div>
            <div>
              <label class="rf-label" for="r-time">Temps disponible</label>
              <select class="rf-select" id="r-time">
                <option value="">—</option>
                <option value="1">Moins d'1 h</option>
                <option value="3">1 à 3 h</option>
                <option value="6">3 à 6 h</option>
                <option value="9">6 h et +</option>
              </select>
            </div>
            <div style="grid-column:1/-1">
              <label class="rf-label" for="r-focus">Focus du jour</label>
              <input type="text" class="rf-input" id="r-focus" maxlength="80" placeholder="La chose la plus importante aujourd'hui…" />
            </div>
          </div>
          <div class="rhythm-save-row">
            <button class="btn-primary" id="btn-save-rhythm">Enregistrer mon rythme</button>
          </div>
        </div>
      </section>

      <!-- Base vitale -->
      <section>
        <div class="sec-head"><span class="sec-title">Tes besoins essentiels — la base</span><span class="sec-line"></span></div>
        <div class="vitals-grid" id="vitals-grid"></div>
      </section>

      <!-- Tâches du jour -->
      <section>
        <div class="sec-head"><span class="sec-title">Tes tâches du jour</span><span class="sec-line"></span></div>
        <div class="card">
          <div class="tasks-head">
            <span class="tasks-progress" id="tasks-progress">—</span>
          </div>
          <div class="task-list" id="task-list"></div>
          <div class="add-task-row">
            <input type="text" class="rf-input" id="task-title" maxlength="100" placeholder="Ajouter une tâche…" />
            <select class="rf-select" id="task-branch"></select>
            <button class="btn-ghost" id="btn-add-task">+ Ajouter</button>
          </div>
        </div>
      </section>
    </div>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vanta@0.5.24/dist/vanta.birds.min.js"></script>
  <script type="module" src="/js/plan.js"></script>
</body>
</html>
