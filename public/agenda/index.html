<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mon Agenda - Change Your Life</title>
  <meta name="description" content="Ton Google Agenda en grand : toute ta semaine, et l'envoi de tes tâches du jour. Tes données restent entre toi et Google." />
  <link rel="stylesheet" href="/css/main.min.css" />
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <meta name="theme-color" content="#0070f3">
  <meta name="robots" content="noindex" />
  <style>
    body { color:var(--text-1,#e5eef8); }
    .page-shell { position:fixed; inset:20px; background:var(--glass-bg); backdrop-filter:blur(15px); border-radius:20px; border:1px solid var(--glass-border); padding:18px 18px 14px; display:grid; grid-template-rows:auto 1fr; gap:14px; overflow:hidden; }
    .ag-head { display:flex; align-items:flex-start; justify-content:space-between; gap:12px; flex-wrap:wrap; }
    .ag-head h1 { font-size:1.45rem; letter-spacing:-.4px; }
    .ag-sub { font-size:0.84rem; color:var(--text-2,#aab7cf); margin-top:3px; max-width:46rem; }
    #agenda-root { overflow:auto; display:flex; flex-direction:column; gap:14px; }

    /* connexion */
    .ap-connect { max-width:30rem; margin:6vh auto 0; text-align:center; }
    .ap-connect-ic { font-size:3rem; }
    .ap-connect h2 { font-size:1.3rem; margin:10px 0 8px; }
    .ap-connect p { font-size:0.9rem; color:var(--text-2,#aab7cf); line-height:1.55; margin-bottom:18px; }

    .ap-btn { padding:10px 16px; border-radius:99px; border:none; cursor:pointer; font-family:inherit; font-weight:800; font-size:0.85rem; transition:filter .2s, transform .2s, background .2s; }
    .ap-primary { background:linear-gradient(135deg,#4285f4,#1a73e8); color:#fff; }
    .ap-primary:hover { filter:brightness(1.08); transform:translateY(-1px); }
    .ap-ghost { background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.14); color:var(--text-2,#aab7cf); }
    .ap-ghost:hover { background:rgba(255,255,255,0.1); color:#fff; }
    .ap-x { background:transparent; border:1px solid rgba(255,255,255,0.12); color:var(--text-3,#7e9ab5); }
    .ap-x:hover { color:#f87171; border-color:rgba(239,68,68,0.4); }
    .ap-btn:disabled { opacity:.6; cursor:default; transform:none; }

    /* barre de navigation semaine */
    .ap-bar { display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap; }
    .ap-nav { display:flex; align-items:center; gap:6px; }
    .ap-arrow { width:34px; height:34px; border-radius:50%; border:1px solid rgba(255,255,255,0.14); background:rgba(255,255,255,0.04); color:#cdd9ec; font-size:1.2rem; cursor:pointer; line-height:1; }
    .ap-arrow:hover { background:rgba(255,255,255,0.1); color:#fff; }
    .ap-today { padding:7px 14px; border-radius:99px; border:1px solid rgba(255,255,255,0.14); background:rgba(255,255,255,0.04); color:#cdd9ec; font-weight:700; font-size:0.8rem; cursor:pointer; font-family:inherit; }
    .ap-today:hover { background:rgba(255,255,255,0.1); color:#fff; }
    .ap-range { font-weight:800; font-size:0.95rem; color:#eef4ff; }
    .ap-range::first-letter { text-transform:uppercase; }
    .ap-tools { display:flex; gap:8px; flex-wrap:wrap; }

    /* grille semaine */
    .ap-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:10px; }
    .ap-day { background:rgba(255,255,255,0.025); border:1px solid rgba(255,255,255,0.07); border-radius:14px; padding:10px 9px; min-height:140px; display:flex; flex-direction:column; gap:8px; }
    .ap-day.is-today { border-color:rgba(66,133,244,0.55); background:rgba(66,133,244,0.08); }
    .ap-day-h { display:flex; align-items:baseline; gap:7px; }
    .ap-dow { font-size:0.72rem; font-weight:800; text-transform:uppercase; letter-spacing:.5px; color:var(--text-3,#7e9ab5); }
    .ap-day.is-today .ap-dow { color:#8ab4f8; }
    .ap-dnum { font-size:1.1rem; font-weight:800; color:#eef4ff; }
    .ap-evs { display:flex; flex-direction:column; gap:6px; }
    .ap-ev { display:flex; flex-direction:column; gap:2px; padding:7px 9px; border-radius:9px; background:rgba(255,255,255,0.05); border-left:3px solid #4285f4; }
    .ap-ev.all-day { border-left-color:#34a853; }
    .ap-ev-t { font-size:0.68rem; font-weight:800; color:#8ab4f8; }
    .ap-ev.all-day .ap-ev-t { color:#6ee7a0; }
    .ap-ev-n { font-size:0.8rem; color:#e5eef8; line-height:1.3; }
    .ap-loading, .ap-empty { font-size:0.8rem; color:#56708c; text-align:center; padding:6px 0; }

    .ap-toast { position:fixed; top:22px; left:50%; transform:translate(-50%,-130px); background:rgba(26,115,232,.95); color:#fff; padding:10px 20px; border-radius:10px; font-weight:600; z-index:99999; transition:transform .3s ease; font-size:.88rem; box-shadow:0 8px 28px rgba(0,0,0,.4); }
    .ap-toast.show { transform:translate(-50%,0); }

    @media (max-width:880px){
      .page-shell { inset:8px; padding:14px 12px 10px; }
      .ap-grid { grid-template-columns:1fr; }
      .ap-day { min-height:auto; }
    }
  </style>
</head>
<body>
  <div id="vanta-birds-bg"></div>
  <nav class="site-nav">
    <a href="/app/" class="site-nav__back">← Mon espace</a>
    <button class="user-panel-trigger" title="Mon Compte" aria-label="Ouvrir le menu"></button>
  </nav>

  <main class="page-shell page-shell-nav">
    <div class="ag-head">
      <div>
        <h1>Mon Agenda</h1>
        <div class="ag-sub">Toute ta semaine en un coup d'oeil. Tes événements sont lus directement depuis Google, dans ton navigateur - rien ne passe par nos serveurs.</div>
      </div>
    </div>
    <div id="agenda-root"></div>
  </main>

  <script type="module" src="/js/agenda-page.js"></script>
</body>
</html>
