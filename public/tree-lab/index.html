<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Labo Arbre - ChangeYourLife</title>
  <meta name="robots" content="noindex" />
  <style>
    html, body { margin: 0; height: 100%; background: #05080f; overflow: hidden; font-family: system-ui, sans-serif; color: #dce7f5; }
    #c { display: block; width: 100vw; height: 100vh; }
    .panel { position: fixed; top: 14px; left: 14px; display: flex; flex-wrap: wrap; gap: 8px; align-items: center;
      background: rgba(8,16,28,0.82); border: 1px solid rgba(255,255,255,0.12); border-radius: 14px; padding: 10px 12px; backdrop-filter: blur(8px); max-width: 92vw; }
    .panel b { font-size: 0.85rem; margin-right: 4px; }
    button { font-family: inherit; font-weight: 700; font-size: 0.8rem; cursor: pointer; border-radius: 99px;
      border: 1px solid rgba(255,255,255,0.16); background: rgba(255,255,255,0.05); color: #cdd9ec; padding: 7px 13px; transition: all .15s; }
    button:hover { background: rgba(255,255,255,0.12); color: #fff; }
    button.on { background: linear-gradient(135deg,#84c25e,#4a7a3a); color: #06140a; border-color: transparent; }
    #stat { position: fixed; bottom: 12px; left: 14px; font-size: 0.78rem; color: #8fb3a0; }
    #err { position: fixed; bottom: 12px; right: 14px; font-size: 0.78rem; color: #ff9a9a; max-width: 60vw; }
    .hint { position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%); font-size: 0.76rem; color: #6a86a4; }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <div class="panel">
    <b>Arbre :</b>
    <button data-p="majestic" class="on">Majestueux</button>
    <button data-p="oak">Chêne XL</button>
    <button data-p="ash">Frêne</button>
    <button data-p="aspen">Tremble</button>
    <button data-p="pine">Pin</button>
    <button id="seed">🎲 Graine</button>
  </div>
  <div id="stat"></div>
  <div id="err"></div>
  <div class="hint">glisser = tourner (360 + par-dessus) · molette = zoom</div>

  <script type="module" src="/js/tree-lab.js"></script>
</body>
</html>
