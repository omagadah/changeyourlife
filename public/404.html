<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page introuvable – Change Your Life</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
      background:#060e1a;color:#eef4ff;-webkit-font-smoothing:antialiased;}
    .wrap{min-height:100%;display:flex;align-items:center;justify-content:center;padding:24px;}
    .card{
      background:rgba(11,24,41,0.82);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
      border:1px solid rgba(255,255,255,0.08);border-radius:20px;
      padding:48px 36px;max-width:520px;width:100%;text-align:center;
      box-shadow:0 20px 56px rgba(0,0,0,0.55);
    }
    .code{
      font-size:5.5rem;font-weight:800;line-height:1;letter-spacing:-2px;margin-bottom:8px;
      background:linear-gradient(135deg,#0070f3,#60a5fa);
      -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
    }
    h1{font-size:1.35rem;font-weight:700;margin-bottom:10px;}
    p{font-size:0.95rem;color:#8ba4c8;line-height:1.6;margin-bottom:28px;}
    .row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
    a{
      display:inline-flex;align-items:center;padding:11px 20px;border-radius:12px;
      font-size:0.9rem;font-weight:600;text-decoration:none;
      border:1px solid rgba(255,255,255,0.12);color:#eef4ff;
      transition:background .2s,border-color .2s,transform .2s;
    }
    a:hover{background:rgba(255,255,255,0.07);border-color:rgba(255,255,255,0.2);transform:translateY(-1px);}
    a.primary{background:#0070f3;border-color:transparent;color:#fff;box-shadow:0 6px 24px rgba(0,112,243,0.35);}
    a.primary:hover{filter:brightness(1.1);background:#0070f3;}
    @media (max-width:480px){
      .card{padding:36px 22px;}
      .code{font-size:4rem;}
    }
  </style>
  <link rel="manifest" href="/manifest.json"/>
  <link rel="icon" type="image/png" sizes="96x96" href="/favicon-96x96.png"/>
  <link rel="icon" href="/favicon.ico"/>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png"/>
  <meta name="theme-color" content="#00aaff"/>
  <meta name="robots" content="noindex"/>
  <script src="/js/theme-init.js"></script>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="code">404</div>
      <h1>Cette page n'existe pas</h1>
      <p>La page que tu cherches a été déplacée, supprimée, ou n'a jamais existé.</p>
      <div class="row">
        <a class="primary" href="/">Retour à l'accueil</a>
        <a href="/app/">Mon espace</a>
        <a href="/login/">Connexion</a>
      </div>
    </div>
  </div>
</body>
</html>
