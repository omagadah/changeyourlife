<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Habitudes - Change Your Life</title>
  <meta name="description" content="Suivez vos habitudes quotidiennes, construisez des séries et installez durablement les comportements qui vous font progresser.">
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/png" sizes="96x96" href="/favicon-96x96.png">
  <link rel="icon" href="/favicon.ico">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <meta name="theme-color" content="#0070f3">
  <meta name="msapplication-TileColor" content="#07192f">
  <link rel="stylesheet" href="/css/main.min.css" />
  <style>
    body { color:var(--text-1); }
    .page-shell { position:fixed; inset:20px; background:var(--glass-bg); backdrop-filter:blur(15px); border-radius:20px; border:1px solid var(--glass-border); padding:20px; display:grid; grid-template-rows:auto 1fr; gap:16px; overflow:hidden; }
    .header-bar { display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:12px; }
    .header-bar h1 { font-size:1.4rem; }
    .header-sub { font-size:0.85rem; color:var(--text-2); margin-top:2px; }
    .content-area { overflow-y:auto; display:flex; flex-direction:column; gap:20px; padding-bottom:20px; }
    .toast { position:fixed; top:22px; left:50%; transform:translate(-50%,-130px); background:rgba(16,185,129,.92); color:#fff; padding:10px 20px; border-radius:10px; font-weight:600; z-index:99999; transition:transform .3s ease; font-size:.88rem; white-space:nowrap; }
    .toast.show { transform:translate(-50%,0); }
    .toast.xp { background:rgba(59,130,246,.92); }

    /* ── Daily progress bar ── */
    .daily-progress-wrap { background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.07); border-radius:14px; padding:16px 20px; }
    .dp-row { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
    .dp-title { font-size:0.88rem; font-weight:700; color:var(--text-1); }
    .dp-count { font-size:0.82rem; color:var(--text-3); }
    .dp-bar-bg { height:6px; background:rgba(255,255,255,0.07); border-radius:6px; overflow:hidden; }
    .dp-bar { height:100%; background:linear-gradient(90deg,#22c55e,#16a34a); border-radius:6px; transition:width .6s ease; }
    .dp-domains { display:flex; gap:8px; margin-top:10px; flex-wrap:wrap; }
    .dp-dom-pill { padding:3px 10px; border-radius:999px; font-size:0.7rem; font-weight:700; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.08); color:var(--text-2); }
    .dp-dom-pill.done { background:rgba(34,197,94,0.12); border-color:rgba(34,197,94,0.3); color:#86efac; }

    /* ── Sections per domain ── */
    .domain-section { }
    .domain-section-header { display:flex; align-items:center; gap:8px; margin-bottom:10px; }
    .domain-section-title { font-size:0.78rem; font-weight:700; text-transform:uppercase; letter-spacing:.6px; }
    .domain-section-line { flex:1; height:1px; background:rgba(255,255,255,0.06); }

    /* ── Habit cards ── */
    .habits-list { display:flex; flex-direction:column; gap:8px; }
    .habit-card {
      display:flex; align-items:center; gap:14px;
      padding:13px 15px 13px 18px; border-radius:12px;
      background:rgba(255,255,255,0.025); border:1px solid rgba(255,255,255,0.07);
      transition:background .18s, border-color .18s, transform .18s;
      position:relative; overflow:hidden;
    }
    .habit-card::before {
      content:''; position:absolute; left:0; top:0; bottom:0; width:3px;
      background:var(--habit-color, rgba(255,255,255,0.15)); border-radius:12px 0 0 12px;
      opacity:0.6; transition:opacity .2s;
    }
    .habit-card:hover { background:rgba(255,255,255,0.05); transform:translateX(2px); }
    .habit-card:hover::before { opacity:1; }
    .habit-card.done-today {
      background:rgba(34,197,94,0.05); border-color:rgba(34,197,94,0.18);
    }
    .habit-card.done-today::before { background:#22c55e; opacity:0.8; }
    .habit-check {
      width:30px; height:30px; flex-shrink:0; border-radius:50%;
      border:2px solid rgba(255,255,255,0.18); background:transparent;
      display:flex; align-items:center; justify-content:center;
      cursor:pointer; transition:all .2s; font-size:0.9rem;
      color:transparent;
    }
    .habit-card.done-today .habit-check { background:rgba(34,197,94,0.18); border-color:#22c55e; color:#22c55e; }
    .habit-check:hover { border-color:rgba(255,255,255,0.4); }
    .habit-emoji { font-size:1.4rem; flex-shrink:0; }
    .habit-body { flex:1; min-width:0; }
    .habit-name { font-size:0.9rem; font-weight:600; color:var(--text-1); }
    .habit-meta { font-size:0.72rem; color:var(--text-3); margin-top:2px; display:flex; align-items:center; gap:8px; }
    .habit-streak { display:flex; align-items:center; gap:3px; color:#f59e0b; }
    .habit-actions { display:flex; gap:6px; opacity:0; transition:opacity .2s; }
    .habit-card:hover .habit-actions { opacity:1; }
    .habit-action-btn { padding:4px 8px; border-radius:6px; font-size:0.72rem; cursor:pointer; border:1px solid rgba(255,255,255,0.1); background:rgba(255,255,255,0.05); color:var(--text-2); transition:all .15s; }
    .habit-action-btn:hover { background:rgba(255,255,255,0.1); color:var(--text-1); }
    .habit-action-btn.del:hover { background:rgba(239,68,68,0.1); border-color:rgba(239,68,68,0.3); color:#f87171; }

    /* ── Add habit btn ── */
    .add-habit-row { display:flex; justify-content:flex-end; }
    .btn-add-habit {
      display:inline-flex; align-items:center; gap:6px;
      padding:9px 18px; border-radius:10px; border:1px dashed rgba(34,197,94,0.4);
      background:rgba(34,197,94,0.06); color:#86efac;
      font-size:0.84rem; font-weight:700; cursor:pointer; transition:all .2s;
    }
    .btn-add-habit:hover { background:rgba(34,197,94,0.12); border-style:solid; }

    /* ── Modal ── */
    .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.6); backdrop-filter:blur(8px); z-index:1000; display:flex; align-items:center; justify-content:center; padding:20px; }
    .modal-overlay.hidden { display:none; }
    .modal {
      background:rgba(10,22,45,0.97); border:1px solid rgba(255,255,255,0.1);
      border-radius:20px; padding:28px; width:100%; max-width:440px;
      box-shadow:0 24px 64px rgba(0,0,0,0.5);
    }
    .modal h2 { font-size:1.1rem; font-weight:800; margin-bottom:20px; }
    .field-group { display:flex; flex-direction:column; gap:6px; margin-bottom:16px; }
    .field-label { font-size:0.72rem; font-weight:700; text-transform:uppercase; letter-spacing:.4px; color:var(--text-2); }
    .field-input {
      padding:10px 14px; border-radius:10px; border:1px solid rgba(255,255,255,0.1);
      background:rgba(255,255,255,0.05); color:var(--text-1); font-size:0.9rem;
      font-family:inherit; transition:border-color .2s;
    }
    .field-input:focus { outline:none; border-color:rgba(34,197,94,0.4); }
    .emoji-picker { display:flex; gap:8px; flex-wrap:wrap; }
    .emoji-opt { width:36px; height:36px; border-radius:8px; border:1px solid rgba(255,255,255,0.1); background:rgba(255,255,255,0.04); cursor:pointer; font-size:1.2rem; display:flex; align-items:center; justify-content:center; transition:all .15s; }
    .emoji-opt.selected { border-color:rgba(34,197,94,0.5); background:rgba(34,197,94,0.1); }
    .modal-actions { display:flex; gap:10px; margin-top:6px; }
    .btn-save { flex:1; padding:11px; border-radius:10px; border:none; background:#22c55e; color:#fff; font-weight:700; cursor:pointer; font-size:0.9rem; transition:background .2s; }
    .btn-save:hover { background:#16a34a; }
    .btn-cancel { padding:11px 18px; border-radius:10px; border:1px solid rgba(255,255,255,0.1); background:rgba(255,255,255,0.04); color:var(--text-2); cursor:pointer; font-size:0.9rem; transition:background .2s; }
    .btn-cancel:hover { background:rgba(255,255,255,0.08); }

    /* ── Empty state ── */
    .empty-state { text-align:center; padding:48px 24px; color:var(--text-3); }
    .empty-state .empty-icon { font-size:3rem; margin-bottom:12px; }
    .empty-state p { font-size:0.9rem; line-height:1.6; }

    /* ── Mobile ── */
    @media (max-width:600px) {
      .page-shell { inset:8px; padding:14px 12px; border-radius:16px; }
      .header-bar { flex-direction:column; align-items:flex-start; gap:8px; }
      .habit-card { padding:10px 12px 10px 15px; gap:10px; }
      .habit-actions { opacity:1; }
      .modal-content { padding:20px 16px; }
    }
  </style>
  <meta name="robots" content="noindex" />
</head>
<body>
  <div id="vanta-birds-bg"></div>
  <div id="toast" class="toast"></div>
  <nav class="site-nav">
    <a href="/app/" class="site-nav__back">← Mon espace</a>
    <button class="user-panel-trigger" title="Mon Compte" aria-label="Ouvrir le menu">
      <svg data-cyf-logo="1" viewBox="0 0 200 120" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" style="width:36px;height:36px;display:block;border-radius:6px;"><g stroke-width="3"><circle cx="60" cy="60" r="40" fill="black" stroke="#3399ff" stroke-width="8"/><line x1="100" y1="60" x2="130" y2="30" stroke="white"/><line x1="100" y1="60" x2="130" y2="60" stroke="white"/><line x1="100" y1="60" x2="130" y2="90" stroke="white"/><circle cx="150" cy="30" r="18" fill="none" stroke="white"/><circle cx="150" cy="60" r="18" fill="none" stroke="white"/><circle cx="150" cy="90" r="18" fill="none" stroke="white"/></g></svg>
    </button>
  </nav>
  <main class="page-shell page-shell-nav">
    <div class="header-bar">
      <div>
        <h1>✅ Habitudes</h1>
        <div class="header-sub">Construis tes routines, une journée à la fois</div>
      </div>
      <button class="btn-add-habit" id="btn-add">+ Nouvelle habitude</button>
    </div>
    <div class="content-area" id="content-area">
      <div class="empty-state">
        <div class="empty-icon">🌱</div>
        <p>Chargement…</p>
      </div>
    </div>
  </main>

  <!-- Modal ajout/édition -->
  <div class="modal-overlay hidden" id="modal-overlay">
    <div class="modal">
      <h2 id="modal-title">Nouvelle habitude</h2>
      <div class="field-group">
        <label class="field-label">Nom de l'habitude</label>
        <input type="text" class="field-input" id="input-name" placeholder="Ex: Méditer 10 min, Lire 20 pages…" maxlength="60" />
      </div>
      <div class="field-group">
        <label class="field-label">Emoji</label>
        <div class="emoji-picker" id="emoji-picker">
          <div class="emoji-opt selected" data-e="✅">✅</div>
          <div class="emoji-opt" data-e="🧘">🧘</div>
          <div class="emoji-opt" data-e="📚">📚</div>
          <div class="emoji-opt" data-e="💪">💪</div>
          <div class="emoji-opt" data-e="🥗">🥗</div>
          <div class="emoji-opt" data-e="💧">💧</div>
          <div class="emoji-opt" data-e="🏃">🏃</div>
          <div class="emoji-opt" data-e="😴">😴</div>
          <div class="emoji-opt" data-e="📔">📔</div>
          <div class="emoji-opt" data-e="🎯">🎯</div>
          <div class="emoji-opt" data-e="❤️">❤️</div>
          <div class="emoji-opt" data-e="✨">✨</div>
          <div class="emoji-opt" data-e="⚡">⚡</div>
          <div class="emoji-opt" data-e="🌿">🌿</div>
          <div class="emoji-opt" data-e="🎵">🎵</div>
          <div class="emoji-opt" data-e="🧠">🧠</div>
        </div>
      </div>
      <div class="field-group">
        <label class="field-label">Domaine</label>
        <select class="field-input" id="input-domain">
          <option value="body">💪 Corps</option>
          <option value="heart">❤️ Cœur</option>
          <option value="etre">✨ Être</option>
          <option value="order">⚡ Ordre</option>
        </select>
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" id="btn-modal-cancel">Annuler</button>
        <button class="btn-save" id="btn-modal-save">Enregistrer</button>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vanta@0.5.24/dist/vanta.birds.min.js"></script>
  <script type="module" src="/js/habitudes.js"></script>
</body>
</html>
