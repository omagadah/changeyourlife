<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Objectifs & Progrès - Change Your Life</title>
  <link rel="stylesheet" href="/css/main.min.css" />
  <style>
    body { color:#e5eef8; }
    .page-shell { position: fixed; inset: 20px; background: var(--glass-bg); backdrop-filter: blur(15px); border-radius: 20px; border: 1px solid var(--glass-border); padding: 20px; display: grid; grid-template-rows: auto 1fr; gap: 16px; overflow: hidden; }
    .header-bar { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
    .header-bar h1 { margin: 0; font-size: 1.4rem; }
    .content-area { overflow-y: auto; display: grid; gap: 20px; }
    .goals-grid { display: grid; gap: 16px; }
    .goal-card {
      background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px; padding: 18px 18px 16px 22px;
      transition: all 0.22s var(--ease); position: relative; overflow: hidden;
    }
    .goal-card::before {
      content:''; position:absolute; left:0; top:0; bottom:0; width:4px;
      background: var(--goal-color, rgba(255,255,255,0.2)); border-radius:16px 0 0 16px;
      opacity: 0.7; transition: opacity 0.2s, width 0.2s;
    }
    .goal-card:hover { background: rgba(255,255,255,0.06); box-shadow: 0 8px 24px rgba(0,0,0,0.2); transform: translateY(-1px); }
    .goal-card:hover::before { opacity: 1; width: 5px; }
    .goal-card.completed { opacity: 0.55; }
    .goal-card.completed .goal-title { text-decoration: line-through; }
    .goal-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; gap: 10px; }
    .goal-title { font-weight: 700; font-size: 1.05rem; flex: 1; letter-spacing: -0.2px; }
    .goal-domain {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 9px; border-radius: 20px; font-size: 0.72rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.3px; flex-shrink: 0;
      background: color-mix(in srgb, var(--goal-color) 15%, transparent);
      border: 1px solid color-mix(in srgb, var(--goal-color) 40%, transparent);
      color: var(--goal-color);
    }
    .goal-desc { font-size: 0.86rem; color: var(--text-2); line-height: 1.5; margin-bottom: 14px; }
    .progress-bar { background: rgba(255,255,255,0.07); border-radius: 10px; height: 6px; overflow: hidden; margin-bottom: 7px; }
    .progress-fill {
      background: linear-gradient(90deg, var(--goal-color), color-mix(in srgb, var(--goal-color) 70%, white));
      height: 100%; transition: width 0.5s var(--ease);
    }
    .progress-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
    .progress-text { font-size: 0.78rem; color: var(--text-2); font-weight: 600; }
    .progress-pct { font-size:0.78rem; font-weight:700; color: var(--goal-color); }
    .goal-actions { display: flex; gap: 8px; margin-top: 12px; }
    .btn-icon { padding: 8px 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.06); color: #e5eef8; cursor: pointer; font-size: 0.85rem; transition: all 0.2s; }
    .btn-icon:hover { background: rgba(255,255,255,0.12); transform: scale(1.05); }
    .btn { padding: 10px 16px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.18); background: rgba(255,255,255,0.06); color: #e5eef8; cursor: pointer; font-weight: 600; transition: all 0.2s; }
    .btn:hover { background: rgba(255,255,255,0.12); }
    .btn.primary { background: #3b82f6; border-color: #2c60b8; }
    .btn.primary:hover { background: #2563eb; }
    .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); display: none; align-items: center; justify-content: center; z-index: 1000; }
    .modal.active { display: flex; }
    .modal-content { background: rgba(30,30,30,0.95); border: 1px solid rgba(255,255,255,0.15); border-radius: 16px; padding: 24px; max-width: 500px; width: 90%; }
    .modal-title { font-size: 1.3rem; font-weight: 600; margin-bottom: 16px; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 0.9rem; color: #aab7cf; margin-bottom: 6px; }
    .form-group input, .form-group textarea, .form-group select { width: 100%; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12); border-radius: 8px; padding: 10px; color: #e5eef8; font-family: inherit; }
    .form-group textarea { resize: vertical; min-height: 80px; }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
    .templates-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; margin-top: 16px; }
    .template-card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.12); border-radius: 10px; padding: 12px; cursor: pointer; text-align: center; transition: all 0.2s; }
    .template-card:hover { background: rgba(255,255,255,0.1); transform: scale(1.03); }
    .template-icon { font-size: 2rem; margin-bottom: 6px; }
    .template-name { font-size: 0.85rem; font-weight: 600; }
    .toast { position:fixed; top:22px; left:50%; transform:translate(-50%,-130px); background:rgba(16,185,129,.92); color:#fff; padding:10px 20px; border-radius:10px; font-weight:600; z-index:99999; transition:transform .3s ease; font-size:.88rem; white-space:nowrap; }
    .toast.show { transform:translate(-50%,0); }
    .goal-card.overdue { border-color:rgba(239,68,68,0.4); }
    .overdue-tag { font-size:0.72rem; color:#ef4444; font-weight:700; }
    .btn-icon.danger { border-color:rgba(239,68,68,.4); color:#ef4444; }
    .btn-icon.danger-confirm { background:rgba(239,68,68,.15); border-color:#ef4444; color:#ef4444; animation: pulse-red 0.4s ease; }
    @keyframes pulse-red { 0%,100% { opacity:1; } 50% { opacity:0.6; } }
    .templates-section { margin-bottom: 8px; }
    .templates-section-title { font-size:0.78rem; color:#7e9ab5; text-transform:uppercase; letter-spacing:.5px; margin-bottom:10px; font-weight:700; }
  </style>
  <meta name="robots" content="index,follow" />
  <meta name="description" content="Définissez et suivez vos objectifs avec l'aide de l'IA. Progression en temps réel et récompenses XP." />
</head>
<body>
  <div id="vanta-birds-bg"></div>
  <div id="toast" class="toast"></div>
  <nav class="site-nav">
    <a href="/app/" class="site-nav__back">← Mon Espace</a>
    <button class="user-panel-trigger" title="Mon Compte" aria-label="Ouvrir le menu">
      <svg data-cyf-logo="1" viewBox="0 0 200 120" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" style="width:36px;height:36px;display:block;border-radius:6px;"><g stroke-width="3"><circle cx="60" cy="60" r="40" fill="black" stroke="#3399ff" stroke-width="8"/><line x1="100" y1="60" x2="130" y2="30" stroke="white"/><line x1="100" y1="60" x2="130" y2="60" stroke="white"/><line x1="100" y1="60" x2="130" y2="90" stroke="white"/><circle cx="150" cy="30" r="18" fill="none" stroke="white"/><circle cx="150" cy="60" r="18" fill="none" stroke="white"/><circle cx="150" cy="90" r="18" fill="none" stroke="white"/></g></svg>
    </button>
  </nav>
  <main class="page-shell page-shell-nav">
    <div class="header-bar">
      <div>
        <h1>🎯 Objectifs & Progrès</h1>
        <div style="font-size:0.85rem;color:#aab7cf">Transforme tes intentions en actions</div>
      </div>
      <div style="display:flex;gap:10px">
        <button class="btn primary" id="btn-new-goal">+ Nouvel objectif</button>
      </div>
    </div>
    <div class="content-area">
      <div class="templates-section" id="templates-section">
        <div class="templates-section-title">⚡ Démarrage rapide</div>
        <div class="templates-grid" id="templates-grid"></div>
      </div>
      <div class="goals-grid" id="goals-grid"></div>
      <div id="empty-state" style="text-align:center;padding:60px 20px;color:#aab7cf;display:none">
        <div style="font-size:3rem;margin-bottom:12px">🎯</div>
        <div style="font-size:1.1rem;margin-bottom:8px">Aucun objectif défini</div>
        <div style="font-size:0.9rem">Clique sur "+ Nouvel objectif" pour commencer</div>
      </div>
    </div>
  </main>

  <div class="modal" id="modal-goal">
    <div class="modal-content">
      <div class="modal-title" id="modal-title">Nouvel objectif</div>
      <div class="form-group">
        <label>Titre</label>
        <input type="text" id="input-title" placeholder="Ex: Courir 5km sans m'arrêter" />
      </div>
      <div class="form-group">
        <label>Description (optionnel)</label>
        <textarea id="input-desc" placeholder="Détails, motivation, étapes..."></textarea>
      </div>
      <div class="form-group">
        <label>Domaine</label>
        <select id="input-domain">
          <option value="body">Body (Corps)</option>
          <option value="heart">Heart (Relations)</option>
          <option value="etre">Être (Identité)</option>
          <option value="order">Order (Organisation)</option>
        </select>
      </div>
      <div class="form-group">
        <label>Date cible (optionnel)</label>
        <input type="date" id="input-deadline" />
      </div>
      <div class="modal-actions">
        <button class="btn" id="btn-cancel-modal">Annuler</button>
        <button class="btn primary" id="btn-save-goal">Sauvegarder</button>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.birds.min.js"></script>
  <script type="module">
    import { updateGlobalAvatar } from '/js/common.js';
    import { initUserMenu } from '/js/userMenu.js';
    import { showXpFloat } from '/js/xp.js';
    import { onAuthStateChanged, getAuth } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';
    import { getFirestore, doc, getDoc, setDoc, updateDoc, arrayUnion, arrayRemove, increment } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

    let auth, db, uid, goals = [], editingId = null;

    const TEMPLATES = [
      { icon:'🏃', name:'Sport',       title:'Courir 5km',                    domain:'body',  desc:'Courir 5km sans s\'arrêter' },
      { icon:'📚', name:'Lecture',     title:'Lire 12 livres cette année',     domain:'etre',  desc:'1 livre par mois' },
      { icon:'💰', name:'Épargne',     title:'Épargner 10% de mes revenus',    domain:'order', desc:'Mettre de côté chaque mois' },
      { icon:'🧘', name:'Méditation',  title:'Méditer tous les jours',         domain:'etre',  desc:'Session quotidienne de 10 min' },
      { icon:'❤️', name:'Relations',   title:'Appeler un proche par semaine',  domain:'heart', desc:'Maintenir des liens forts' },
      { icon:'💪', name:'Force',       title:'3 séances de sport/semaine',     domain:'body',  desc:'Musculation ou cardio' },
    ];

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg; t.className = 'toast show';
      setTimeout(() => t.classList.remove('show'), 2800);
    }

    function renderTemplates() {
      const tg = document.getElementById('templates-grid');
      const ts = document.getElementById('templates-section');
      if (!tg) return;
      // Hide templates if user already has 3+ goals
      if (goals.length >= 3) { ts.style.display = 'none'; return; }
      ts.style.display = 'block';
      tg.innerHTML = '';
      TEMPLATES.forEach(tpl => {
        const card = document.createElement('div');
        card.className = 'template-card';
        card.innerHTML = `<div class="template-icon">${tpl.icon}</div><div class="template-name">${tpl.name}</div>`;
        card.title = tpl.title;
        card.addEventListener('click', async () => {
          goals.push({ id: Date.now(), title: tpl.title, desc: tpl.desc, domain: tpl.domain, deadline: null, progress: 0, completed: false, createdAt: Date.now() });
          try { await setDoc(doc(db, 'users', uid), { goals }, { merge: true }); renderGoals(); renderTemplates(); showToast(`✓ "${tpl.title}" ajouté`); } catch(e) {}
        });
        tg.appendChild(card);
      });
    }
    if (window._cyfFirebase) {
      ({ auth, db } = window._cyfFirebase);
    } else {
      const { initializeApp } = await import('https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js');
      const config = { apiKey: "AIzaSyCvEtaivyC5QD0dGyPKh97IgYU8U8QrrWg", authDomain: "changeyourlife-cc210.firebaseapp.com", projectId: "changeyourlife-cc210", storageBucket: "changeyourlife-cc210.appspot.com", messagingSenderId: "801720080785", appId: "1:801720080785:web:1a74aadba5755ea26c2230" };
      const app = initializeApp(config);
      auth = getAuth(app);
      db = getFirestore(app);
      window._cyfFirebase = { app, auth, db };
    }

    try { initUserMenu(); } catch(e) {}

    window.addEventListener('DOMContentLoaded', () => {
      VANTA.BIRDS({ el:'#vanta-birds-bg', mouseControls: true, touchControls: true, backgroundColor:0x07192f, quantity:4.0 });
      try { updateGlobalAvatar(); } catch(e){}
    });

    onAuthStateChanged(auth, async (user) => {
      if (!user) { window.location.href = '/login'; return; }
      uid = user.uid;
      await loadGoals();
    });

    async function loadGoals() {
      try {
        const snap = await getDoc(doc(db, 'users', uid));
        if (snap.exists()) {
          goals = snap.data().goals || [];
        }
        renderGoals();
        renderTemplates();
      } catch(e) { renderGoals(); renderTemplates(); }
    }

    function renderGoals() {
      const grid = document.getElementById('goals-grid');
      const empty = document.getElementById('empty-state');
      if (goals.length === 0) {
        grid.style.display = 'none';
        empty.style.display = 'block';
        return;
      }
      grid.style.display = 'grid';
      empty.style.display = 'none';
      // Sort: active goals first (overdue first among active), then completed
      const sorted = goals.map((g, idx) => ({ g, idx })).sort((a, b) => {
        if (a.g.completed !== b.g.completed) return a.g.completed ? 1 : -1;
        // Among active: overdue first
        const aOver = a.g.deadline && !a.g.completed && new Date(a.g.deadline) < new Date();
        const bOver = b.g.deadline && !b.g.completed && new Date(b.g.deadline) < new Date();
        if (aOver !== bOver) return aOver ? -1 : 1;
        return 0;
      });
      const DOMAIN_COLORS = { body:'#2dd4bf', heart:'#f87171', etre:'#a78bfa', order:'#fbbf24' };
      const DOMAIN_LABELS = { body:'Corps', heart:'Cœur', etre:'Être', order:'Ordre' };
      grid.innerHTML = sorted.map(() => `<div class="goal-card"></div>`).join('');
      sorted.forEach(({ g, idx }, sortedPos) => {
        const card = grid.children[sortedPos];
        const goalColor = DOMAIN_COLORS[g.domain] || '#6b7280';
        card.className = `goal-card${g.completed ? ' completed' : ''}`;
        card.style.setProperty('--goal-color', goalColor);
        const titleRow = document.createElement('div'); titleRow.className = 'goal-header';
        const titleText = document.createElement('div'); titleText.className = 'goal-title'; titleText.textContent = g.title;
        const domain = document.createElement('div'); domain.className = 'goal-domain'; domain.textContent = DOMAIN_LABELS[g.domain] || g.domain;
        titleRow.appendChild(titleText); titleRow.appendChild(domain); card.appendChild(titleRow);
        if (g.desc) { const desc = document.createElement('div'); desc.className = 'goal-desc'; desc.textContent = g.desc; card.appendChild(desc); }
        const isOverdue = g.deadline && !g.completed && new Date(g.deadline) < new Date();
        if (isOverdue) card.classList.add('overdue');
        const pct = g.progress || 0;
        // Progress row: label + pct
        const progRow = document.createElement('div'); progRow.className = 'progress-row';
        const progText = document.createElement('span'); progText.className = 'progress-text';
        progText.textContent = g.deadline ? `Cible: ${new Date(g.deadline).toLocaleDateString('fr-FR')}` : 'En cours';
        if (isOverdue) { const tag = document.createElement('span'); tag.className = 'overdue-tag'; tag.textContent = ' ⚠ En retard'; progText.appendChild(tag); }
        const progPct = document.createElement('span'); progPct.className = 'progress-pct'; progPct.textContent = `${pct}%`;
        progRow.appendChild(progText); progRow.appendChild(progPct); card.appendChild(progRow);
        const bar = document.createElement('div'); bar.className = 'progress-bar';
        const fill = document.createElement('div'); fill.className = 'progress-fill'; fill.style.width = `${pct}%`; bar.appendChild(fill); card.appendChild(bar);
        const actions = document.createElement('div'); actions.className = 'goal-actions';
        const btnP = document.createElement('button'); btnP.className = 'btn-icon'; btnP.textContent = '+ 10%'; btnP.addEventListener('click', () => window.updateProgress(idx));
        const btnT = document.createElement('button'); btnT.className = 'btn-icon'; btnT.textContent = g.completed ? '↻ Réactiver' : '✓ Compléter'; btnT.addEventListener('click', () => window.toggleComplete(idx));
        const btnE = document.createElement('button'); btnE.className = 'btn-icon'; btnE.textContent = '✏️'; btnE.addEventListener('click', () => openModal(idx));
        const btnD = document.createElement('button'); btnD.className = 'btn-icon'; btnD.dataset.confirmPending = '0'; btnD.textContent = '🗑️';
        btnD.addEventListener('click', () => {
          if (btnD.dataset.confirmPending === '1') { window.deleteGoal(idx); return; }
          btnD.dataset.confirmPending = '1'; btnD.classList.add('danger-confirm'); btnD.textContent = '🗑️ Confirmer?';
          setTimeout(() => { if (btnD.dataset.confirmPending === '1') { btnD.dataset.confirmPending = '0'; btnD.classList.remove('danger-confirm'); btnD.textContent = '🗑️'; } }, 3000);
        });
        actions.append(btnP, btnT, btnE, btnD); card.appendChild(actions);
      });
    }

    document.getElementById('btn-new-goal').addEventListener('click', () => openModal());
    document.getElementById('btn-cancel-modal').addEventListener('click', closeModal);
    document.getElementById('btn-save-goal').addEventListener('click', saveGoal);
    document.getElementById('modal-goal').addEventListener('click', (e) => { if (e.target.id === 'modal-goal') closeModal(); });

    // ── Auto-open modal if ?domain= is in URL (from autoévaluation bridge) ──
    const urlDomain = new URLSearchParams(window.location.search).get('domain');
    const domainMap = {corps:'body', coeur:'heart', etre:'etre', ordre:'order'};
    if (urlDomain && domainMap[urlDomain]) {
      setTimeout(() => {
        openModal();
        const sel = document.getElementById('input-domain');
        if (sel) sel.value = domainMap[urlDomain];
      }, 600);
    }

    function openModal(idx = null) {
      editingId = idx;
      const modal = document.getElementById('modal-goal');
      if (idx !== null) {
        const g = goals[idx];
        document.getElementById('modal-title').textContent = 'Modifier l\'objectif';
        document.getElementById('input-title').value = g.title;
        document.getElementById('input-desc').value = g.desc || '';
        document.getElementById('input-domain').value = g.domain;
        document.getElementById('input-deadline').value = g.deadline || '';
      } else {
        document.getElementById('modal-title').textContent = 'Nouvel objectif';
        document.getElementById('input-title').value = '';
        document.getElementById('input-desc').value = '';
        document.getElementById('input-domain').value = 'body';
        document.getElementById('input-deadline').value = '';
      }
      modal.classList.add('active');
    }

    function closeModal() {
      document.getElementById('modal-goal').classList.remove('active');
      editingId = null;
    }

    async function saveGoal() {
      const title = document.getElementById('input-title').value.trim();
      if (!title) return;
      const goal = {
        id: editingId !== null ? goals[editingId].id : Date.now(),
        title,
        desc: document.getElementById('input-desc').value.trim(),
        domain: document.getElementById('input-domain').value,
        deadline: document.getElementById('input-deadline').value || null,
        progress: editingId !== null ? goals[editingId].progress : 0,
        completed: editingId !== null ? goals[editingId].completed : false,
        createdAt: editingId !== null ? goals[editingId].createdAt : Date.now()
      };
      if (editingId !== null) {
        goals[editingId] = goal;
      } else {
        goals.push(goal);
      }
      try {
        await setDoc(doc(db, 'users', uid), { goals }, { merge: true });
        renderGoals(); renderTemplates();
        showToast(editingId !== null ? '✏️ Objectif modifié' : '✅ Objectif ajouté');
        closeModal();
      } catch(e) { console.error(e); }
    }

    window.updateProgress = async (idx) => {
      const g = goals[idx];
      const wasDone = g.progress >= 100;
      g.progress = Math.min(100, (g.progress || 0) + 10);
      const justCompleted = !wasDone && g.progress >= 100;
      if (justCompleted) { g.completed = true; showToast('🏆 Objectif complété ! +25 XP'); }
      else showToast(`+10% — ${g.progress}% complété`);
      try {
        await setDoc(doc(db, 'users', uid), { goals }, { merge: true });
        if (justCompleted) {
          const xpKey = g.domain || 'etre';
          try {
            await updateDoc(doc(db, 'users', uid), { [`levels.${xpKey}.xp`]: increment(25) });
            try { showXpFloat(25); } catch(e) {}
          } catch(_) {}
        }
        renderGoals(); renderTemplates();
      } catch(e) {}
    };

    window.toggleComplete = async (idx) => {
      const wasCompleted = goals[idx].completed;
      goals[idx].completed = !wasCompleted;
      if (goals[idx].completed) { goals[idx].progress = 100; showToast('✅ Objectif complété ! +25 XP'); }
      else showToast('↻ Objectif réactivé');
      try {
        await setDoc(doc(db, 'users', uid), { goals }, { merge: true });
        if (!wasCompleted) {
          const xpKey = goals[idx].domain || 'etre';
          try {
            await updateDoc(doc(db, 'users', uid), { [`levels.${xpKey}.xp`]: increment(25) });
            try { showXpFloat(25); } catch(e) {}
          } catch(_) {}
        }
        renderGoals(); renderTemplates();
      } catch(e) {}
    };

    window.deleteGoal = async (idx) => {
      const title = goals[idx].title;
      goals.splice(idx, 1);
      try {
        await setDoc(doc(db, 'users', uid), { goals }, { merge: true });
        renderGoals(); renderTemplates();
        showToast(`🗑️ "${title}" supprimé`);
      } catch(e) {}
    };
  </script>
</body>
</html>
