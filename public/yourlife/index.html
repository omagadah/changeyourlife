<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ma Vie — Change Your Life</title>
  <meta name="description" content="Visualise et coche ta progression sur la Pyramide de Maslow — tes compétences de vie organisées en 5 niveaux." />
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/png" sizes="96x96" href="/favicon-96x96.png">
  <link rel="icon" href="/favicon.ico">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <meta name="theme-color" content="#00aaff">
  <meta name="msapplication-TileColor" content="#07192f">
  <link rel="stylesheet" href="/css/main.min.css" />
  <style>
    body { color: #e5eef8; }

    .page-wrap {
      min-height: 100vh;
      padding: 74px 24px 60px;
      max-width: 1100px;
      margin: 0 auto;
    }

    .page-header { margin-bottom: 24px; }
    .page-title { font-size: 1.7rem; font-weight: 800; margin-bottom: 4px; }
    .page-sub { color: #7e9ab5; font-size: 0.88rem; }

    /* ── View switcher ── */
    .view-switcher {
      display: inline-flex; gap: 4px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 12px; padding: 5px;
      margin-bottom: 28px;
    }
    .view-btn {
      padding: 8px 16px; border-radius: 9px; border: none;
      font-size: 0.82rem; font-weight: 600; cursor: pointer;
      background: transparent; color: rgba(255,255,255,0.4);
      transition: all .2s; white-space: nowrap;
    }
    .view-btn:hover { color: rgba(255,255,255,0.75); }
    .view-btn.active {
      background: rgba(255,255,255,0.11);
      color: #fff;
      box-shadow: 0 1px 4px rgba(0,0,0,0.3);
    }

    /* ── View containers ── */
    .view-panel { display: none; }
    .view-panel.active { display: block; }

    /* ── Pyramid ── */
    .pyramid { display: flex; flex-direction: column; gap: 10px; align-items: center; }

    .level-row { width: 100%; border-radius: 16px; overflow: hidden; transition: transform .2s; }
    .level-row:hover { transform: scale(1.005); }

    .level-row[data-level="self-actualization"] { max-width: 400px; }
    .level-row[data-level="esteem"]             { max-width: 580px; }
    .level-row[data-level="love"]               { max-width: 750px; }
    .level-row[data-level="safety"]             { max-width: 920px; }
    .level-row[data-level="physiological"]      { max-width: 1100px; }

    .level-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 18px; color: #fff; font-weight: 700;
      font-size: 0.82rem; text-transform: uppercase; letter-spacing: .7px;
    }
    .level-header-left { display: flex; align-items: center; gap: 8px; }
    .level-pct-badge { font-size: 0.75rem; background: rgba(0,0,0,0.25); padding: 2px 8px; border-radius: 999px; font-weight: 600; opacity: .9; }

    .level-skills {
      background: rgba(10,18,30,0.55);
      backdrop-filter: blur(14px);
      border: 1px solid rgba(255,255,255,0.09);
      border-top: none;
      border-bottom-left-radius: 16px;
      border-bottom-right-radius: 16px;
      padding: 12px 14px;
      display: flex; flex-wrap: wrap; gap: 7px; align-items: center;
      min-height: 54px;
    }

    .skill-pill {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 6px 13px; border-radius: 999px;
      border: 1.5px solid rgba(255,255,255,0.13);
      background: rgba(255,255,255,0.05);
      color: #c8d9ec; cursor: pointer;
      font-size: 0.81rem; font-weight: 500;
      transition: all 0.18s; user-select: none; position: relative;
    }
    .skill-pill:hover { background: rgba(255,255,255,0.11); transform: scale(1.05); }
    .skill-pill.done { font-weight: 700; color: #fff; }
    .skill-check { font-size: 0.68rem; transition: opacity .2s; opacity: 0.5; }
    .skill-pill.done .skill-check { opacity: 1; }

    .skill-del, .skill-edit {
      opacity: 0; font-size: 0.65rem;
      cursor: pointer; background: none; border: none;
      padding: 0 0 0 3px; line-height: 1; transition: opacity .15s;
    }
    .skill-del { color: rgba(255,255,255,0.35); }
    .skill-edit { color: rgba(255,255,255,0.35); }
    .skill-pill:hover .skill-del, .skill-pill:hover .skill-edit { opacity: 1; }
    .skill-del:hover { color: #ef4444 !important; }
    .skill-edit:hover { color: #3b82f6 !important; }

    .btn-add-skill {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 5px 11px; border-radius: 999px;
      border: 1.5px dashed rgba(255,255,255,0.18);
      background: transparent; color: rgba(255,255,255,0.35);
      cursor: pointer; font-size: 0.75rem; transition: all .2s;
    }
    .btn-add-skill:hover { border-color: rgba(255,255,255,0.45); color: rgba(255,255,255,0.65); background: rgba(255,255,255,0.04); }

    .add-inline-form { display: inline-flex; align-items: center; gap: 4px; }
    .add-skill-input {
      padding: 4px 11px; border-radius: 999px;
      border: 1.5px solid rgba(255,255,255,0.28);
      background: rgba(255,255,255,0.08);
      color: #e5eef8; font-size: 0.8rem; outline: none; width: 140px;
    }
    .add-skill-input:focus { border-color: #3b82f6; }
    .add-confirm-btn {
      width: 24px; height: 24px; border-radius: 50%;
      background: #3b82f6; border: none; color: #fff;
      cursor: pointer; font-size: 0.8rem; display: flex; align-items: center; justify-content: center;
    }
    .add-cancel-btn {
      width: 24px; height: 24px; border-radius: 50%;
      background: rgba(255,255,255,0.08); border: none; color: #e5eef8;
      cursor: pointer; font-size: 0.85rem; display: flex; align-items: center; justify-content: center;
    }

    /* ── Stats row ── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px; margin-top: 28px;
    }
    .stat-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 14px; padding: 16px;
    }
    .stat-card-icon { font-size: 1.3rem; margin-bottom: 6px; }
    .stat-card-value { font-size: 1.6rem; font-weight: 800; color: #e5eef8; }
    .stat-card-label { font-size: 0.72rem; color: #7e9ab5; text-transform: uppercase; letter-spacing: .4px; margin-top: 2px; }
    .mini-bar { height: 4px; background: rgba(255,255,255,0.09); border-radius: 10px; overflow: hidden; margin-top: 8px; }
    .mini-bar-fill { height: 100%; border-radius: 10px; transition: width .7s ease; }

    .level-prog-list { display: flex; flex-direction: column; gap: 8px; margin-top: 20px; }
    .level-prog-item {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 14px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 10px;
    }
    .level-prog-emoji { font-size: 1rem; width: 22px; text-align: center; }
    .level-prog-label { font-size: 0.81rem; color: #9fb5ff; flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .level-prog-pct { font-size: 0.79rem; font-weight: 700; min-width: 36px; text-align: right; }
    .level-prog-bar { width: 70px; height: 4px; background: rgba(255,255,255,0.1); border-radius: 4px; overflow: hidden; flex-shrink: 0; }
    .level-prog-bar-fill { height: 100%; border-radius: 4px; transition: width .5s ease; }

    /* ── Mindmap ── */
    .mindmap-container {
      width: 100%; min-height: 580px;
      background: rgba(10,18,30,0.55);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px; overflow: hidden;
      position: relative;
    }
    .mindmap-container svg { display: block; }
    .mindmap-hint {
      text-align: center; padding: 12px 0 4px;
      font-size: 0.75rem; color: #4a6a8a;
    }

    /* ── Timeline ── */
    .timeline-wrap { max-width: 680px; margin: 0 auto; }
    .timeline-empty {
      text-align: center; padding: 60px 20px;
      color: #4a6a8a; font-size: 0.9rem;
    }
    .tl-group { margin-bottom: 32px; }
    .tl-date {
      font-size: 0.75rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 1px; color: #4a7aaa;
      margin-bottom: 12px; padding-left: 24px;
    }
    .tl-items { position: relative; padding-left: 24px; }
    .tl-items::before {
      content: ''; position: absolute;
      left: 7px; top: 6px; bottom: 6px;
      width: 2px; background: rgba(255,255,255,0.07); border-radius: 2px;
    }
    .tl-item {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 14px; margin-bottom: 8px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 12px; position: relative;
      transition: background .2s;
    }
    .tl-item:hover { background: rgba(255,255,255,0.07); }
    .tl-dot {
      width: 14px; height: 14px; border-radius: 50%;
      flex-shrink: 0; border: 2px solid var(--accent);
      background: rgba(0,0,0,0.4);
      position: absolute; left: -21px; top: 50%; transform: translateY(-50%);
    }
    .tl-level { font-size: 0.73rem; color: #7e9ab5; margin-bottom: 2px; }
    .tl-skill { font-size: 0.88rem; font-weight: 600; color: #e5eef8; }
    .tl-time { margin-left: auto; font-size: 0.72rem; color: #4a6a8a; white-space: nowrap; }

    /* ── Toast ── */
    .toast {
      position: fixed; top: 22px; left: 50%;
      transform: translate(-50%, -130px);
      background: rgba(16,185,129,0.92); color: #fff;
      padding: 10px 20px; border-radius: 10px;
      font-weight: 600; z-index: 99999;
      transition: transform .3s ease; font-size: 0.88rem;
      white-space: nowrap; pointer-events: none;
    }
    .toast.show { transform: translate(-50%, 0); }

    /* ── Global score banner ── */
    .global-score-banner {
      display: flex; align-items: center; gap: 18px;
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.09);
      border-radius: 16px; padding: 16px 20px; margin-bottom: 22px;
      flex-wrap: wrap;
    }
    .gsb-ring {
      position: relative; width: 72px; height: 72px; flex-shrink: 0;
    }
    .gsb-ring svg { position: absolute; top: 0; left: 0; transform: rotate(-90deg); }
    .gsb-ring-bg  { stroke: rgba(255,255,255,0.07); fill: none; stroke-width: 5; }
    .gsb-ring-fill { stroke: #3b82f6; fill: none; stroke-width: 5; stroke-linecap: round;
                     stroke-dasharray: 200; stroke-dashoffset: 200; transition: stroke-dashoffset .8s ease; }
    .gsb-inner { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .gsb-pct { font-size: 1.1rem; font-weight: 800; color: #fff; line-height: 1; }
    .gsb-details { flex: 1; min-width: 140px; }
    .gsb-title { font-size: 1rem; font-weight: 700; color: #e5eef8; margin-bottom: 4px; }
    .gsb-sub { font-size: 0.8rem; color: #7e9ab5; line-height: 1.4; }
    .gsb-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .gsb-btn {
      padding: 8px 14px; border-radius: 9px; border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.05); color: #c8d9f0; font-size: 0.8rem; font-weight: 600;
      cursor: pointer; transition: all .18s;
    }
    .gsb-btn:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.2); }
    .gsb-btn.primary { background: rgba(59,130,246,0.15); border-color: rgba(59,130,246,0.4); color: #93c5fd; }
    .gsb-btn.primary:hover { background: rgba(59,130,246,0.25); }

    @media (max-width: 720px) {
      .level-row[data-level] { max-width: 100% !important; }
      .page-wrap { padding: 68px 12px 48px; }
      .stats-row { grid-template-columns: 1fr 1fr; }
      .view-btn { padding: 7px 10px; font-size: 0.76rem; }
      .global-score-banner { gap: 12px; }
    }
  </style>
</head>
<body>
  <div id="vanta-birds-bg"></div>
  <div id="toast" class="toast"></div>

  <nav class="site-nav">
    <a href="/app/" class="site-nav__back">← Mon Espace</a>
    <button class="user-panel-trigger" title="Mon Compte" aria-label="Ouvrir le menu">
      <svg data-cyf-logo="1" viewBox="0 0 200 120" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" style="width:36px;height:36px;display:block;border-radius:6px;">
        <g stroke-width="3"><circle cx="60" cy="60" r="40" fill="black" stroke="#3399ff" stroke-width="8"/>
        <line x1="100" y1="60" x2="130" y2="30" stroke="white"/><line x1="100" y1="60" x2="130" y2="60" stroke="white"/>
        <line x1="100" y1="60" x2="130" y2="90" stroke="white"/>
        <circle cx="150" cy="30" r="18" fill="none" stroke="white"/>
        <circle cx="150" cy="60" r="18" fill="none" stroke="white"/>
        <circle cx="150" cy="90" r="18" fill="none" stroke="white"/></g>
      </svg>
    </button>
  </nav>

  <div class="page-wrap">
    <div class="page-header">
      <div class="page-title">🌳 Ma Vie</div>
      <div class="page-sub">Pyramide de Maslow · Coche tes compétences au fil de ta progression</div>
    </div>

    <!-- Global score banner -->
    <div class="global-score-banner" id="global-score-banner">
      <div class="gsb-ring">
        <svg viewBox="0 0 72 72" width="72" height="72">
          <circle class="gsb-ring-bg" cx="36" cy="36" r="31.5"/>
          <circle class="gsb-ring-fill" id="gsb-ring-fill" cx="36" cy="36" r="31.5"/>
        </svg>
        <div class="gsb-inner">
          <div class="gsb-pct" id="gsb-pct">0%</div>
        </div>
      </div>
      <div class="gsb-details">
        <div class="gsb-title" id="gsb-title">Ma progression de vie</div>
        <div class="gsb-sub" id="gsb-sub">Charge en cours…</div>
      </div>
      <div class="gsb-actions">
        <button class="gsb-btn primary" id="btn-export-life">⬇ Exporter</button>
      </div>
    </div>

    <!-- View switcher -->
    <div class="view-switcher" role="group" aria-label="Changer de vue">
      <button class="view-btn active" data-view="pyramid">🏔 Pyramide</button>
      <button class="view-btn" data-view="mindmap">🌿 Carte Mentale</button>
      <button class="view-btn" data-view="timeline">📅 Chronologie</button>
    </div>

    <!-- Pyramid view -->
    <div class="view-panel active" id="view-pyramid">
      <div class="pyramid" id="pyramid"></div>
      <div class="stats-row" id="stats-row"></div>
      <div class="level-prog-list" id="level-prog-list"></div>
    </div>

    <!-- Mindmap view -->
    <div class="view-panel" id="view-mindmap">
      <div class="mindmap-hint">Clic sur une compétence pour la cocher · Carte interactive</div>
      <div class="mindmap-container" id="mindmap-container"></div>
      <div class="stats-row" id="stats-row-mm"></div>
    </div>

    <!-- Timeline view -->
    <div class="view-panel" id="view-timeline">
      <div class="timeline-wrap">
        <div id="timeline-container"></div>
      </div>
      <div class="stats-row" id="stats-row-tl"></div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.birds.min.js"></script>
  <script type="module" src="/js/yourlife.js"></script>
</body>
</html>
